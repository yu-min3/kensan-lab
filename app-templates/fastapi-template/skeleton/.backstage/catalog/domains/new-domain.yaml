{% if values.createNewDomain %}# New Domain: ${{ values.newDomainName }}
# Auto-generated by Backstage template

apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: ${{ values.newDomainName }}
  description: ${{ values.newDomainDescription }}
spec:
  owner: ${{ values.newDomainOwner }}
{% endif %}
{% if values.createNewSystem %}
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: ${{ values.newSystemName }}
  description: ${{ values.newSystemDescription }}
spec:
  owner: ${{ values.newSystemOwner }}
  domain: ${{ values.domain }}
{% endif %}
