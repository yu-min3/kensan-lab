apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: fastapi-app-template
  title: FastAPI Application
  description: Create a new FastAPI application with Kustomize-based GitOps deployment
  tags:
    - python
    - fastapi
    - gitops
    - kustomize
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Application Information
      required:
        - name
        - description
        - owner
        - repoUrl
      properties:
        name:
          title: Application Name
          type: string
          description: |
            アプリケーション名（小文字、英数字、ハイフンのみ）

            📌 **この名前が影響するもの:**
            - Argo CD Applicationリソース名: `app-dev-{name}`, `app-prod-{name}`
            - Kubernetesデプロイ先namespace: `app-dev`, `app-prod` (共有) または `app-dev-{name}`, `app-prod-{name}` (分離型)
            - Backstageカタログのコンポーネント名
            - Argo CD UIでの表示名

            💡 リポジトリ名とは独立して設定可能です
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: Brief description of your application
        owner:
          title: Owner
          type: string
          description: Team or user that owns this application
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]
        repoUrl:
          title: Repository Location
          type: string
          description: |
            GitHubリポジトリの場所

            📌 **この設定が影響するもの:**
            - GitHubリポジトリURL: `https://github.com/{owner}/{repo}`
            - Argo CDのgit sync元
            - GitHub Actionsビルドパイプライン
            - コンテナイメージ名: `ghcr.io/{owner}/{repo}:{tag}`

            💡 推奨命名: `goldship-apps-{アプリ名}` (追跡しやすいため)
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - yu-min3

    - title: Domain & System
      required:
        - domainOption
      properties:
        domainOption:
          title: Domain
          type: string
          description: Select an existing domain or create a new one
          default: platform
          enum:
            - platform
            - new
          enumNames:
            - 'Platform (infrastructure and internal tools)'
            - '➕ Create New Domain'
        newDomainName:
          title: New Domain Name
          type: string
          description: Name for the new domain (lowercase, alphanumeric, hyphens only)
          pattern: '^[a-z0-9-]+$'
        newDomainDescription:
          title: New Domain Description
          type: string
          description: Description of the new domain
        newDomainOwner:
          title: New Domain Owner
          type: string
          description: Team that owns this domain
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group]
        systemOption:
          title: System
          type: string
          description: Select an existing system or create a new one
          default: developer-portal
          enum:
            - developer-portal
            - new
          enumNames:
            - 'Developer Portal (Backstage)'
            - '➕ Create New System'
        newSystemName:
          title: New System Name
          type: string
          description: Name for the new system (lowercase, alphanumeric, hyphens only)
          pattern: '^[a-z0-9-]+$'
        newSystemDescription:
          title: New System Description
          type: string
          description: Description of the new system
        newSystemOwner:
          title: New System Owner
          type: string
          description: Team that owns this system
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group]

  steps:
    # Step 1: Fetch template skeleton
    - id: fetch-base
      name: Fetch Base Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          repoName: ${{ (parameters.repoUrl | parseRepoUrl).repo }}
          repoOwner: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
          # Domain & System values
          domain: ${{ parameters.domainOption if parameters.domainOption != 'new' else parameters.newDomainName }}
          system: ${{ parameters.systemOption if parameters.systemOption != 'new' else parameters.newSystemName }}
          # Flags for conditional rendering
          createNewDomain: ${{ parameters.domainOption == 'new' }}
          createNewSystem: ${{ parameters.systemOption == 'new' }}
          # New domain/system details
          newDomainName: ${{ parameters.newDomainName }}
          newDomainDescription: ${{ parameters.newDomainDescription }}
          newDomainOwner: ${{ parameters.newDomainOwner }}
          newSystemName: ${{ parameters.newSystemName }}
          newSystemDescription: ${{ parameters.newSystemDescription }}
          newSystemOwner: ${{ parameters.newSystemOwner }}

    # Step 2: Create application repository
    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: private
        deleteBranchOnMerge: true
        gitCommitMessage: 'Initial commit from Backstage template'

    # Step 3a: Create Argo CD Application CRs
    - id: create-argocd-apps
      name: Create Argo CD Applications (Dev & Prod)
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=k8s-platform-config&owner=yu-min3
        branchName: add-app-${{ parameters.name }}
        title: 'Add Application: ${{ parameters.name }}'
        description: |
          Auto-generated by Backstage template.

          This PR adds the Argo CD Application CRs for **${{ parameters.name }}** in both Dev and Prod environments.

          ## Application Details

          - **Application Name**: `${{ parameters.name }}`
          - **Repository**: `${{ (parameters.repoUrl | parseRepoUrl).owner }}/${{ (parameters.repoUrl | parseRepoUrl).repo }}`
          - **Dev Application**: `app-dev-${{ parameters.name }}`
          - **Prod Application**: `app-prod-${{ parameters.name }}`
          - **Domain**: `${{ parameters.domainOption if parameters.domainOption != 'new' else parameters.newDomainName }}`
          - **System**: `${{ parameters.systemOption if parameters.systemOption != 'new' else parameters.newSystemName }}`

          **Location**: `base-infra/argocd/applications/apps/${{ parameters.name }}/argocd-apps.yaml`

          {% if parameters.domainOption == 'new' or parameters.systemOption == 'new' %}
          ## 📋 Catalog Updates

          This PR also includes:
          {% if parameters.domainOption == 'new' %}
          - ✨ **New Domain**: `${{ parameters.newDomainName }}` in `backstage-app/catalog/domains/${{ parameters.newDomainName }}.yaml`
          {% endif %}
          {% if parameters.systemOption == 'new' %}
          - ✨ **New System**: `${{ parameters.newSystemName }}` in the domain file
          {% endif %}

          **Location**: `.backstage/catalog/domains/new-domain.yaml`

          ⚠️ **Platform Engineer**: Please manually move this file to `backstage-app/catalog/domains/${{ parameters.newDomainName if parameters.domainOption == 'new' else parameters.domain }}.yaml` before merging.
          {% endif %}

          ## 🔐 Repository Authentication

          ✅ **No manual action required!**

          Argo CD is configured with Credential Templates that automatically authenticate all repositories under `https://github.com/${{ (parameters.repoUrl | parseRepoUrl).owner }}/` prefix.

          ## ⚠️ Platform Engineer Actions Required

          ### Review & Merge

          {% if parameters.domainOption == 'new' or parameters.systemOption == 'new' %}
          1. **Move catalog file**: Rename and move `.backstage/catalog/domains/new-domain.yaml` to `backstage-app/catalog/domains/${{ parameters.newDomainName if parameters.domainOption == 'new' else parameters.domain }}.yaml`
          2. **Delete source**: Delete `.backstage/catalog/` directory
          3. **Merge PR**: After moving files, merge this PR
          {% else %}
          Review this PR and merge.
          {% endif %}

          Argo CD will automatically:
          1. Detect the new Application CRs
          2. Authenticate to the repository using Credential Templates
          3. Sync the application to both Dev and Prod environments
        sourcePath: .backstage
        targetPath: base-infra/argocd/applications/apps/${{ parameters.name }}

    # Step 4: Register component in Backstage catalog
    - id: register
      name: Register Component
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    text:
      - title: 🎉 アプリケーション作成完了！
        content: |
          ## 次のステップ

          ### 1. Platform Configへのプルリクエスト
          Platform Engineerが作成済みの以下のPRをレビュー・マージします：
          - **PR**: [Platform Config PR](${{ steps['create-argocd-apps'].output.remoteUrl }})
          - **内容**: Argo CD Application CRsの追加

          ### 2. 最初のイメージリリース
          PRがマージされたら、上記リンクのアプリケーションリポジトリで最初のバージョンをリリースしてください：
          ```bash
          cd ${{ (parameters.repoUrl | parseRepoUrl).repo }}
          git tag v0.1.0
          git push origin v0.1.0
          ```
          GitHub Actionsが自動的にイメージをビルドしてGHCRにプッシュします。

          ### 3. アプリケーションがデプロイされます
          Argo CDが自動的に以下の環境にデプロイします：
          - **Dev環境**: `app-dev` namespace
          - **Prod環境**: `app-prod` namespace

          デプロイ状況は Argo CD UI で確認できます。

    links:
      - title: 📦 アプリケーションリポジトリ
        url: ${{ steps.publish.output.remoteUrl }}
      - title: 📋 Backstageカタログで開く
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
      - title: 🔀 Platform Config PR
        url: ${{ steps['create-argocd-apps'].output.remoteUrl }}
      - title: 🚀 Argo CD App (Dev)
        url: http://192.168.0.240/applications/app-dev-${{ parameters.name }}
      - title: 🚀 Argo CD App (Prod)
        url: http://192.168.0.240/applications/app-prod-${{ parameters.name }}
