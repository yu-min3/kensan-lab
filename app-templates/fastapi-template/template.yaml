apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: fastapi-app-template
  title: FastAPI Application
  description: Create a new FastAPI application with Kustomize-based GitOps deployment
  tags:
    - python
    - fastapi
    - gitops
    - kustomize
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Application Information
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Application Name
          type: string
          description: Unique name for your application (lowercase, alphanumeric, hyphens only)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: Brief description of your application
        owner:
          title: Owner
          type: string
          description: GitHub username or team
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]

    - title: Repository Configuration
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - yu-min3  # Your GitHub organization

  steps:
    # Step 1: Fetch template skeleton
    - id: fetch-base
      name: Fetch Base Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}

    # Step 2: Create application repository
    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: private
        deleteBranchOnMerge: true
        gitCommitMessage: 'Initial commit from Backstage template'

    # Step 3: Create Argo CD Application CRs
    - id: create-argocd-apps
      name: Create Argo CD Applications (Dev & Prod)
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=k8s-platform-config&owner=yu-min3
        branchName: add-app-${{ parameters.name }}
        title: 'Add Argo CD Applications: ${{ parameters.name }}'
        description: |
          Auto-generated by Backstage template.

          This PR adds the Argo CD Application CRs for **${{ parameters.name }}** in both Dev and Prod environments.

          - `app-dev-${{ parameters.name }}`
          - `app-prod-${{ parameters.name }}`

          **Location**: `base-infra/argocd/applications/apps/${{ parameters.name }}/argocd-apps.yaml`

          ## Platform Engineer Actions

          ✅ **Repository Access**: Pre-configured (GitHub organization-wide credentials)

          **Review & Merge**: Please review the Application manifests and merge when ready. Argo CD will automatically sync the applications.
        sourcePath: .backstage
        targetPath: base-infra/argocd/applications/apps/${{ parameters.name }}

    # Step 4: Register component in Backstage catalog
    - id: register
      name: Register Component
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in Backstage
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
      - title: Platform Config PR
        url: ${{ steps['create-argocd-apps'].output.remoteUrl }}
      - title: Argo CD App (Dev)
        url: http://192.168.0.240/applications/app-dev-${{ parameters.name }}
      - title: Argo CD App (Prod)
        url: http://192.168.0.240/applications/app-prod-${{ parameters.name }}
