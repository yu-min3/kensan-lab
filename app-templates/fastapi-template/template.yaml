apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: fastapi-app-template
  title: FastAPI Application
  description: Create a new FastAPI application with Kustomize-based GitOps deployment
  tags:
    - python
    - fastapi
    - gitops
    - kustomize
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Application Information
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Application Name
          type: string
          description: Unique name for your application (lowercase, alphanumeric, hyphens only)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: Brief description of your application
        owner:
          title: Owner
          type: string
          description: GitHub username or team
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]

    - title: Repository Configuration
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - yu-min3  # Your GitHub organization

  steps:
    # Step 1: Fetch template skeleton
    - id: fetch-base
      name: Fetch Base Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}

    # Step 2: Create application repository
    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        allowedHosts: ['github.com']
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: private
        deleteBranchOnMerge: true
        gitCommitMessage: 'Initial commit from Backstage template'

    # Step 3: Create Argo CD Application CR for Dev environment
    - id: create-argocd-app-dev
      name: Create Argo CD Application (Dev)
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=platform-config&owner=yu-min3
        branchName: add-app-${{ parameters.name }}-dev
        title: 'Add Argo CD Application: ${{ parameters.name }} (Dev)'
        description: |
          Auto-generated by Backstage template.

          This PR adds the Argo CD Application CR for **${{ parameters.name }}** in the **Dev** environment.
        targetPath: base-infra/argocd/applications
        sourcePath: .backstage/argocd-app-dev.yaml

    # Step 4: Create Argo CD Application CR for Prod environment
    - id: create-argocd-app-prod
      name: Create Argo CD Application (Prod)
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=platform-config&owner=yu-min3
        branchName: add-app-${{ parameters.name }}-prod
        title: 'Add Argo CD Application: ${{ parameters.name }} (Prod)'
        description: |
          Auto-generated by Backstage template.

          This PR adds the Argo CD Application CR for **${{ parameters.name }}** in the **Prod** environment.
        targetPath: base-infra/argocd/applications
        sourcePath: .backstage/argocd-app-prod.yaml

    # Step 5: Register component in Backstage catalog
    - id: register
      name: Register Component
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in Backstage
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
      - title: Argo CD App (Dev)
        url: https://argocd.yu-min3.com/applications/app-dev-${{ parameters.name }}
      - title: Argo CD App (Prod)
        url: https://argocd.yu-min3.com/applications/app-prod-${{ parameters.name }}
