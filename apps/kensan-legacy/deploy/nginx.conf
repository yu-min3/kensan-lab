worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Request size (file uploads)
    client_max_body_size 50m;

    # Upstream definitions
    upstream frontend   { server frontend:5173; }
    upstream user-svc   { server user-service:8081; }
    upstream task-svc   { server task-service:8082; }
    upstream time-svc   { server timeblock-service:8084; }
    upstream analytics  { server analytics-service:8088; }
    upstream ai-svc     { server ai-service:8089; }
    upstream memo-svc   { server memo-service:8090; }
    upstream note-svc   { server note-service:8091; }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name kensan.yu-min3.com;

        ssl_certificate     /etc/letsencrypt/live/kensan.yu-min3.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kensan.yu-min3.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # =====================================================================
        # Block admin endpoints
        # =====================================================================
        location /api/v1/admin {
            return 403 '{"error":{"code":"FORBIDDEN","message":"Admin endpoints are not accessible"}}';
            add_header Content-Type application/json always;
        }

        # =====================================================================
        # user-service
        # =====================================================================
        location /api/v1/auth {
            proxy_pass http://user-svc;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/users {
            proxy_pass http://user-svc;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/demo {
            proxy_pass http://user-svc;
            include /etc/nginx/proxy_params;
        }

        # =====================================================================
        # task-service
        # =====================================================================
        location /api/v1/goals {
            proxy_pass http://task-svc;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/milestones {
            proxy_pass http://task-svc;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/tags {
            proxy_pass http://task-svc;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/note-tags {
            proxy_pass http://task-svc;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/tasks {
            proxy_pass http://task-svc;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/entity-memos {
            proxy_pass http://task-svc;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/todos {
            proxy_pass http://task-svc;
            include /etc/nginx/proxy_params;
        }

        # =====================================================================
        # timeblock-service
        # =====================================================================
        location /api/v1/timeblocks {
            proxy_pass http://time-svc;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/time-entries {
            proxy_pass http://time-svc;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/timer {
            proxy_pass http://time-svc;
            include /etc/nginx/proxy_params;
        }

        # =====================================================================
        # analytics-service
        # =====================================================================
        location /api/v1/analytics {
            proxy_pass http://analytics;
            include /etc/nginx/proxy_params;
        }

        # =====================================================================
        # memo-service
        # =====================================================================
        location /api/v1/memos {
            proxy_pass http://memo-svc;
            include /etc/nginx/proxy_params;
        }

        # =====================================================================
        # note-service
        # =====================================================================
        location /api/v1/notes {
            proxy_pass http://note-svc;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/note-types {
            proxy_pass http://note-svc;
            include /etc/nginx/proxy_params;
        }

        # =====================================================================
        # ai-service (SSE support)
        # =====================================================================
        location /api/v1/agent {
            proxy_pass http://ai-svc;
            include /etc/nginx/proxy_params;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            chunked_transfer_encoding on;
        }
        location /api/v1/conversations {
            proxy_pass http://ai-svc;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/interactions {
            proxy_pass http://ai-svc;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/prompts {
            proxy_pass http://ai-svc;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/explorer {
            proxy_pass http://ai-svc;
            include /etc/nginx/proxy_params;
        }

        # =====================================================================
        # Health checks
        # =====================================================================
        location = /health/user-service {
            proxy_pass http://user-svc/health;
            include /etc/nginx/proxy_params;
        }
        location = /health/task-service {
            proxy_pass http://task-svc/health;
            include /etc/nginx/proxy_params;
        }
        location = /health/timeblock-service {
            proxy_pass http://time-svc/health;
            include /etc/nginx/proxy_params;
        }
        location = /health/analytics-service {
            proxy_pass http://analytics/health;
            include /etc/nginx/proxy_params;
        }
        location = /health/ai-service {
            proxy_pass http://ai-svc/health;
            include /etc/nginx/proxy_params;
        }
        location = /health/memo-service {
            proxy_pass http://memo-svc/health;
            include /etc/nginx/proxy_params;
        }
        location = /health/note-service {
            proxy_pass http://note-svc/health;
            include /etc/nginx/proxy_params;
        }

        # =====================================================================
        # Frontend (SPA - catch-all)
        # =====================================================================
        location / {
            proxy_pass http://frontend;
            include /etc/nginx/proxy_params;
        }
    }
}
