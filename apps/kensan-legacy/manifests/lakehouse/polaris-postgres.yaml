## Polaris (Iceberg catalog metastore) 専用 Postgres。
## dagster-postgres と同じ「専用 StatefulSet + VCO dynamic cred + ESO + reloader」パターン。
##
## このマニフェストは StatefulSet 自身の bootstrap 用に static admin cred
## (POLARIS_PG_USER / POLARIS_PG_PASSWORD / POLARIS_PG_DB, ExternalSecret 由来) のみ使う。
## Polaris アプリ (server + admin-tool) は VCO dynamic cred (postgres-polaris-cred) で接続する。
##
## init script は relational-jdbc が使う固定 schema POLARIS_SCHEMA を stable owner "polaris"
## (= POSTGRES_USER, superuser) で事前作成する。これにより:
##   - dynamic user の rotation (生成/TTL 失効) で schema が消えない
##   - admin-tool bootstrap の "CREATE SCHEMA IF NOT EXISTS POLARIS_SCHEMA" が no-op になる
##   - dynamic user は VCO role の extraSchemas 権限で POLARIS_SCHEMA 内を読み書きできる
apiVersion: v1
kind: ConfigMap
metadata:
  name: polaris-postgres-init
  namespace: kensan
data:
  init-polaris-schema.sql: |
    -- relational-jdbc bootstrap が作る固定 schema を stable owner (= POSTGRES_USER) で事前作成。
    -- docker-entrypoint-initdb.d は POSTGRES_DB に接続した状態で psql 実行されるため owner は polaris。
    -- 注: Polaris の schema-v3.sql は "CREATE SCHEMA IF NOT EXISTS POLARIS_SCHEMA" (unquoted) を発行する。
    -- Postgres は unquoted identifier を小文字畳み込みするため実体の schema 名は polaris_schema (小文字)。
    -- ここでも小文字で作成して一致させる (大文字 quoted で作ると別 schema になり bootstrap が衝突する)。
    CREATE SCHEMA IF NOT EXISTS polaris_schema;
---
apiVersion: v1
kind: Service
metadata:
  name: polaris-postgres
  namespace: kensan
  labels:
    app: polaris-postgres
spec:
  selector:
    app: polaris-postgres
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: polaris-postgres
  namespace: kensan
spec:
  serviceName: polaris-postgres
  replicas: 1
  selector:
    matchLabels:
      app: polaris-postgres
  template:
    metadata:
      labels:
        app: polaris-postgres
      annotations:
        # Istio sidecar が PostgreSQL wire protocol を壊して "unexpected EOF" を起こすため除外
        # (dagster-postgres / kensan postgresql と同じ。PeerAuthentication=PERMISSIVE で平文接続 OK)
        sidecar.istio.io/inject: "false"
    spec:
      containers:
      - name: polaris-postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: kensan-lakehouse-credentials
              key: POLARIS_PG_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kensan-lakehouse-credentials
              key: POLARIS_PG_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: kensan-lakehouse-credentials
              key: POLARIS_PG_DB
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          exec:
            command: ["sh", "-c", "pg_isready -U $POSTGRES_USER"]
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["sh", "-c", "pg_isready -U $POSTGRES_USER"]
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: init-script
        configMap:
          name: polaris-postgres-init
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      # local-path は reclaimPolicy=Delete で災害時にデータ物理削除されるため Longhorn (Retain + replica) を使う
      storageClassName: longhorn
      resources:
        requests:
          storage: 1Gi
