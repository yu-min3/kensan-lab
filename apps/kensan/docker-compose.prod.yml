# Production overlay for GCE deployment
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  # ===========================================================================
  # Nginx reverse proxy (public: port 80)
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: kensan-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/proxy_params:/etc/nginx/proxy_params:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - user-service
      - task-service
      - timeblock-service
      - analytics-service
      - ai-service
      - memo-service
      - note-service
    restart: unless-stopped
    networks:
      - kensan-network

  # ===========================================================================
  # Frontend: same-origin (all VITE_*_SERVICE_URL empty)
  # ===========================================================================
  frontend:
    build:
      args:
        - VITE_USER_SERVICE_URL=
        - VITE_TASK_SERVICE_URL=
        - VITE_TIMEBLOCK_SERVICE_URL=
        - VITE_ANALYTICS_SERVICE_URL=
        - VITE_AI_SERVICE_URL=
        - VITE_MEMO_SERVICE_URL=
        - VITE_NOTE_SERVICE_URL=
    ports: !reset []

  # ===========================================================================
  # Backend: remove external ports, set prod env + CORS
  # ===========================================================================
  user-service:
    ports: !reset []
    environment:
      SERVER_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: "https://kensan.yu-min3.com,http://${GCE_IP}"

  task-service:
    ports: !reset []
    environment:
      SERVER_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: "https://kensan.yu-min3.com,http://${GCE_IP}"

  timeblock-service:
    ports: !reset []
    environment:
      SERVER_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: "https://kensan.yu-min3.com,http://${GCE_IP}"

  analytics-service:
    ports: !reset []
    environment:
      SERVER_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: "https://kensan.yu-min3.com,http://${GCE_IP}"

  ai-service:
    ports: !reset []
    environment:
      SERVER_ENV: production
      AI_PROVIDER: google
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-2.0-flash}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: "https://kensan.yu-min3.com,http://${GCE_IP}"

  memo-service:
    ports: !reset []
    environment:
      SERVER_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: "https://kensan.yu-min3.com,http://${GCE_IP}"

  note-service:
    ports: !reset []
    environment:
      SERVER_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      STORAGE_ENDPOINT: ${GCE_IP}:9000
      STORAGE_PUBLIC_URL: http://${GCE_IP}:9000/kensan-notes
      CORS_ALLOWED_ORIGINS: "https://kensan.yu-min3.com,http://${GCE_IP}"

  # ===========================================================================
  # MinIO: S3 API only (no console)
  # ===========================================================================
  minio:
    ports: !override
      - "9000:9000"

  minio-init:
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 kensan kensan-minio &&
      mc mb --ignore-existing local/kensan-notes &&
      mc mb --ignore-existing local/kensan-lakehouse &&
      echo '{\"CORSRules\":[{\"AllowedOrigins\":[\"http://${GCE_IP}\"],\"AllowedMethods\":[\"GET\",\"PUT\"],\"AllowedHeaders\":[\"*\"],\"MaxAgeSeconds\":3600}]}' | mc cors set local/kensan-notes /dev/stdin
      "

  # ===========================================================================
  # Observability: remove all external ports
  # ===========================================================================
  otel-collector:
    ports: !reset []

  tempo:
    ports: !reset []

  loki:
    ports: !reset []

  prometheus:
    ports: !reset []

  grafana:
    ports: !reset []

  # ===========================================================================
  # Lakehouse: remove external ports
  # ===========================================================================
  polaris:
    ports: !reset []

  dagster-webserver:
    ports: !reset []

  # ===========================================================================
  # Infrastructure: remove postgres external port
  # ===========================================================================
  postgres:
    ports: !reset []
