services:
  # =============================================================================
  # Observability
  # =============================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: kensan-otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    restart: unless-stopped
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
      - "13133:13133" # Health check
    depends_on:
      - tempo
      - loki
    networks:
      - kensan-network

  tempo:
    image: grafana/tempo:2.6.1
    container_name: kensan-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
    networks:
      - kensan-network

  loki:
    image: grafana/loki:3.3.2
    container_name: kensan-loki
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./observability/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - kensan-network

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: kensan-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.retention.time=48h"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - kensan-network

  grafana:
    image: grafana/grafana:11.4.0
    container_name: kensan-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - kensan-network

  # =============================================================================
  # Infrastructure
  # =============================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kensan-postgres
    environment:
      POSTGRES_USER: kensan
      POSTGRES_PASSWORD: kensan
      POSTGRES_DB: kensan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations-v2:/migrations:ro
      - ./backend/migrations-v2/docker-init.sh:/docker-entrypoint-initdb.d/00-apply-migrations.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kensan"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kensan-network

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: kensan-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kensan
      MINIO_ROOT_PASSWORD: kensan-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      kensan-network:
        aliases:
          - kensan-lakehouse.kensan-minio

  minio-init:
    image: minio/mc:latest
    container_name: kensan-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 kensan kensan-minio &&
      mc mb --ignore-existing local/kensan-notes &&
      mc mb --ignore-existing local/kensan-lakehouse &&
      echo '{\"CORSRules\":[{\"AllowedOrigins\":[\"http://localhost:5173\"],\"AllowedMethods\":[\"GET\",\"PUT\"],\"AllowedHeaders\":[\"*\"],\"MaxAgeSeconds\":3600}]}' | mc cors set local/kensan-notes /dev/stdin
      "
    networks:
      - kensan-network

  # =============================================================================
  # Frontend
  # =============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_USER_SERVICE_URL=http://localhost:8081
        - VITE_TASK_SERVICE_URL=http://localhost:8082
        - VITE_TIMEBLOCK_SERVICE_URL=http://localhost:8084
        - VITE_ANALYTICS_SERVICE_URL=http://localhost:8088
        - VITE_AI_SERVICE_URL=http://localhost:8089
        - VITE_MEMO_SERVICE_URL=http://localhost:8090
        - VITE_NOTE_SERVICE_URL=http://localhost:8091
    container_name: kensan-frontend
    ports:
      - "5173:5173"
    networks:
      - kensan-network

  # =============================================================================
  # Backend Services
  # =============================================================================
  user-service:
    build:
      context: ./backend
      dockerfile: services/user/Dockerfile
    container_name: kensan-user-service
    environment:
      SERVER_PORT: 8081
      SERVER_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kensan
      DB_PASSWORD: kensan
      DB_NAME: kensan
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      OTEL_ENABLED: "true"
      OTEL_COLLECTOR_URL: "otel-collector:4318"
      DEMO_SEED_DIR: /app/seeds
    volumes:
      - ./backend/migrations-v2/seeds:/app/seeds:ro
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kensan-network

  task-service:
    build:
      context: ./backend
      dockerfile: services/task/Dockerfile
    container_name: kensan-task-service
    environment:
      SERVER_PORT: 8082
      SERVER_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kensan
      DB_PASSWORD: kensan
      DB_NAME: kensan
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      OTEL_ENABLED: "true"
      OTEL_COLLECTOR_URL: "otel-collector:4318"
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kensan-network

  timeblock-service:
    build:
      context: ./backend
      dockerfile: services/timeblock/Dockerfile
    container_name: kensan-timeblock-service
    environment:
      SERVER_PORT: 8084
      SERVER_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kensan
      DB_PASSWORD: kensan
      DB_NAME: kensan
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      OTEL_ENABLED: "true"
      OTEL_COLLECTOR_URL: "otel-collector:4318"
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kensan-network

  analytics-service:
    build:
      context: ./backend
      dockerfile: services/analytics/Dockerfile
    container_name: kensan-analytics-service
    environment:
      SERVER_PORT: 8088
      SERVER_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kensan
      DB_PASSWORD: kensan
      DB_NAME: kensan
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      OTEL_ENABLED: "true"
      OTEL_COLLECTOR_URL: "otel-collector:4318"
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kensan-network

  ai-service:
    build:
      context: ./kensan-ai
      dockerfile: Dockerfile
    container_name: kensan-ai-service
    environment:
      SERVER_PORT: 8089
      SERVER_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kensan
      DB_PASSWORD: kensan
      DB_NAME: kensan
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      AI_PROVIDER: ${AI_PROVIDER:-google}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-2.0-flash}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-gemini}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: kensan
      MINIO_SECRET_KEY: kensan-minio
      MINIO_BUCKET: kensan-notes
      MINIO_USE_SSL: "false"
      OTEL_ENABLED: "true"
      OTEL_COLLECTOR_URL: "otel-collector:4318"
      OTEL_SEMCONV_STABILITY_OPT_IN: "http"
      LAKEHOUSE_ENABLED: "true"
      POLARIS_URI: "http://polaris:8181/api/catalog"
      POLARIS_CREDENTIAL: "root:s3cr3t"
      POLARIS_WAREHOUSE: "kensan-lakehouse"
      LAKEHOUSE_S3_ENDPOINT: "http://minio:9000"
      LAKEHOUSE_S3_ACCESS_KEY: "kensan"
      LAKEHOUSE_S3_SECRET_KEY: "kensan-minio"
    ports:
      - "8089:8089"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      polaris:
        condition: service_healthy
    networks:
      - kensan-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # =============================================================================
  # Lakehouse (Polaris + Dagster)
  # =============================================================================
  polaris:
    image: apache/polaris:latest
    container_name: kensan-polaris
    ports:
      - "8181:8181"
      - "8182:8182"
    environment:
      POLARIS_BOOTSTRAP_CREDENTIALS: "POLARIS,root,s3cr3t"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: kensan
      AWS_SECRET_ACCESS_KEY: kensan-minio
    volumes:
      - ./lakehouse/polaris-config/application.properties:/deployments/config/application.properties:ro
      - ./lakehouse/polaris-config/aws-config:/root/.aws/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8182/q/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      dagster-postgres:
        condition: service_healthy
    networks:
      - kensan-network

  dagster-postgres:
    image: postgres:16-alpine
    container_name: kensan-dagster-postgres
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    volumes:
      - dagster_pg_data:/var/lib/postgresql/data
      - ./lakehouse/init-polaris-db.sql:/docker-entrypoint-initdb.d/02-polaris.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - kensan-network

  dagster-user-code:
    build:
      context: ./lakehouse
      dockerfile: Dockerfile.dagster
    container_name: kensan-dagster-user-code
    env_file:
      - ./lakehouse/.env
    environment:
      DAGSTER_HOME: /app
      DAGSTER_PG_URL: postgresql://dagster:dagster@dagster-postgres:5432/dagster
      DAGSTER_CURRENT_IMAGE: kensan-dagster-user-code
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      dagster-postgres:
        condition: service_healthy
    networks:
      - kensan-network

  dagster-webserver:
    build:
      context: ./lakehouse
      dockerfile: Dockerfile.dagster
    container_name: kensan-dagster-webserver
    entrypoint: ["uv", "run", "dagster-webserver", "-h", "0.0.0.0", "-p", "3070", "-w", "workspace.yaml"]
    env_file:
      - ./lakehouse/.env
    environment:
      DAGSTER_HOME: /app
      DAGSTER_PG_URL: postgresql://dagster:dagster@dagster-postgres:5432/dagster
    ports:
      - "3070:3070"
    depends_on:
      dagster-postgres:
        condition: service_healthy
      dagster-user-code:
        condition: service_started
    networks:
      - kensan-network

  dagster-daemon:
    build:
      context: ./lakehouse
      dockerfile: Dockerfile.dagster
    container_name: kensan-dagster-daemon
    entrypoint: ["uv", "run", "dagster-daemon", "run"]
    env_file:
      - ./lakehouse/.env
    environment:
      DAGSTER_HOME: /app
      DAGSTER_PG_URL: postgresql://dagster:dagster@dagster-postgres:5432/dagster
    depends_on:
      dagster-postgres:
        condition: service_healthy
      dagster-user-code:
        condition: service_started
    networks:
      - kensan-network

  memo-service:
    build:
      context: ./backend
      dockerfile: services/memo/Dockerfile
    container_name: kensan-memo-service
    environment:
      SERVER_PORT: 8090
      SERVER_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kensan
      DB_PASSWORD: kensan
      DB_NAME: kensan
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      OTEL_ENABLED: "true"
      OTEL_COLLECTOR_URL: "otel-collector:4318"
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kensan-network

  note-service:
    build:
      context: ./backend
      dockerfile: services/note/Dockerfile
    container_name: kensan-note-service
    environment:
      SERVER_PORT: 8091
      SERVER_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kensan
      DB_PASSWORD: kensan
      DB_NAME: kensan
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: kensan
      STORAGE_SECRET_KEY: kensan-minio
      STORAGE_BUCKET: kensan-notes
      STORAGE_USE_SSL: "false"
      STORAGE_PUBLIC_URL: http://localhost:9000/kensan-notes
      OTEL_ENABLED: "true"
      OTEL_COLLECTOR_URL: "otel-collector:4318"
    ports:
      - "8091:8091"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - kensan-network

networks:
  kensan-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  dagster_pg_data:
  tempo_data:
  loki_data:
  prometheus_data:
  grafana_data:
