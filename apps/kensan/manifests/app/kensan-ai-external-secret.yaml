apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kensan-ai
  namespace: kensan-prod
  namespace: kensan-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kensan-ai-credentials
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef: { key: kensan/prod/ai, property: ANTHROPIC_API_KEY }
    - secretKey: LAKEHOUSE_S3_ACCESS_KEY
      remoteRef: { key: kensan/prod/ai, property: LAKEHOUSE_S3_ACCESS_KEY }
    - secretKey: LAKEHOUSE_S3_SECRET_KEY
      remoteRef: { key: kensan/prod/ai, property: LAKEHOUSE_S3_SECRET_KEY }
    - secretKey: MINIO_ACCESS_KEY
      remoteRef: { key: kensan/prod/ai, property: MINIO_ACCESS_KEY }
    - secretKey: MINIO_SECRET_KEY
      remoteRef: { key: kensan/prod/ai, property: MINIO_SECRET_KEY }
    - secretKey: OPENAI_API_KEY
      remoteRef: { key: kensan/prod/ai, property: OPENAI_API_KEY }
    - secretKey: POLARIS_CREDENTIAL
      remoteRef: { key: kensan/prod/ai, property: POLARIS_CREDENTIAL }
