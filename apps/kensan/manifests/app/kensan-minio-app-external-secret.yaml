apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kensan-minio-app
  namespace: kensan-prod
  namespace: kensan-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kensan-minio-app-credentials
    creationPolicy: Owner
  data:
    - secretKey: MINIO_ACCESS_KEY
      remoteRef: { key: kensan/prod/minio-app, property: MINIO_ACCESS_KEY }
    - secretKey: MINIO_SECRET_KEY
      remoteRef: { key: kensan/prod/minio-app, property: MINIO_SECRET_KEY }
    - secretKey: STORAGE_ACCESS_KEY
      remoteRef: { key: kensan/prod/minio-app, property: STORAGE_ACCESS_KEY }
    - secretKey: STORAGE_SECRET_KEY
      remoteRef: { key: kensan/prod/minio-app, property: STORAGE_SECRET_KEY }
