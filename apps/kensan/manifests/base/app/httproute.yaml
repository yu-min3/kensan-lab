apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kensan-route
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway-dev
    namespace: istio-system
  hostnames:
  - "kensan.app.yu-min3.com"
  rules:
  # user-service: auth, users, demo
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/auth
    - path:
        type: PathPrefix
        value: /api/v1/users
    - path:
        type: PathPrefix
        value: /api/v1/demo
    backendRefs:
    - name: user-service
      port: 8081
  # task-service: goals, milestones, tags, note-tags, tasks, entity-memos, todos
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/goals
    - path:
        type: PathPrefix
        value: /api/v1/milestones
    - path:
        type: PathPrefix
        value: /api/v1/tags
    - path:
        type: PathPrefix
        value: /api/v1/note-tags
    - path:
        type: PathPrefix
        value: /api/v1/tasks
    - path:
        type: PathPrefix
        value: /api/v1/entity-memos
    - path:
        type: PathPrefix
        value: /api/v1/todos
    backendRefs:
    - name: task-service
      port: 8082
  # timeblock-service: timeblocks, time-entries, timer
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/timeblocks
    - path:
        type: PathPrefix
        value: /api/v1/time-entries
    - path:
        type: PathPrefix
        value: /api/v1/timer
    backendRefs:
    - name: timeblock-service
      port: 8084
  # analytics-service
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/analytics
    backendRefs:
    - name: analytics-service
      port: 8088
  # memo-service
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/memos
    backendRefs:
    - name: memo-service
      port: 8090
  # note-service: notes, note-types
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/notes
    - path:
        type: PathPrefix
        value: /api/v1/note-types
    backendRefs:
    - name: note-service
      port: 8091
  # kensan-ai: agent, conversations, interactions, prompts, explorer
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/agent
    - path:
        type: PathPrefix
        value: /api/v1/conversations
    - path:
        type: PathPrefix
        value: /api/v1/interactions
    - path:
        type: PathPrefix
        value: /api/v1/prompts
    - path:
        type: PathPrefix
        value: /api/v1/explorer
    backendRefs:
    - name: kensan-ai
      port: 8089
  # Frontend catch-all (SPA)
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend
      port: 80
