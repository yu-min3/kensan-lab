apiVersion: v1
kind: Service
metadata:
  name: memo-service
  labels:
    app: memo-service
spec:
  selector:
    app: memo-service
  ports:
  - port: 8090
    targetPort: 8090
    name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memo-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memo-service
  template:
    metadata:
      labels:
        app: memo-service
    spec:
      containers:
      - name: memo-service
        image: ghcr.io/yu-min3/kensan-memo:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: kensan-env-config
        env:
        - name: SERVER_PORT
          value: "8090"
        - name: DB_HOST
          value: postgresql.kensan-data.svc.cluster.local
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: kensan-app-credentials
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kensan-app-credentials
              key: DB_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: kensan-app-credentials
              key: JWT_SECRET
        - name: OTEL_ENABLED
          value: "true"
        - name: OTEL_COLLECTOR_URL
          value: "otel-collector-opentelemetry-collector.monitoring.svc:4318"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=memo-service,service.namespace=kensan,deployment.environment=$(DEPLOYMENT_ENVIRONMENT)"
        ports:
        - containerPort: 8090
          name: http
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 5
          periodSeconds: 5
