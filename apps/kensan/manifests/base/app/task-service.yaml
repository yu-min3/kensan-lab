apiVersion: v1
kind: Service
metadata:
  name: task-service
  labels:
    app: task-service
spec:
  selector:
    app: task-service
  ports:
  - port: 8082
    targetPort: 8082
    name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - amd64
      containers:
      - name: task-service
        image: ghcr.io/yu-min3/kensan-task:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: kensan-env-config
        env:
        - name: SERVER_PORT
          value: "8082"
        - name: DB_HOST
          value: postgresql.kensan-data.svc.cluster.local
        - name: DB_PORT
          value: "5432"
        ## Vault dynamic cred (rotation 12h)
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-kensan-app-cred
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-kensan-app-cred
              key: DB_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: kensan-app-credentials
              key: JWT_SECRET
        - name: OTEL_ENABLED
          value: "true"
        - name: OTEL_COLLECTOR_URL
          value: "otel-collector-opentelemetry-collector.monitoring.svc:4318"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=task-service,service.namespace=kensan,deployment.environment=$(DEPLOYMENT_ENVIRONMENT)"
        ports:
        - containerPort: 8082
          name: http
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 5
