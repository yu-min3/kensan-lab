apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kensan-db
  namespace: kensan-data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kensan-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: kensan/data/db
        property: POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: kensan/data/db
        property: POSTGRES_PASSWORD
