      10, 0.3, false, true
    );

    -- Seed initial context versions (version_number=1) for all active contexts
    INSERT INTO ai_context_versions (context_id, version_number, system_prompt, allowed_tools, max_turns, temperature, changelog)
    SELECT id, 1, system_prompt, allowed_tools, max_turns, temperature, '初期バージョン'
    FROM ai_contexts
    WHERE is_active = true;

    COMMIT;
  003_experiment_version_model.sql: |
    -- 003: Experiment -> Version model migration
    -- Experiments now reference versions within the same context instead of separate contexts

    -- Add new version-based columns
    ALTER TABLE prompt_experiments
      ADD COLUMN context_id UUID REFERENCES ai_contexts(id),
      ADD COLUMN control_version INTEGER,
      ADD COLUMN variant_version INTEGER,
      ADD COLUMN comparison_id UUID REFERENCES prompt_comparisons(id);

    -- Drop old context-based columns and challenge columns
    ALTER TABLE prompt_experiments
      DROP COLUMN control_context_id,
      DROP COLUMN variant_context_id,
      DROP COLUMN challenge_type,
      DROP COLUMN challenge_config,
      DROP COLUMN challenge_results,
      DROP COLUMN win_rate;
  004_fix_chat_schedule_date_range.sql: |
    -- 004: Fix schedule proposal date range instructions in chat context
    -- Problem: AI was proposing schedules for next week when user asked for "今週"
    -- because the prompt lacked explicit date range guidance.

    UPDATE ai_contexts
    SET system_prompt = REPLACE(
      REPLACE(
        system_prompt,
        '- 「今週の予定を立てて」→ {weekly_summary}で今週の時間配分を把握済み。get_time_blocks + get_tasks で既存の予定と未消化タスクを取得 → 生産性ピーク時間帯({user_patterns})を活かして create_time_block をまとめて提案',
        '- 「今週の予定を立てて」→ {weekly_summary}で今週の時間配分を把握済み。get_time_blocks(start_date=今日, end_date=今週日曜) + get_tasks で既存の予定と未消化タスクを取得 → 生産性ピーク時間帯({user_patterns})を活かして、**今日から今週日曜日まで**の範囲で create_time_block をまとめて提案'
      ),
      '- 日付は JST 基準。「今日」「明日」等は JST で解釈する
    - 曖昧な時間',
      '- 日付は JST 基準。「今日」「明日」等は JST で解釈する
    - スケジュール提案の日付範囲: 「今週」→ 今日〜今週の日曜日（{current_datetime}の週）。「来週」→ 次の月曜〜日曜。時期指定なし→ 今日〜今週日曜。**ユーザーが指定した期間を超えて提案しない**（「今週」と言われたら来週の日付を含めない）
    - 曖昧な時間'
    )
    WHERE situation = 'chat';
  005_version_centric.sql: |
    -- 005: Version-centric architecture migration
    -- Drop experiment/comparison tables, add version metadata columns

    -- Drop dependent tables first (prompt_experiments references prompt_comparisons)
    DROP TABLE IF EXISTS prompt_experiments;
    DROP TABLE IF EXISTS prompt_comparisons;

    -- Remove experiment-related columns from ai_contexts
    DROP INDEX IF EXISTS idx_ai_contexts_experiment_id;
    ALTER TABLE ai_contexts DROP COLUMN IF EXISTS experiment_id;
    ALTER TABLE ai_contexts DROP COLUMN IF EXISTS traffic_weight;

    -- Add metadata columns to ai_context_versions
    ALTER TABLE ai_context_versions
      ADD COLUMN IF NOT EXISTS source VARCHAR(20) NOT NULL DEFAULT 'manual',
      ADD COLUMN IF NOT EXISTS eval_summary JSONB,
      ADD COLUMN IF NOT EXISTS candidate_status VARCHAR(20);

    -- Add active_version tracking to ai_contexts
    ALTER TABLE ai_contexts
      ADD COLUMN IF NOT EXISTS active_version INTEGER;

    -- Initialize active_version from current max version_number
    UPDATE ai_contexts c SET active_version = (
      SELECT MAX(version_number) FROM ai_context_versions WHERE context_id = c.id
    ) WHERE active_version IS NULL;
  006_add_mindmap_content_type.sql: |
    -- Add 'mindmap' to note_contents.content_type CHECK constraint
    ALTER TABLE note_contents
        DROP CONSTRAINT IF EXISTS note_contents_content_type_check;

    ALTER TABLE note_contents
        ADD CONSTRAINT note_contents_content_type_check
        CHECK (content_type IN ('markdown', 'drawio', 'image', 'pdf', 'code', 'mindmap'));
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
data:
  00-init.sh: |
    #!/bin/bash
    set -e
    echo "Creating databases kensan_dev and kensan_prod..."
    for db in kensan_dev kensan_prod; do
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" -c "CREATE DATABASE $db;" || true
      for f in /migrations/[0-9]*.sql; do
        [ -f "$f" ] || continue
        echo "Applying $(basename "$f") to $db..."
        psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$db" -f "$f"
      done
    done
    echo "Database initialization complete."
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  labels:
    app: postgresql
spec:
  selector:
    app: postgresql
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: hardware-class
                operator: In
                values:
                - high-performance
      containers:
      - name: postgresql
        image: pgvector/pgvector:pg16
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: kensan-db-credentials
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kensan-db-credentials
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d
        - name: migrations
          mountPath: /migrations
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          exec:
            command: ["pg_isready"]
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["pg_isready"]
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: init-script
        configMap:
          name: postgres-init-script
          defaultMode: 0755
      - name: migrations
        configMap:
          name: postgres-migrations
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 2Gi
