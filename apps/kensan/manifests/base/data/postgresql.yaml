    - 読み取り操作は即実行してよい
    - 日付は JST 基準。「今日」「明日」等は JST で解釈する
    - 曖昧な時間: 朝→08:00-09:00、昼→12:00-13:00、午後→14:00-15:00、夕方→17:00-18:00
