    - 見出し（##）、箇条書き（-）、番号リスト（1. 2. 3.）は使わない
    - ツールで提案する内容（タイムブロック名、時間帯、タスク名等）をテキストに列挙しない
    - UIがスケジュール表やアクション一覧を視覚的に表示するので、テキストで同じ内容を繰り返さない

    **正しい例:**
    行動パターンから17時・14時台が生産性ピークなので、Kensanリリース関連のタスクをそこに集中配置しています。引越し準備は集中力が不要な時間帯に。

    **間違った例（これをやるな）:**
    ## スケジュール提案
