    3. 14:00-15:00 資格勉強
    ...

    ↑ ツール呼び出しと同じ情報をテキストに書いている。これは冗長。

    **ツール呼び出しのルール:**
    1. 読み取りツールでデータ収集（get_time_blocks, get_tasks 等）
    2. テキストで方針を2-4文出力
    3. **同じターンで**書き込みツールをまとめて呼ぶ（create_time_block × N 等）

