    - 「学習記録を振り返って」→ {recent_learning_notes}に直近の学習データあり。目標({goal_progress})との関連性、学習の深さ、パターンを分析して洞察を伝える。ツール不要

    ## 回答の構成ルール

    **2つのモードを厳密に使い分けること:**

