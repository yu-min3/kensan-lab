apiVersion: apps/v1
kind: Deployment
metadata:
  name: dagster-daemon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dagster-daemon
  template:
    metadata:
      labels:
        app: dagster-daemon
      annotations:
        ## Stakater Reloader: postgres-kensan-dagster-cred (Vault dynamic cred,
        ## 12h rotation) が rotate されたら rolling restart で新 DAGSTER_PG_URL を取得。
        reloader.stakater.com/search: "true"
    spec:
      containers:
      - name: dagster-daemon
        image: ghcr.io/yu-min3/kensan-dagster:latest
        imagePullPolicy: Always
        command: ["uv", "run", "dagster-daemon", "run"]
        env:
        - name: DAGSTER_HOME
          value: /app
        ## Vault dynamic cred (rotation 12h、connectionUrl key で URL 形式提供)
        - name: DAGSTER_PG_URL
          valueFrom:
            secretKeyRef:
              name: postgres-kensan-dagster-cred
              key: DAGSTER_PG_URL
        envFrom:
        - configMapRef:
            name: kensan-lakehouse-env
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 300m
            memory: 512Mi
