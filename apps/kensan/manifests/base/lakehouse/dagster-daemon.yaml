apiVersion: apps/v1
kind: Deployment
metadata:
  name: dagster-daemon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dagster-daemon
  template:
    metadata:
      labels:
        app: dagster-daemon
    spec:
      containers:
      - name: dagster-daemon
        image: ghcr.io/yu-min3/kensan-dagster:latest
        imagePullPolicy: Always
        command: ["uv", "run", "dagster-daemon", "run"]
        env:
        - name: DAGSTER_HOME
          value: /app
        - name: DAGSTER_PG_URL
          valueFrom:
            secretKeyRef:
              name: kensan-lakehouse-credentials
              key: DAGSTER_PG_URL
        envFrom:
        - configMapRef:
            name: kensan-lakehouse-env
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 300m
            memory: 512Mi
