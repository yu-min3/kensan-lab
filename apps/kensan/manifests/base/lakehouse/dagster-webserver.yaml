apiVersion: v1
kind: Service
metadata:
  name: dagster-webserver
  labels:
    app: dagster-webserver
spec:
  selector:
    app: dagster-webserver
  ports:
  - port: 3070
    targetPort: 3070
    name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dagster-webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dagster-webserver
  template:
    metadata:
      labels:
        app: dagster-webserver
      annotations:
        ## Stakater Reloader: postgres-kensan-dagster-cred (Vault dynamic cred,
        ## 12h rotation) が rotate されたら rolling restart で新 DAGSTER_PG_URL を取得。
        reloader.stakater.com/search: "true"
    spec:
      containers:
      - name: dagster-webserver
        image: ghcr.io/yu-min3/kensan-dagster:latest
        imagePullPolicy: Always
        command: ["uv", "run", "dagster-webserver", "-h", "0.0.0.0", "-p", "3070", "-w", "workspace.yaml"]
        env:
        - name: DAGSTER_HOME
          value: /app
        ## Vault dynamic cred (rotation 12h、connectionUrl key で URL 形式提供)
        - name: DAGSTER_PG_URL
          valueFrom:
            secretKeyRef:
              name: postgres-kensan-dagster-cred
              key: DAGSTER_PG_URL
        envFrom:
        - configMapRef:
            name: kensan-lakehouse-env
        ports:
        - containerPort: 3070
          name: http
        volumeMounts:
        - name: workspace
          mountPath: /app/workspace.yaml
          subPath: workspace.yaml
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 300m
            memory: 512Mi
      volumes:
      - name: workspace
        configMap:
          name: dagster-workspace
