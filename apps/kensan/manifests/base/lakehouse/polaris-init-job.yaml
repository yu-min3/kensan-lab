apiVersion: batch/v1
kind: Job
metadata:
  name: polaris-init
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-polaris
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for Polaris health endpoint..."
          until wget -q --spider http://polaris:8182/q/health 2>/dev/null; do
            echo "Polaris not ready, retrying in 5s..."
            sleep 5
          done
          echo "Polaris is ready."
      containers:
      - name: polaris-init
        image: ghcr.io/yu-min3/kensan-dagster:latest
        imagePullPolicy: Always
        workingDir: /app
        env:
        # venv activation
        - name: PATH
          value: "/app/.venv/bin:/usr/local/bin:/usr/bin:/bin"
        - name: VIRTUAL_ENV
          value: "/app/.venv"
        # bootstrap_polaris.py
        - name: POLARIS_MANAGEMENT_URL
          value: "http://polaris:8181/api/management/v1"
        - name: POLARIS_CATALOG_URL
          value: "http://polaris:8181/api/catalog/v1"
        - name: S3_ENDPOINT
          value: "http://minio:9000"
        - name: S3_ENDPOINT_INTERNAL
          value: "http://minio:9000"
        # init_catalog.py (via config.py)
        - name: POLARIS_URI
          valueFrom:
            configMapKeyRef:
              name: kensan-lakehouse-env
              key: POLARIS_URI
        - name: POLARIS_CREDENTIAL
          value: "root:s3cr3t"
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: kensan-lakehouse-credentials
              key: AWS_ACCESS_KEY_ID
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: kensan-lakehouse-credentials
              key: AWS_SECRET_ACCESS_KEY
        command:
        - /bin/sh
        - -c
        - |
          for ENV in dev prod; do
            echo "=== Setting up kensan-${ENV} ==="
            export CATALOG_NAME="kensan-${ENV}"
            export S3_BUCKET="kensan-lakehouse-${ENV}"
            export POLARIS_WAREHOUSE="kensan-${ENV}"

            # bootstrap: monkey-patch でモジュール変数を上書き（イメージリビルド前の暫定対応）
            python -c "
          import catalog.bootstrap_polaris as bp
          import os
          bp.CATALOG_NAME = os.environ['CATALOG_NAME']
          bp.S3_BUCKET = os.environ['S3_BUCKET']
          bp.main()
          " && \
            # init_catalog: config.py が POLARIS_WAREHOUSE を env から読む
            python -m catalog.init_catalog

            if [ $? -ne 0 ]; then
              echo "ERROR: Setup failed for kensan-${ENV}"
              exit 1
            fi
            echo "=== Done: kensan-${ENV} ==="
          done
          echo "All catalogs initialized successfully."
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
