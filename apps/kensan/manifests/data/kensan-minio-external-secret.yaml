apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kensan-minio
  namespace: kensan-data
  namespace: kensan-data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kensan-minio-credentials
    creationPolicy: Owner
  data:
    - secretKey: MINIO_ROOT_USER
      remoteRef:
        key: kensan/data/minio
        property: MINIO_ROOT_USER
    - secretKey: MINIO_ROOT_PASSWORD
      remoteRef:
        key: kensan/data/minio
        property: MINIO_ROOT_PASSWORD
