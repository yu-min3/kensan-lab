apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kensan-lakehouse
  namespace: kensan-data
  namespace: kensan-data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kensan-lakehouse-credentials
    creationPolicy: Owner
  ## DAGSTER_PG_* は Vault dynamic cred (postgres-kensan-dagster-cred) に移行済み (Stage 5c)
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef: { key: kensan/data/lakehouse, property: AWS_ACCESS_KEY_ID }
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef: { key: kensan/data/lakehouse, property: AWS_SECRET_ACCESS_KEY }
    - secretKey: POLARIS_BOOTSTRAP_CREDENTIALS
      remoteRef: { key: kensan/data/lakehouse, property: POLARIS_BOOTSTRAP_CREDENTIALS }
