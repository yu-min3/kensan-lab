apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: kensan-data
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mc
        image: minio/mc:RELEASE.2025-08-13T08-35-41Z
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: kensan-minio-credentials
              key: MINIO_ROOT_USER
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kensan-minio-credentials
              key: MINIO_ROOT_PASSWORD
        command:
        - /bin/sh
        - -c
        - |
          mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD
          mc mb --ignore-existing local/kensan-notes-dev
          mc mb --ignore-existing local/kensan-notes-prod
          mc mb --ignore-existing local/kensan-lakehouse-dev
          mc mb --ignore-existing local/kensan-lakehouse-prod
          echo "MinIO bucket initialization complete."
