apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kensan-lakehouse
  namespace: kensan
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kensan-lakehouse-credentials
    creationPolicy: Owner
  ## dagster app cred (DAGSTER_PG_URL 等) は Vault dynamic (postgres-kensan-dagster-cred) に移行済み (Stage 5c)。
  ## ただし dagster-postgres StatefulSet 自体の bootstrap には static cred (DAGSTER_PG_USER/PASSWORD/DB) が必要。
  ## Bitnami postgres image は `POSTGRES_USER` 等で初期化、ここでは独自 init script で dagster user/db を作る。
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef: { key: kensan/data/lakehouse, property: AWS_ACCESS_KEY_ID }
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef: { key: kensan/data/lakehouse, property: AWS_SECRET_ACCESS_KEY }
    - secretKey: POLARIS_BOOTSTRAP_CREDENTIALS
      remoteRef: { key: kensan/data/lakehouse, property: POLARIS_BOOTSTRAP_CREDENTIALS }
    - secretKey: DAGSTER_PG_USER
      remoteRef: { key: kensan/data/lakehouse, property: DAGSTER_PG_USER }
    - secretKey: DAGSTER_PG_PASSWORD
      remoteRef: { key: kensan/data/lakehouse, property: DAGSTER_PG_PASSWORD }
    - secretKey: DAGSTER_PG_DB
      remoteRef: { key: kensan/data/lakehouse, property: DAGSTER_PG_DB }
    ## polaris-postgres StatefulSet (Iceberg catalog metastore) bootstrap 用 static cred。
    ## relational-jdbc backend の datasource もこの cred を参照する。
    - secretKey: POLARIS_PG_USER
      remoteRef: { key: kensan/data/lakehouse, property: POLARIS_PG_USER }
    - secretKey: POLARIS_PG_PASSWORD
      remoteRef: { key: kensan/data/lakehouse, property: POLARIS_PG_PASSWORD }
    - secretKey: POLARIS_PG_DB
      remoteRef: { key: kensan/data/lakehouse, property: POLARIS_PG_DB }
