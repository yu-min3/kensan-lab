apiVersion: v1
kind: Service
metadata:
  name: polaris-postgres
  namespace: kensan
  labels:
    app: polaris-postgres
spec:
  selector:
    app: polaris-postgres
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: polaris-postgres
  namespace: kensan
spec:
  serviceName: polaris-postgres
  replicas: 1
  selector:
    matchLabels:
      app: polaris-postgres
  template:
    metadata:
      labels:
        app: polaris-postgres
      annotations:
        # Istio sidecar が PostgreSQL wire protocol を壊して "unexpected EOF" を起こすため除外
        # (dagster-postgres / kensan postgresql と同じ。PeerAuthentication=PERMISSIVE で平文接続 OK)
        sidecar.istio.io/inject: "false"
    spec:
      containers:
      - name: polaris-postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: kensan-lakehouse-credentials
              key: POLARIS_PG_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kensan-lakehouse-credentials
              key: POLARIS_PG_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: kensan-lakehouse-credentials
              key: POLARIS_PG_DB
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          exec:
            command: ["sh", "-c", "pg_isready -U $POSTGRES_USER"]
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["sh", "-c", "pg_isready -U $POSTGRES_USER"]
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      # local-path は reclaimPolicy=Delete で災害時にデータ物理削除されるため Longhorn (Retain + replica) を使う
      storageClassName: longhorn
      resources:
        requests:
          storage: 1Gi
