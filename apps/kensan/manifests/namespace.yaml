apiVersion: v1
kind: Namespace
metadata:
  name: kensan
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/managed-by: argocd
    kensan-lab.platform/environment: production
    kensan-lab.platform/tier: application
    ## CCNP vault-database-engine-postgres-ingress が vault ns → このラベルが付いた
    ## ns の Pod へ TCP/5432 を許可する。VDBE で dynamic cred 払い出しに必須。
    kensan-lab.platform/vault-managed-postgres: "true"
    istio-injection: enabled
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
