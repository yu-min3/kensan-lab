apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kensan-app
  namespace: kensan-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kensan-app-credentials
    creationPolicy: Owner
  data:
    - secretKey: DB_USER
      remoteRef: { key: kensan/dev/app, property: DB_USER }
    - secretKey: DB_PASSWORD
      remoteRef: { key: kensan/dev/app, property: DB_PASSWORD }
    - secretKey: JWT_SECRET
      remoteRef: { key: kensan/dev/app, property: JWT_SECRET }
