apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kensan-app
  namespace: kensan-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kensan-app-credentials
    creationPolicy: Owner
  ## DB_USER/DB_PASSWORD は Vault dynamic cred (postgres-kensan-app-cred) に移行済み (Stage 5c)
  data:
    - secretKey: JWT_SECRET
      remoteRef: { key: kensan/prod/app, property: JWT_SECRET }
