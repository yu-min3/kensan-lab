## kensan user-service が Vault Transit API を呼ぶための ServiceAccount
##
## bind 先 Vault role: transit-kensan-users (vault-transit-engine capability で作成)
## policy: transit-kensan-users (transit/{encrypt,decrypt,hmac,rewrap}/users-name のみ)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service
  namespace: kensan
imagePullSecrets:
  - name: ghcr-pull-secret
