apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: kensan
  labels:
    app: user-service
spec:
  selector:
    app: user-service
  ports:
  - port: 8081
    targetPort: 8081
    name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: kensan
  annotations:
    # ConfigMap (transit-kensan-users-config) / Secret 更新で auto rollout
    # vault-transit-engine chart が出す ConfigMap には match=true が付いている
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      # ServiceAccount = "transit-kensan-users" は vault-transit-engine chart が
      # platform-values/vault-transit/kensan-users.yaml から render する。
      # Vault Transit に k8s SA JWT で auth する主体 (Stage 6)
      serviceAccountName: transit-kensan-users
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - amd64
      containers:
      - name: user-service
        image: ghcr.io/yu-min3/kensan-user:v0.0.2
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: kensan-env-config
        # Vault Transit (Stage 6) の VAULT_ADDR / VAULT_AUTH_ROLE / VAULT_TRANSIT_KEY は
        # vault-transit-engine chart が生成する ConfigMap から読む (drift 防止)
        - configMapRef:
            name: transit-kensan-users-config
        env:
        - name: SERVER_PORT
          value: "8081"
        - name: DB_HOST
          value: postgresql.kensan.svc.cluster.local
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: kensan-app-credentials
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kensan-app-credentials
              key: DB_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: kensan-app-credentials
              key: JWT_SECRET
        - name: DEMO_SEED_DIR
          value: /app/seeds
        - name: OTEL_ENABLED
          value: "true"
        - name: OTEL_COLLECTOR_URL
          value: "otel-collector-opentelemetry-collector.monitoring.svc:4318"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=user-service,service.namespace=kensan,deployment.environment=$(DEPLOYMENT_ENVIRONMENT)"
        ports:
        - containerPort: 8081
          name: http
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5
