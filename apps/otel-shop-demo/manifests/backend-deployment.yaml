---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: default
      imagePullSecrets:
      - name: ghcr-pull-secret
      nodeSelector:
        kubernetes.io/hostname: worker2
      containers:
      - name: backend
        image: ghcr.io/yu-min3/otel-shop-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        - name: DATABASE_URL
          value: "postgresql://postgres:password@postgresql:5432/shopdb?sslmode=disable"
        - name: OTEL_SERVICE_NAME
          value: "otel-shop-backend"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "otel-collector-opentelemetry-collector.monitoring.svc:4317"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.namespace=otel-shop-demo,service.version=1.0.0"
        resources:
          limits:
            cpu: 400m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
