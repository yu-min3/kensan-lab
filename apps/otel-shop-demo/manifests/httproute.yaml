apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: otel-shop-route
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway-dev
    namespace: istio-system
  hostnames:
  - "shop.app.yu-min3.com"
  rules:
  # Backend API routes
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - group: ''
      kind: Service
      name: backend
      port: 8080
      weight: 1
  # Frontend routes (default catch-all)
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: ''
      kind: Service
      name: frontend
      port: 3000
      weight: 1
