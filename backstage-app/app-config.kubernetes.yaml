app:
  title: Platform Engineering Portal
  baseUrl: https://backstage.platform.yu-min3.com

organization:
  name: Platform Team

backend:
  baseUrl: https://backstage.platform.yu-min3.com
  listen:
    port: 7007
    host: 0.0.0.0
  cors:
    origin: https://backstage.platform.yu-min3.com
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}

integrations:
  github:
  - host: github.com
    token: ${GITHUB_TOKEN}

catalog:
  rules:
  - allow: [Component, System, API, Resource, Location, Template]
  locations:
  # FastAPIテンプレート（ローカルパス）
  # In Docker image, working directory is /app
  # app-templates/ is copied to /app/app-templates (see Dockerfile)
  - type: file
    target: ./app-templates/fastapi-template/template.yaml
    rules:
    - allow: [Template]

  # Local examples (for testing in Kubernetes)
  # In Docker image, working directory is /app
  # examples/ is copied to /app/examples (see Dockerfile line 64)
  - type: file
    target: ./examples/entities.yaml

  - type: file
    target: ./examples/template/template.yaml
    rules:
    - allow: [Template]

  - type: file
    target: ./examples/org.yaml
    rules:
    - allow: [User, Group]

auth:
  providers:
    guest:
      dangerouslyAllowOutsideDevelopment: true

techdocs:
  builder: 'local'
  generator:
    runIn: 'local'  # Changed from 'docker' to 'local' to avoid Docker socket dependency
  publisher:
    type: 'local'

permission:
  # Phase 1: Permission Framework無効化（開発中は全員がフルアクセス）
  # Phase 3でOAuth2 Proxy + Permission Frameworkを有効化予定
  enabled: false
