app:
  title: Platform Engineering Portal
  baseUrl: https://backstage.platform.yu-min3.com

organization:
  name: Platform Team

backend:
  baseUrl: https://backstage.platform.yu-min3.com
  listen:
    port: 7007
    host: 0.0.0.0
  auth:
    dangerouslyDisableDefaultAuthPolicy: true
  cors:
    origin: https://backstage.platform.yu-min3.com
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}

integrations:
  github:
  - host: github.com
    token: ${GITHUB_TOKEN}

catalog:
  rules:
  - allow: [Component, System, API, Resource, Location, Template, Domain, Group, User]
  locations:
  # FastAPIテンプレート（ローカルパス）
  # In Docker image, working directory is /app
  # templates/ is copied to /app/templates (see Dockerfile)
  - type: file
    target: ./templates/fastapi-template/template.yaml
    rules:
    - allow: [Template]

  # TODO: Re-enable after catalog is properly configured with more memory
  # Production catalog: Domains and Systems
  - type: file
    target: ./catalog/domains/*.yaml
    rules:
    - allow: [Domain, System, Resource]
  # Production catalog: Teams and Users
  - type: file
    target: ./catalog/organizations/*.yaml
    rules:
    - allow: [Group, User]

  # NOTE: Example data (components, etc) is NOT loaded in production
  # Examples are only available in local development (see app-config.yaml)

auth:
  providers:
    # Gateway (Istio ext_authz + oauth2-proxy) が認証済みの identity を
    # x-auth-request-* ヘッダで届ける。resolver はコード側
    # (packages/backend/src/authModuleOauth2Proxy.ts) が x-auth-request-email を
    # catalog User の spec.profile.email に突合する。guest は本番では使わない。
    oauth2Proxy: {}

techdocs:
  builder: 'local'
  generator:
    runIn: 'local'  # Changed from 'docker' to 'local' to avoid Docker socket dependency
  publisher:
    type: 'local'

permission:
  # Phase 1: Permission Framework無効化（開発中は全員がフルアクセス）
  # Phase 3でOAuth2 Proxy + Permission Frameworkを有効化予定
  enabled: false
