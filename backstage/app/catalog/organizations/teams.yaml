# Production Organization Structure
# This defines the actual teams and users in the platform

# --- Groups: Teams and Roles ---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: platform-engineering
  description: Platform Engineering team responsible for infrastructure and tooling
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: application-developers
  description: Application development teams
spec:
  type: team
  children: []

# --- Users: Platform members ---
# Note: These are demo users. In production, use external auth provider (OIDC/SAML)

# Platform Engineering Team Members
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: demo-platform-admin
spec:
  profile:
    displayName: Demo Platform Admin
    email: demo-admin@example.com
  memberOf: [platform-engineering]

---
apiVersion: backstage.io/v1alpha1
