# Microservices Teams Organization (Spotify Model)
# This file defines the organizational structure with autonomous teams (Squads),
# tribes, and cross-functional groups (Chapters).

# --- Groups: Business Units, Tribes, Squads, and Chapters ---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: product-management
  description: Product Management Group
spec:
  type: business-unit
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: tribe-checkout
  description: 'Tribe focused on the customer checkout experience'
spec:
  type: tribe
  children: [squad-catalog, squad-orders, squad-identity, squad-recommendations]

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: squad-catalog
  description: 'Squad responsible for the Product Catalog System'
spec:
  type: squad
  parent: tribe-checkout
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: squad-orders
  description: 'Squad responsible for the Order Management System'
spec:
  type: squad
  parent: tribe-checkout
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: squad-identity
  description: 'Squad responsible for the User Authentication System'
spec:
  type: squad
  parent: tribe-checkout
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: squad-recommendations
  description: 'Squad responsible for the Recommendation Engine System'
spec:
  type: squad
  parent: tribe-checkout
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: chapter-frontend
  description: 'Chapter for all frontend engineers'
spec:
  type: chapter
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: chapter-backend
  description: 'Chapter for all backend engineers'
spec:
  type: chapter
  children: []

