---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-${{ values.name }}
  namespace: argocd
  labels:
    app: ${{ values.name }}
    managed-by: backstage
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: app-project-prod
  source:
    repoURL: https://github.com/${{ values.repoOwner }}/${{ values.repoName }}.git
    targetRevision: main
    path: manifests
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: app-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
