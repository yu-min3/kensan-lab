apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ${{ values.name }}
  namespace: app-prod
  labels:
    app: ${{ values.name }}
spec:
  parentRefs:
    - name: gateway-prod
      namespace: istio-system
      kind: Gateway
  hostnames:
    - "${{ values.name }}.app.yu-min3.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ${{ values.name }}
          port: 8000
