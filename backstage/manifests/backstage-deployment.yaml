apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
      annotations:
        ## Stakater Reloader: postgres-backstage-cred (Vault dynamic cred, 12h rotation)
        ## が rotate されたら Pod を rolling restart して新 env を取り込む。
        reloader.stakater.com/search: "true"
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: hardware-class
                    operator: In
                    values:
                      - high-performance
      containers:
      - name: backstage
        image: ghcr.io/yu-min3/backstage:v0.0.8
        imagePullPolicy: Always
        ports:
        - containerPort: 7007
          name: http
        env:
        - name: POSTGRES_HOST
          value: postgresql
        - name: POSTGRES_PORT
          value: "5432"
        ## App は Vault dynamic cred (vault-database-engine: postgres-backstage) を使う。
        ## postgresql-secret (静的) は Postgres StatefulSet の bootstrap 専用 (keycloak と同パターン)。
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-backstage-cred
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-backstage-cred
              key: POSTGRES_PASSWORD
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: backstage-secret
              key: GITHUB_TOKEN
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /healthcheck
            port: 7007
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthcheck
            port: 7007
          initialDelaySeconds: 30
          periodSeconds: 10
