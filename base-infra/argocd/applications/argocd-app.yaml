apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  source:
    repoURL: 'https://github.com/yu-min3/k8s-platform-config'
    targetRevision: HEAD
    path: base-infra/argocd
    directory:
      recurse: false  # Don't recursively apply subdirectories
      include: '{namespace.yaml,argocd-install.yaml}'  # Only these files

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true  # Large manifest support

  # Ignore differences in auto-generated secrets and runtime fields
  ignoreDifferences:
    - group: ''
      kind: Secret
      name: argocd-secret
      jsonPointers:
        - /data
    - group: ''
      kind: ConfigMap
      name: argocd-cm
      jsonPointers:
        - /data/dex.config
