apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  source:
    repoURL: 'https://github.com/yu-min3/k8s-platform-config'
    targetRevision: HEAD
    path: base-infra/backstage/overlays/prod

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: backstage

  syncPolicy:
    automated:
      prune: true      # Remove resources when removed from Git
      selfHeal: true   # Revert manual changes
    syncOptions:
      - CreateNamespace=true  # Create backstage namespace if not exists
      - ServerSideApply=true  # Use server-side apply for CRDs
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
