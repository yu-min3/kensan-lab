apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0" # Deploy after istio (wave -1)
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  source:
    repoURL: 'https://github.com/yu-min3/k8s-platform-config'
    targetRevision: HEAD
    path: base-infra/cert-manager

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true # Remove resources when removed from Git
      selfHeal: true # Revert manual changes
    syncOptions:
    - CreateNamespace=true # Create cert-manager namespace
    - ServerSideApply=true # Use server-side apply for large manifests
