apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  source:
    repoURL: 'https://github.com/yu-min3/goldship-yumin3'
    targetRevision: HEAD
    path: base-infra/cilium

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true # Remove resources when removed from Git
      selfHeal: true # Revert manual changes
    syncOptions:
    - CreateNamespace=false # kube-system already exists
    - ServerSideApply=true # Use server-side apply for large manifests

  # Ignore Cilium runtime-generated CRs
  ignoreDifferences:
  - group: cilium.io
    kind: CiliumNode
    jqPathExpressions:
    - .status
    - .spec
  - group: cilium.io
    kind: CiliumEndpoint
    jqPathExpressions:
    - .status
    - .spec
  - group: cilium.io
    kind: CiliumIdentity
    jqPathExpressions:
    - .status
    - .spec
