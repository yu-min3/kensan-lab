apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  source:
    repoURL: 'https://github.com/yu-min3/k8s-platform-config'
    targetRevision: HEAD
    path: base-infra/cilium

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true      # Remove resources when removed from Git
      selfHeal: true   # Revert manual changes
    syncOptions:
      - CreateNamespace=false  # kube-system already exists
      - ServerSideApply=true   # Use server-side apply for large manifests
