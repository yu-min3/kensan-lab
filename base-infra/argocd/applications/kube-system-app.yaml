apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-system
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  source:
    repoURL: 'https://github.com/yu-min3/goldship-platform'
    targetRevision: HEAD
    path: base-infra/kube-system

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true # Remove resources when removed from Git
      selfHeal: true # Revert manual changes
    syncOptions:
    - CreateNamespace=false # kube-system already exists
