apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  source:
    repoURL: 'https://github.com/yu-min3/k8s-platform-config'
    targetRevision: HEAD
    path: base-infra/metallb

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: metallb-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true  # Create namespace if it doesn't exist
    # Sync waves to ensure controller is ready before IPAddressPool
    # Manifests can have annotation: argocd.argoproj.io/sync-wave: "1"
