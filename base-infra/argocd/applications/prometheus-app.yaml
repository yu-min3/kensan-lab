apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  source:
    repoURL: 'https://github.com/yu-min3/goldship-yumin3'
    targetRevision: HEAD
    path: base-infra/prometheus

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true # Remove resources when removed from Git
      selfHeal: true # Revert manual changes
    syncOptions:
    - CreateNamespace=true # Create monitoring namespace if not exists
    - ServerSideApply=true # Use server-side apply for CRDs
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
