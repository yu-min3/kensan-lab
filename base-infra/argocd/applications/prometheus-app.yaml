apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/icon: "https://cncf-branding.netlify.app/img/projects/prometheus/icon/color/prometheus-icon-color.svg"
    link.argocd.argoproj.io/prometheus: "https://prometheus.platform.yu-min3.com"
    link.argocd.argoproj.io/grafana: "https://grafana.platform.yu-min3.com"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  source:
    repoURL: 'https://github.com/yu-min3/k8s-platform-config'
    targetRevision: HEAD
    path: base-infra/prometheus

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true      # Remove resources when removed from Git
      selfHeal: true   # Revert manual changes
    syncOptions:
      - CreateNamespace=true  # Create monitoring namespace if not exists
      - ServerSideApply=true  # Use server-side apply for CRDs
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
