apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  # Deep Links: Add external links with icons to Application Summary
  application.links: |
    # Argo CD
    - url: https://argocd.platform.yu-min3.com/applications/argocd/{{.application.metadata.namespace}}/{{.application.metadata.name}}
      title: Argo CD UI
      description: Open this application in Argo CD
      icon.class: fa-solid fa-diagram-project
      if: "true"

    # Platform Infrastructure Links (conditional per application)
    - url: https://prometheus.platform.yu-min3.com
      title: Prometheus
      description: Prometheus metrics UI
      icon.class: fa-solid fa-chart-line
      if: application.metadata.name == 'prometheus'

    - url: https://grafana.platform.yu-min3.com
      title: Grafana
      description: Grafana dashboards
      icon.class: fa-solid fa-chart-area
      if: application.metadata.name == 'prometheus'

    - url: https://hubble.platform.yu-min3.com
      title: Hubble UI
      description: Cilium network observability
      icon.class: fa-solid fa-network-wired
      if: application.metadata.name == 'cilium'

    - url: https://auth.platform.yu-min3.com
      title: Keycloak (Prod)
      description: Authentication & Authorization
      icon.class: fa-solid fa-key
      if: application.metadata.name == 'keycloak-prod'

    - url: https://auth-dev.platform.yu-min3.com
      title: Keycloak (Dev)
      description: Authentication & Authorization (Dev)
      icon.class: fa-solid fa-key
      if: application.metadata.name == 'keycloak-dev'

    # GitHub Repository
    - url: https://github.com/yu-min3/k8s-platform-config/tree/main/{{.application.spec.source.path}}
      title: Source Code
      description: View source in GitHub
      icon.class: fa-brands fa-github
      if: "true"
