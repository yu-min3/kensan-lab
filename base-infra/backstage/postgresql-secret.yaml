# This is a placeholder for the sealed secret
# To generate the actual sealed secret:
# 1. Edit temp/backstage-postgresql-secret-raw.yaml with real password
# 2. Run: kubeseal --format=yaml < temp/backstage-postgresql-secret-raw.yaml > base-infra/backstage/prod1/postgresql-secret.yaml
# 3. Commit the sealed secret to git
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgresql-secret
  namespace: backstage
spec:
  encryptedData:
    POSTGRES_PASSWORD: PLACEHOLDER_TO_BE_SEALED
    POSTGRES_USER: PLACEHOLDER_TO_BE_SEALED
  template:
    metadata:
      name: postgresql-secret
      namespace: backstage
    type: Opaque
