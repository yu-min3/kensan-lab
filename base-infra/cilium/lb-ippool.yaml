apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: platform-pool
spec:
  blocks:
    - start: "192.168.0.240"
      stop: "192.168.0.249"
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: platform-l2-policy
spec:
  # Only announce for LoadBalancer services using our IP pool
  loadBalancerIPs: true

  # Which services to announce (empty means all LoadBalancer services with IPs from our pool)
  serviceSelector:
    matchLabels: {}
