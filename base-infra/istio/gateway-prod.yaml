---
# Istio Gateway for Production Environment
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-prod
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "2" # Deploy after istiod (CRDs must be installed first)
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.yu-min3.com"
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              environment: production

    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.yu-min3.com"
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              environment: production
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: wildcard-tls
