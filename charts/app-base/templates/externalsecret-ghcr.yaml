{{- if .Values.ghcrPullSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  labels:
    {{- include "app-base.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: {{ printf "{{ .dockerconfigjson }}" | quote }}
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: ghcr/pull-token
        property: dockerconfigjson
{{- end }}
