apiVersion: v1
kind: Service
metadata:
  name: {{ include "app-base.name" . }}
  labels:
    {{- include "app-base.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "app-base.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.ports.http }}
      targetPort: http
