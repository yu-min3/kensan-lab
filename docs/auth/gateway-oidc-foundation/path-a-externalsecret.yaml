# Path A — ExternalSecret in auth-system namespace
#
# Pulls oauth2-proxy's OIDC client_id / client_secret / cookie_secret
# from Vault KV at `secret/platform-auth/istio-gateway/platform`.
#
# Activation order:
# 1. Yu puts the values into Vault (see activation-runbook.md Step A2)
# 2. This ExternalSecret syncs them into Secret `oauth2-proxy-secret`
#    in the auth-system namespace
# 3. oauth2-proxy Deployment mounts the Secret via env vars
#
# The Vault path matches the existing convention used by Stage 3.5
# (e.g. `secret/platform-auth/prod/keycloak`). Using `platform-auth/`
# as the top key keeps "auth-related" secrets grouped.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-secret
  namespace: auth-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-secret
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: platform-auth/istio-gateway/platform
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: platform-auth/istio-gateway/platform
        property: client_secret
    - secretKey: cookie_secret
      remoteRef:
        key: platform-auth/istio-gateway/platform
        property: cookie_secret
---
# Namespace placeholder. The auth-system namespace is created by the
# follow-up oauth2-proxy Application (use kustomize / Helm values).
# Listed here for reference only — do NOT commit to a synced path
# unless the namespace creation is also moved.
apiVersion: v1
kind: Namespace
metadata:
  name: auth-system
  labels:
    # Pod Security Admission baseline — oauth2-proxy is a normal Pod
    pod-security.kubernetes.io/enforce: baseline
    # Istio sidecar injection — oauth2-proxy participates in mesh
    istio-injection: enabled
