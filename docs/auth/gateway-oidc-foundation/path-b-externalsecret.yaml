# Path B — ExternalSecret in istio-system namespace
#
# Pulls oauth2 filter material from Vault and exposes them as the
# Secrets that Envoy SDS reads (referenced by path-b-envoyfilter.yaml).
#
# Vault path: secret/platform-auth/istio-gateway/platform with these
# additional fields versus Path A:
# - hmac_secret: HMAC for cookie integrity (32 bytes random base64)
# - token_secret: client_secret for token exchange (the same Keycloak
#   client_secret created by setup.sh)
#
# The Secrets format must match what envoy.filters.http.oauth2 expects:
# a single `value` key per Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-token-secret
  namespace: istio-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: oauth2-token-secret
    creationPolicy: Owner
  data:
    - secretKey: value
      remoteRef:
        key: platform-auth/istio-gateway/platform
        property: client_secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-hmac-secret
  namespace: istio-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: oauth2-hmac-secret
    creationPolicy: Owner
  data:
    - secretKey: value
      remoteRef:
        key: platform-auth/istio-gateway/platform
        property: hmac_secret
