## ADR-009 後続: default-deny-all / allow-dns / allow-prometheus-scrape は
## CCNP (default-deny-for-mesh-ns / allow-dns-for-mesh-ns /
## allow-prometheus-scrape-for-mesh-ns) に集約済み。
## ここに残すのは allow-intra-namespace だけ
## (CCNP では "same ns as me" を綺麗に表現できないので per-ns)。

## Allow intra-namespace communication (Service-to-Service)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: app-dev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
