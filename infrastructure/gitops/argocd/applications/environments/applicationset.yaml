## kensan project の per-env namespace bootstrap (kensan-data, kensan-dev, kensan-prod)
## 各 env dir = namespace + ghcr-pull-secret(SealedSecret) + default ServiceAccount
## kube-system / monitoring の namespace 管理は同階層の単発 Application を参照
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: environments
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/yu-min3/kensan-lab
        revision: HEAD
        files:
          - path: infrastructure/kensan/*/config.json
  template:
    metadata:
      name: '{{ .name }}'
      namespace: argocd
      ## resources-finalizer.argocd.argoproj.io は cascade prune を起こす。
      ## 本 ApplicationSet が生成する env-kensan-{prod,data} は近日中に
      ## infrastructure/kensan/ 削除で prune される予定で、その際に
      ## destination ns ごと巻き添えにすると local-path PV が消えて
      ## kensan-data の PostgreSQL / MinIO / dagster-postgres が全消失する。
      ## finalizer 抜きにすれば Application 削除時 resources は孤児化するだけ。
    spec:
      project: platform-project
      source:
        repoURL: https://github.com/yu-min3/kensan-lab
        targetRevision: main
        path: 'infrastructure/kensan/{{ .dirName }}'
        directory:
          exclude: 'config.json'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace={{ default "true" .createNamespace }}
