## monitoring namespace 管理専用 app (旧 env-observability app の後継)
## ns 内の helm tenant (prometheus, grafana, loki, tempo, otel-collector) は
## observability ApplicationSet で個別管理。ns lifecycle は責務分離のためここに切り出す
## sync-wave -4: 旧 env-observability app からの ownership transfer のため、source path の
## directory.include で namespace.yaml のみを source 対象にする (helm chart dir は除外)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project
  source:
    repoURL: https://github.com/yu-min3/kensan-lab
    targetRevision: main
    path: infrastructure/observability
    directory:
      recurse: false
      include: 'namespace.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
