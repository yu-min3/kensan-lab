apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: system-infra
  namespace: argocd
spec:
  project: platform-project

  source:
    repoURL: 'https://github.com/yu-min3/goldship-yumin3'
    targetRevision: HEAD
    path: infrastructure/environments/system-infra

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true # Remove resources when removed from Git
      selfHeal: true # Revert manual changes
    syncOptions:
    - CreateNamespace=false # kube-system already exists
