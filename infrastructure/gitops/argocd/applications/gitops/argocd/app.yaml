apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 9.1.0
      helm:
        releaseName: argocd
        valueFiles:
          - $values/infrastructure/gitops/argocd/values.yaml
    - repoURL: https://github.com/yu-min3/goldship-yumin3
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/yu-min3/goldship-yumin3
      targetRevision: HEAD
      path: infrastructure/gitops/argocd/resources

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true

  # Auto-generated secrets and Helm hook resources
  ignoreDifferences:
    - group: ''
      kind: Secret
      name: argocd-secret
      jsonPointers:
        - /data
    - group: ''
      kind: ConfigMap
      name: argocd-cm
      jsonPointers:
        - /data/dex.config
    - group: ''
      kind: ServiceAccount
      name: argocd-redis-secret-init
    - group: rbac.authorization.k8s.io
      kind: Role
      name: argocd-redis-secret-init
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
      name: argocd-redis-secret-init
