apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  sources:
    - repoURL: https://helm.cilium.io/
      chart: cilium
      targetRevision: 1.18.3
      helm:
        releaseName: cilium
        valueFiles:
          - $values/infrastructure/network/cilium/values.yaml
    - repoURL: https://github.com/yu-min3/kensan-lab
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/yu-min3/kensan-lab
      targetRevision: HEAD
      path: infrastructure/network/cilium/resources

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Cilium runtime-generated CRs
  ignoreDifferences:
    - group: cilium.io
      kind: CiliumNode
      jqPathExpressions:
        - .status
        - .spec
    - group: cilium.io
      kind: CiliumEndpoint
      jqPathExpressions:
        - .status
        - .spec
    - group: cilium.io
      kind: CiliumIdentity
      jqPathExpressions:
        - .status
        - .spec
    # Cilium auto-generates and rotates these TLS secrets in-cluster.
    # Without ignoring them, selfHeal triggers repeated syncs that
    # reload BPF programs and can break external LB DNAT.
    - group: ""
      kind: Secret
      name: cilium-ca
      jqPathExpressions:
        - .data
    - group: ""
      kind: Secret
      name: hubble-relay-client-certs
      jqPathExpressions:
        - .data
    - group: ""
      kind: Secret
      name: hubble-server-certs
      jqPathExpressions:
        - .data
