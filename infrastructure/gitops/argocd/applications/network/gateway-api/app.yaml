apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api
  namespace: argocd
spec:
  project: platform-project

  sources:
    - repoURL: https://gateway-api.sigs.k8s.io/charts
      chart: gateway-api
      targetRevision: v1.2.0
      helm:
        releaseName: gateway-api
        valueFiles:
          - $values/infrastructure/network/gateway-api/values.yaml
    - repoURL: https://github.com/yu-min3/goldship-yumin3
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
