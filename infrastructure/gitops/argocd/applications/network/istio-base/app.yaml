apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"  # Deploy CRDs after namespace (wave -3)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  sources:
    # Helm chart source
    - repoURL: https://istio-release.storage.googleapis.com/charts
      chart: base
      targetRevision: 1.27.3
      helm:
        releaseName: istio-base
        valueFiles:
          - $values/infrastructure/network/istio/base/values.yaml
    # Values file reference
    - repoURL: https://github.com/yu-min3/goldship-yumin3
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false  # Created by istio-resources (wave -3)
      - ServerSideApply=true

  # Ignore webhook differences (istiod overwrites at runtime)
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istiod-default-validator
      jqPathExpressions:
        - .webhooks
