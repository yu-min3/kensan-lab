apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-policy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"  # Cluster-wide network policy: deploy before workloads
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  source:
    repoURL: https://github.com/yu-min3/kensan-lab
    targetRevision: main
    path: infrastructure/network/network-policy

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
