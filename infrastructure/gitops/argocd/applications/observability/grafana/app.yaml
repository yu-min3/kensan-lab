apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: observability
spec:
  project: platform-project

  sources:
    # Helm chart source
    - repoURL: https://grafana.github.io/helm-charts
      chart: grafana
      targetRevision: 7.3.0
      helm:
        releaseName: grafana
        valueFiles:
          - $values/infrastructure/observability/grafana/values.yaml
    # Values file reference
    - repoURL: https://github.com/yu-min3/goldship-yumin3
      targetRevision: HEAD
      ref: values
    # Custom resources (datasources, dashboards, httproute, sealed secret)
    - repoURL: https://github.com/yu-min3/goldship-yumin3
      targetRevision: HEAD
      path: infrastructure/observability/grafana/resources

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    # automated:           # TEMPORARILY DISABLED for helm migration
    #   prune: true        # Re-enable after manual sync verification
    #   selfHeal: true
    syncOptions:
      - CreateNamespace=false  # monitoring namespace already exists
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
