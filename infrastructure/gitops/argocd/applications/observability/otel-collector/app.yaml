apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  sources:
    # Helm chart source
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      chart: opentelemetry-collector
      targetRevision: 0.97.1
      helm:
        releaseName: otel-collector
        valueFiles:
          - $values/infrastructure/observability/otel-collector/values.yaml
    # Values file reference
    - repoURL: https://github.com/yu-min3/goldship-yumin3
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    # automated:           # TEMPORARILY DISABLED for helm migration
    #   prune: true        # Re-enable after manual sync verification
    #   selfHeal: true
    syncOptions:
      - CreateNamespace=false  # monitoring namespace already exists
      - ServerSideApply=true  # Use server-side apply for CRDs
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
