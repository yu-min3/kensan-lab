apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"  # Deploy after istio (wave -1)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  sources:
    # Helm chart source
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: v1.19.1
      helm:
        releaseName: cert-manager
        valueFiles:
          - $values/infrastructure/security/cert-manager/values.yaml
    # Values file reference
    - repoURL: https://github.com/yu-min3/goldship-yumin3
      targetRevision: HEAD
      ref: values
    # Custom resources (ClusterIssuer, Certificates, Route53 credentials)
    - repoURL: https://github.com/yu-min3/goldship-yumin3
      targetRevision: HEAD
      path: infrastructure/security/cert-manager/resources

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    # automated:           # TEMPORARILY DISABLED for helm migration
    #   prune: true        # Re-enable after manual sync verification
    #   selfHeal: true
    syncOptions:
      - CreateNamespace=true  # Create cert-manager namespace
      - ServerSideApply=true  # Use server-side apply for large manifests
