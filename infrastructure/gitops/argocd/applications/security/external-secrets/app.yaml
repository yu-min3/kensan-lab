apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"  # Vault (wave 5) より後
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 2.4.1
      helm:
        releaseName: external-secrets
        valueFiles:
          - $values/infrastructure/security/external-secrets/values.yaml
    - repoURL: https://github.com/yu-min3/kensan-lab
      targetRevision: main
      ref: values
    - repoURL: https://github.com/yu-min3/kensan-lab
      targetRevision: main
      path: infrastructure/security/external-secrets/resources

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
