apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-oidc-auth
  namespace: argocd
  annotations:
    # VCO (wave 6) 後 + ESO (wave 6) と同列で OK。Vault auth backend 自体は
    # bootstrap TF で作成済なので、本 app は VCO CR を apply するだけで完結。
    argocd.argoproj.io/sync-wave: "8"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  source:
    repoURL: https://github.com/yu-min3/kensan-lab
    targetRevision: main
    path: infrastructure/security/vault-oidc-auth

  destination:
    server: https://kubernetes.default.svc
    namespace: vault

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false   # vault ns は別 app で先に作成
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
