apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-project
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  description: Platform Engineering project for infrastructure components

  # Source repositories that applications can pull from
  sourceRepos:
  - "https://github.com/yu-min3/goldship-yumin3"
  - "*" # Allow Helm charts and other external sources

  # Destinations where applications can be deployed
  # Using wildcard for all namespaces as this cluster is dedicated to infrastructure
  destinations:
  - namespace: "*"
    server: "https://kubernetes.default.svc"

  # Allow all cluster-scoped resources (required for CNI, CRDs, etc.)
  clusterResourceWhitelist:
  - group: "*"
    kind: "*"

  # Namespace-scoped resources whitelist (allow all for platform components)
  namespaceResourceWhitelist:
  - group: "*"
    kind: "*"

  # Orphaned resources handling
  orphanedResources:
    warn: true
    ignore:
      # kube-system runtime resources (not managed by Cilium app)
      - group: ""
        kind: ConfigMap
      - group: ""
        kind: Endpoints
      - group: ""
        kind: Pod
      - group: ""
        kind: Secret
      - group: apps
        kind: ReplicaSet
