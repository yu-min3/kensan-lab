apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: app-project
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  description: Application Developer project for all app workloads

  sourceRepos:
  - "https://github.com/yu-min3/kensan-lab"
  - "https://github.com/yu-min3/*"

  destinations:
  - namespace: kensan
    server: "https://kubernetes.default.svc"
  - namespace: app-prod
    server: "https://kubernetes.default.svc"
  ## kensan-prod / kensan-data は ns 統合 (3a-3) で kensan に集約済み。
  ## 旧 Application が prune 中の間は destination match が必要なので残置。
  ## prune 完了 + ns 削除確認後に削除予定。
  - namespace: kensan-prod
    server: "https://kubernetes.default.svc"
  - namespace: kensan-data
    server: "https://kubernetes.default.svc"

  # Apps own their own namespace (per-app namespace design)
  clusterResourceWhitelist:
  - group: ""
    kind: Namespace

  namespaceResourceWhitelist:
  # Workloads
  - group: "apps"
    kind: Deployment
  - group: "apps"
    kind: StatefulSet
  - group: "batch"
    kind: Job
  - group: "policy"
    kind: PodDisruptionBudget
  # Networking
  - group: ""
    kind: Service
  - group: "gateway.networking.k8s.io"
    kind: HTTPRoute
  # Configuration & Identity
  - group: ""
    kind: ConfigMap
  - group: ""
    kind: Secret
  - group: ""
    kind: ServiceAccount
  # Sealed Secrets
  - group: "bitnami.com"
    kind: SealedSecret
  # External Secrets (Vault → K8s Secret bridge)
  - group: "external-secrets.io"
    kind: ExternalSecret
  # Prometheus Operator
  - group: "monitoring.coreos.com"
    kind: ServiceMonitor
  # Istio Security
  - group: "security.istio.io"
    kind: AuthorizationPolicy
