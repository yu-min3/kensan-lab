## ArgoCD argocd-cm.oidc.config から参照される client_secret を Vault → K8s Secret に同期する。
##
## 流れ:
##   ExternalSecret (このファイル)
##     → ESO operator が ClusterSecretStore "vault-backend" 経由で
##       secret/security/argocd/oidc を read
##     → target.name = argocd-oidc-secret として Secret 生成
##     → argocd-cm の oidc.config が `$argocd-oidc-secret:client-secret` 構文で参照
##
## ArgoCD が Secret を `$secret-name:key` 構文で参照するには、
## Secret に label `app.kubernetes.io/part-of: argocd` が必要。
## ESO `target.template` で labels を inject する。
##
## Vault KV 投入手順:
##   bootstrap/keycloak/setup.sh が argocd client を Keycloak に作成し、
##   その client_secret を Vault に自動投入する (vault CLI + token あれば)。
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-oidc-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      ## ArgoCD が `$argocd-oidc-secret:client-secret` 経由で読むには part-of label 必須
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: client-id
      remoteRef:
        key: security/argocd/oidc
        property: client-id
    - secretKey: client-secret
      remoteRef:
        key: security/argocd/oidc
        property: client-secret
