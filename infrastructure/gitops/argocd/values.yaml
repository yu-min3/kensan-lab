# Chart config: infrastructure/gitops/argocd/applications/gitops/argocd/app.yaml
# Version: 9.1.0
#
# GitOps controller for Kubernetes
# TLS termination is handled by Istio Gateway (gateway-platform)

# Server configuration
server:
  service:
    type: ClusterIP

# Argo CD parameters
configs:
  params:
    # Run without TLS - Istio Gateway handles TLS termination
    server.insecure: true
