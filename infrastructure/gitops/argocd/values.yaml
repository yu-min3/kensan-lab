# GitOps controller. TLS termination は Istio Gateway 側 (gateway-platform)。
# probe timeout / Keycloak 統合の経緯: docs/runbooks/argocd-repo-server-tuning.md
#                                     docs/auth/argocd-keycloak-integration.md

server:
  service:
    type: ClusterIP

repoServer:
  livenessProbe:
    timeoutSeconds: 5
  readinessProbe:
    timeoutSeconds: 5

# Argo CD parameters
configs:
  params:
    server.insecure: true
    # admission webhook の default 値注入を drift と誤検知させない。
    controller.diff.server.side: "true"
  cm:
    url: "https://argocd.platform.yu-min3.com"

    oidc.config: |
      name: Keycloak
      issuer: https://auth.platform.yu-min3.com/realms/kensan
      clientID: argocd
      clientSecret: $argocd-oidc-secret:client-secret
      requestedScopes:
        - openid
        - profile
        - email
      requestedIDTokenClaims:
        groups:
          essential: true

    # ESO admission webhook が注入する default 値を drift から除外。
    resource.customizations.ignoreDifferences.external-secrets.io_ExternalSecret: |
      jqPathExpressions:
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.data[].remoteRef.nullBytePolicy
    # ServerSideDiff で拾い切れない `creationTimestamp: null` / `.status` 系を除外。
    resource.customizations.ignoreDifferences.all: |
      jqPathExpressions:
        - .metadata.creationTimestamp
        - .spec.template.metadata.creationTimestamp
        - .spec.volumeClaimTemplates[]?.metadata.creationTimestamp
        - .status

  # Keycloak group → ArgoCD role mapping。既存 admin user は break-glass として残す。
  rbac:
    policy.csv: |
      g, platform-admin, role:admin
      g, platform-dev, role:readonly
    scopes: '[groups]'
