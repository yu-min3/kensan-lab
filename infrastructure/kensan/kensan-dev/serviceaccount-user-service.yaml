## kensan user-service (dev) が Vault Transit API を呼ぶための ServiceAccount
##
## bind 先 Vault role: kensan-users-transit (vault-transit-engine capability で作成)
## policy: kensan-users-transit (transit/{encrypt,decrypt,hmac,rewrap}/users-name のみ)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service
  namespace: kensan-dev
imagePullSecrets:
  - name: ghcr-pull-secret
