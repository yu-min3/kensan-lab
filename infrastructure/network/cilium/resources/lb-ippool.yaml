apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: platform-pool
spec:
  blocks:
  - start: "192.168.0.240"
    stop: "192.168.0.249"
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: platform-l2-policy
spec:
  # Which network interfaces to announce on
  # 2026-05-07 有線化以降は eth*/en* がメイン。wlan*/wlp* は fallback として残す。
  interfaces:
  - "^eth.*"
  - "^en.*"
  - "^wlan.*"
  - "^wlp.*"

  # Only announce for LoadBalancer services using our IP pool
  loadBalancerIPs: true

  # Exclude control-plane nodes from L2 announcements (best practice)
  # This prevents lease transitions between master and worker nodes
  nodeSelector:
    matchExpressions:
    - key: node.kubernetes.io/exclude-from-external-load-balancers
      operator: DoesNotExist

  # Which services to announce (empty means all LoadBalancer services with IPs from our pool)
  serviceSelector:
    matchLabels: {}
