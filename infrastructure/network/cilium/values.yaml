# Chart config: infrastructure/gitops/argocd/applications/network/cilium/app.yaml
# Version: 1.18.3
#
# Bare-metal cluster with kube-proxy replacement and Hubble observability

# Replace kube-proxy entirely with Cilium
kubeProxyReplacement: true

# API server client rate limiting
k8sClientRateLimit:
  qps: 10
  burst: 20

# Pod CIDR for the cluster
k8s:
  cluster:
    cidr: 10.244.0.0/16

# IP Address Management mode
ipam:
  mode: kubernetes

# L2 announcements for LoadBalancer services (bare-metal)
l2announcements:
  enabled: true

# Enable external IPs support
externalIPs:
  enabled: true

# Network device auto-detection
# Let Cilium detect the default-route device on each node automatically.
# Required for mixed-interface clusters (RPi: wlan0, M4 Neo: wlp3s0).
# L2 announcement interfaces are controlled separately in lb-ippool.yaml.

# Hubble observability
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
