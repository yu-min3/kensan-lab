# Chart config: infrastructure/gitops/argocd/applications/network/cilium/app.yaml
# Version: 1.18.3
#
# Bare-metal cluster with kube-proxy replacement and Hubble observability

# Replace kube-proxy entirely with Cilium
kubeProxyReplacement: true

# API server client rate limiting
# Increased from default (qps:10/burst:20) to prevent lease renewal
# timeouts on WiFi-only clusters where latency spikes are common.
k8sClientRateLimit:
  qps: 20
  burst: 40

# Pod CIDR for the cluster
k8s:
  cluster:
    cidr: 10.244.0.0/16

# IP Address Management mode
ipam:
  mode: kubernetes

# L2 announcements for LoadBalancer services (bare-metal)
# Lease timings relaxed for WiFi-only cluster stability.
# Defaults: leaseDuration=15s, leaseRenewDeadline=10s, leaseRetryPeriod=2s
l2announcements:
  enabled: true
  leaseDuration: 30s
  leaseRenewDeadline: 20s
  leaseRetryPeriod: 4s

# Enable external IPs support
externalIPs:
  enabled: true

# Network device auto-detection
# Let Cilium detect the default-route device on each node automatically.
# Required for mixed-interface clusters (RPi: wlan0, M4 Neo: wlp3s0).
# L2 announcement interfaces are controlled separately in lb-ippool.yaml.

# Cilium Operator settings
# - replicas: 1 (default 2) — 4ノードクラスタで十分。CrashLoop 時の apiserver 負荷を半減
# - resources: light workload パターンに準拠
# - extraArgs: K8s client rate limit を抑制し、再起動時の API burst を制限
operator:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  extraArgs:
    - --operator-k8s-client-qps=15
    - --operator-k8s-client-burst=30

# Hubble observability
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
