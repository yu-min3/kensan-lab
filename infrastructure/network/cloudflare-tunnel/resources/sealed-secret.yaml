## PLACEHOLDER: このファイルは実際の SealedSecret に置き換える必要があります。
## 手順は temp/setup-cloudflare-tunnel.sh の Step 4 を参照。
##
## kubeseal で生成した sealed-secret.yaml でこのファイルを上書きしてください。
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cloudflare-tunnel-token
  namespace: cloudflare-tunnel
spec:
  encryptedData:
    token: PLACEHOLDER_ENCRYPTED_DATA_REGENERATE_FOR_YOUR_CLUSTER
  template:
    metadata:
      name: cloudflare-tunnel-token
      namespace: cloudflare-tunnel
    type: Opaque
