# gateway-platform 配下の host を 4 カテゴリに分けて ALLOW する単一 policy。
# 本 policy が gateway-platform に bound されると、ここで列挙されてない host は
# 暗黙 deny される (Istio AuthorizationPolicy の挙動)。新 host 追加時は
# 該当 rule の hosts: に追記する。
#
# Category 0 (OIDC flow path): protected host の `/oauth2/*` path は OIDC flow
# (login / callback / sign_out) を oauth2-proxy 自身が処理するため AuthZ を
# skip する。HTTPRoute (auth-system/oauth2-proxy-route) で /oauth2 prefix を
# oauth2-proxy backend に直送する設定とセット。
#
# Category 1 (app-native auth bypass): app 自身の auth に委ねる host。Vault は
# Vault token、ArgoCD は自前 JWT、Keycloak は自分自身。claim 検査なし → CLI も通る。
#
# Category 2 (admin + dev): 普段使いの UI 群。Keycloak group が
# platform-admin / platform-dev のどちらかなら通る。
#
# Category 3 (admin only): 強い権限が必要な UI。platform-admin のみ通る。
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: gateway-platform-allow
  namespace: istio-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway-platform
  action: ALLOW
  rules:
    # === Category 0: /oauth2/* path は OIDC flow 専用、claim 不要で通す ===
    # oauth2-proxy が外部 redirect_uri を whitelist_domains で検証し、
    # state parameter で CSRF 防御するため、AuthZ skip でセキュリティ問題なし。
    - to:
        - operation:
            paths:
              - /oauth2
              - /oauth2/*

    # === Category 1: app-native auth (gateway は素通し) ===
    # Grafana は auth.generic_oauth で Keycloak 直結 → app native 扱い。
    # Authorization Bearer header (oauth2-proxy が付与する) を Grafana が
    # 自分の API key として誤解釈し 403 を返す問題を回避するため、
    # gateway 段では ext_authz を skip し、Grafana 自身の OIDC handler
    # (/login/generic_oauth) に login させる。
    - to:
        - operation:
            hosts:
              - auth.platform.yu-min3.com
              - vault.platform.yu-min3.com
              - argocd.platform.yu-min3.com
              - grafana.platform.yu-min3.com

    # === Category 2: oauth2-proxy 強制 + admin or dev ===
    - to:
        - operation:
            hosts:
              - backstage.platform.yu-min3.com
              - prometheus.platform.yu-min3.com
      when:
        - key: request.auth.claims[groups]
          values:
            - platform-admin
            - platform-dev

    # === Category 3: oauth2-proxy 強制 + admin only ===
    - to:
        - operation:
            hosts:
              - hubble.platform.yu-min3.com
              - longhorn.platform.yu-min3.com
      when:
        - key: request.auth.claims[groups]
          values:
            - platform-admin
