# Istio Gateway for Platform Infrastructure
# Provides external access to monitoring, CI/CD, and developer portal services
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-platform
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "2" # Deploy after istiod (CRDs must be installed first)
spec:
  gatewayClassName: istio
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    hostname: "*.platform.yu-min3.com"
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            goldship.platform/environment: infrastructure

  - name: https
    protocol: HTTPS
    port: 443
    hostname: "*.platform.yu-min3.com"
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            goldship.platform/environment: infrastructure
    tls:
      mode: Terminate
      certificateRefs:
      - group: ""
        kind: Secret
        name: wildcard-platform-tls
---
# LoadBalancer Service for Platform Gateway
apiVersion: v1
kind: Service
metadata:
  name: gateway-platform-svc
  namespace: istio-system
  labels:
    gateway: platform
spec:
  type: LoadBalancer
  selector:
    gateway.networking.k8s.io/gateway-name: gateway-platform
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  - name: https
    port: 443
    targetPort: 443
    protocol: TCP
