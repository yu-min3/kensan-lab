## kensan-lab NetworkPolicy 規約: per-namespace default-deny + 明示 allow
## 詳細は docs/network-policy-guide.md, ADR-004 を参照
##
## ADR-009 後続: default-deny-all / allow-dns / allow-prometheus-scrape は
## CCNP (default-deny-for-mesh-ns / allow-dns-for-mesh-ns /
## allow-prometheus-scrape-for-mesh-ns) に集約済み

---
## Allow intra-namespace (operator ↔ webhook ↔ cert-controller)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}

---
## Allow egress to Kubernetes API server (Cilium identity-based)
## - Secret/ExternalSecret/ClusterSecretStore CRD watching
## - K8s auth method の TokenReview API (operator が Vault 認証時)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver-egress
  namespace: external-secrets
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver

---
## Allow egress to Vault (intra-cluster Service 直接アクセス)
## ESO は K8s auth で Vault に認証するため JWT iss matching の制約なし → Service 直接で OK
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-egress
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - protocol: TCP
          port: 8200

---
## ADR-009: allow-istio は CiliumClusterwideNetworkPolicy `allow-istio-for-mesh-ns` に移行
## (infrastructure/network/istio/resources/clusterwide-allow-istio.yaml)
## istio-injection: enabled ラベルで自動カバー、ここは per-ns で書かない

---
## Allow webhook ingress from API server (ValidatingWebhookConfiguration)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook-ingress
  namespace: external-secrets
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets-webhook
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 10250
