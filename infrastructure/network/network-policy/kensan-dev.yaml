## CCNP (default-deny-for-mesh-ns / allow-dns-for-mesh-ns /
## allow-prometheus-scrape-for-mesh-ns) に集約済み

---
## ADR-009: allow-istio は CCNP allow-istio-for-mesh-ns に集約済み

---
## Allow intra-namespace communication (service-to-service)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: kensan-dev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}

---
## Allow egress to kensan-data (PostgreSQL:5432, MinIO:9000, Polaris:8181)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kensan-data-egress
  namespace: kensan-dev
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kensan-data
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 8181

---
## Allow egress to OTel Collector (monitoring:4318)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-otel-egress
  namespace: kensan-dev
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4318

---
## Allow external egress for AI APIs (Anthropic, OpenAI)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-ai-egress
  namespace: kensan-dev
spec:
  podSelector:
    matchLabels:
      app: kensan-ai
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
