## ADR-009 後続: per-ns `allow-dns` NetworkPolicy を CCNP に集約
##
## istio-injection: enabled ラベルが付いた全 ns に対して kube-system の
## CoreDNS (port 53/UDP, 53/TCP) への egress を許可する。
##
## 元々 allow-istio-for-mesh-ns 導入で各 ns が Cilium 的に
## "explicit allow only" モードに切り替わったため、各 ns に allow-dns NP を
## 個別に置いていた (default-deny + allow-dns)。これを CCNP に集約する。
##
## 既存の per-ns allow-dns NP は別 PR で削除する。
##
## 対象外 (istio-injection 無しなので per-ns NP のまま):
##   - kensan-data / cert-manager / cloudflare-tunnel
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-dns-for-mesh-ns
spec:
  description: "All namespaces with istio-injection=enabled may resolve DNS via kube-system CoreDNS"
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.namespace.labels.istio-injection: enabled
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
