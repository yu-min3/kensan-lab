## Grafana auth.generic_oauth (Path B: Grafana 自前 OIDC) 用 client credentials を
## Vault から K8s Secret に同期する。
##
## 流れ:
##   ExternalSecret (このファイル)
##     → ESO operator が ClusterSecretStore "vault-backend" 経由で
##       secret/observability/grafana/oidc を read
##     → target.name = grafana-oidc-secret として Secret 生成
##     → values.yaml の envFromSecrets[0] が拾って Pod の env に注入
##     → Grafana が `$__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}` 等で参照
##
## Vault KV 投入手順:
##   bootstrap/keycloak/setup.sh が grafana client を Keycloak に作成し、
##   その client_secret を Vault に自動投入する (vault CLI + token があれば)。
##
## Secret key 命名:
##   Grafana は env 上書きを `GF_<SECTION>_<KEY>` 形式で受ける (`.` を `_` に変換)。
##   `auth.generic_oauth.client_id` → `GF_AUTH_GENERIC_OAUTH_CLIENT_ID`
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oidc
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-oidc-secret
    creationPolicy: Owner
  data:
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
      remoteRef:
        key: observability/grafana/oidc
        property: client-id
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      remoteRef:
        key: observability/grafana/oidc
        property: client-secret
