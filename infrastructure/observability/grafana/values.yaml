# Chart: grafana-community/grafana 11.3.5 (appVersion: 12.4.2)
# Repo migrated from grafana/helm-charts → grafana-community/helm-charts (2026-01-30)

# Admin credentials (managed by External Secrets Operator → Vault KV)
# secret は resources/external-secret.yaml で生成される
admin:
  existingSecret: grafana-admin-secret
  userKey: admin-user
  passwordKey: admin-password

# Disable init-chown-data (fsGroup handles ownership)
initChownData:
  enabled: false

# Resources
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Persistence
persistence:
  enabled: true
  type: pvc
  storageClassName: local-path
  size: 2Gi

# Sidecar configuration for auto-discovery
sidecar:
  datasources:
    enabled: true
    label: grafana_datasource
    labelValue: "1"
    searchNamespace: monitoring
    defaultDatasourceEnabled: false
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: monitoring
    folderAnnotation: grafana_folder
    folder: /tmp/dashboards

# Grafana configuration
grafana.ini:
  server:
    root_url: "http://grafana.monitoring.svc.cluster.local:3000"
  auth.anonymous:
    enabled: false

  # auth.proxy mode: oauth2-proxy が gateway 段で OIDC 認証済みの場合に、
  # Grafana は X-Auth-Request-User header を信頼してそのユーザとして扱う。
  # これがないと oauth2-proxy が forward する Authorization: Bearer <Keycloak JWT>
  # を Grafana が API key として解釈し "API key is invalid" で 403 を返す。
  auth.proxy:
    enabled: true
    header_name: X-Auth-Request-User
    header_property: username
    auto_sign_up: true
    headers: "Email:X-Auth-Request-Email Groups:X-Auth-Request-Groups"
    enable_login_token: true

# Timezone
defaultDashboardsTimezone: Asia/Tokyo

# PodDisruptionBudget
podDisruptionBudget:
  maxUnavailable: 1
