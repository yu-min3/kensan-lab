# Chart: grafana-community/loki 9.3.1 (appVersion: 3.6.7)
# Repo migrated from grafana/helm-charts → grafana-community/helm-charts (2026-03-16)

# Deployment mode: monolithic (single instance)
deploymentMode: SingleBinary

loki:
  # Common configuration for single-node
  commonConfig:
    replication_factor: 1

  # Storage: local filesystem
  storage:
    type: filesystem

  # Schema configuration
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  # Limits configuration
  limits_config:
    retention_period: 168h  # 7 days
    max_query_series: 100000
    max_query_parallelism: 32
    split_queries_by_interval: 15m
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20

  # Compactor configuration
  compactor:
    working_directory: /var/loki/compactor
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 150
    delete_request_store: filesystem

# Single Binary configuration
singleBinary:
  replicas: 1

  # Schedule on high-performance node (NVMe I/O for log storage)
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: hardware-class
                operator: In
                values:
                  - high-performance

  # Resources
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # Persistence
  persistence:
    enabled: true
    size: 10Gi
    storageClass: local-path
    enableStatefulSetAutoDeletePVC: false

# Gateway disabled (direct access via ClusterIP)
gateway:
  enabled: false

# Disable all other components (SingleBinary mode)
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Disable minio (not needed for filesystem)
minio:
  enabled: false

# ServiceMonitor for Prometheus Operator
monitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus
    interval: 30s

# Disable unused components
lokiCanary:
  enabled: false
test:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
