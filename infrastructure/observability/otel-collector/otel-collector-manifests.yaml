apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-opentelemetry-collector
  namespace: monitoring
  labels:
    helm.sh/chart: opentelemetry-collector-0.97.1
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/instance: otel-collector
    app.kubernetes.io/version: "0.104.0"
    app.kubernetes.io/managed-by: Helm
    
data:
  relay: |
    exporters:
      debug:
        verbosity: detailed
      loki:
        endpoint: http://loki.monitoring.svc:3100/loki/api/v1/push
      otlp/tempo:
        endpoint: tempo.monitoring.svc:4317
        tls:
          insecure: true
      prometheusremotewrite:
        endpoint: http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090/api/v1/write
        tls:
          insecure: true
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    processors:
      attributes:
        actions:
        - action: delete
          key: http.request.header.authorization
      batch:
        send_batch_size: 1000
        timeout: 10s
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
      resource:
        attributes:
        - action: upsert
          key: cluster.name
          value: goldship
        - action: upsert
          from_attribute: k8s.namespace.name
          key: deployment.environment
    receivers:
      jaeger:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:14250
          thrift_compact:
            endpoint: ${env:MY_POD_IP}:6831
          thrift_http:
            endpoint: ${env:MY_POD_IP}:14268
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus:
        config:
          scrape_configs:
          - job_name: opentelemetry-collector
            scrape_interval: 10s
            static_configs:
            - targets:
              - ${env:MY_POD_IP}:8888
      zipkin:
        endpoint: ${env:MY_POD_IP}:9411
    service:
      extensions:
      - health_check
      pipelines:
        logs:
          exporters:
          - loki
          processors:
          - memory_limiter
          - batch
          - resource
          receivers:
          - otlp
        metrics:
          exporters:
          - prometheusremotewrite
          processors:
          - memory_limiter
          - batch
          - resource
          receivers:
          - otlp
        traces:
          exporters:
          - otlp/tempo
          processors:
          - memory_limiter
          - batch
          - resource
          - attributes
          receivers:
          - otlp
      telemetry:
        metrics:
          address: 0.0.0.0:8888
