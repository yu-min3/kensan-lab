# Prometheus configuration for bare-metal Kubernetes cluster
# Optimized for Raspberry Pi hardware with minimal resource usage
#
# Usage: Generate manifest with CRDs included
#   helm template prometheus prometheus-community/kube-prometheus-stack \
#     --namespace monitoring \
#     --include-crds \
#     --values docs/prometheus-values.yaml \
#     > base-infra/prometheus/prometheus-stack.yaml
#
# IMPORTANT: Must use --include-crds flag to include Prometheus Operator CRDs

# Global settings
global:
  rbac:
    create: true

# Prometheus Operator
prometheusOperator:
  enabled: true
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Prometheus instance
prometheus:
  enabled: true
  prometheusSpec:
    # Resource limits for Raspberry Pi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # Storage configuration
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path  # Using local-path-provisioner
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Retention settings
    retention: 7d
    retentionSize: "9GB"

    # Service monitor selection
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

    # Enable monitoring of all namespaces
    serviceMonitorNamespaceSelector: {}
    podMonitorNamespaceSelector: {}

# Grafana - Dashboard and visualization
grafana:
  enabled: true

  # Admin credentials: Use existing Secret (managed by Sealed Secrets)
  # Secret name: prometheus-grafana (created from grafana-sealed-secret.yaml)
  # Retrieve password with: kubectl get secret prometheus-grafana -n monitoring -o jsonpath="{.data.admin-password}" | base64 -d
  admin:
    existingSecret: prometheus-grafana
    userKey: admin-user
    passwordKey: admin-password

  # Resource limits for Raspberry Pi
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Persistence for dashboards
  persistence:
    enabled: true
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 2Gi

  # Grafana configuration
  grafana.ini:
    server:
      root_url: "http://grafana.monitoring.svc.cluster.local:3000"
    auth.anonymous:
      enabled: false

  # Default dashboards
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: Asia/Tokyo

  # Data sources (Prometheus auto-configured)
  sidecar:
    dashboards:
      enabled: true
      defaultFolderName: "General"
    datasources:
      enabled: true
      defaultDatasourceEnabled: true

# Alertmanager
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 256Mi

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

# Node Exporter - monitors node metrics
nodeExporter:
  enabled: true
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

# Kube State Metrics - monitors Kubernetes object states
kube-state-metrics:
  enabled: true
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Default scrape configs
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false  # Not needed for kubeadm clusters
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: false  # Cilium replaces kube-proxy
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
