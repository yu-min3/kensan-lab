# Chart config: infrastructure/gitops/argocd/applications/observability/prometheus/app.yaml
# IMPORTANT: Must use --include-crds flag to include Prometheus Operator CRDs

# Global settings
global:
  rbac:
    create: true

# Prometheus Operator
prometheusOperator:
  enabled: true
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Prometheus instance
prometheus:
  enabled: true
  prometheusSpec:
    # Schedule on high-performance node (NVMe I/O for TSDB)
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: hardware-class
                  operator: In
                  values:
                    - high-performance

    # Resource limits
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # Storage configuration
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path  # Using local-path-provisioner
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Retention settings
    retention: 7d
    retentionSize: "9GB"

    # Service monitor selection
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

    # Enable monitoring of all namespaces
    serviceMonitorNamespaceSelector: {}
    podMonitorNamespaceSelector: {}

    # OTel Collector を scrape 対象に追加
    additionalScrapeConfigs:
      - job_name: 'otel-collector'
        static_configs:
          - targets:
              - 'otel-collector-opentelemetry-collector.monitoring.svc:8888'
        scrape_interval: 30s
        scrape_timeout: 10s

# Grafana - Dashboard and visualization
# Disabled: Grafana is now deployed independently in infrastructure/observability/grafana/
# This allows Grafana to serve as a unified visualization layer for the entire
# Observability stack (Prometheus, Tempo, Loki) without being tied to Prometheus
grafana:
  enabled: false
  forceDeployDashboards: true

# Alertmanager
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 256Mi

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

# Node Exporter - monitors node metrics
nodeExporter:
  enabled: true
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

# Kube State Metrics - monitors Kubernetes object states
kube-state-metrics:
  enabled: true
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# etcd monitoring — apiserver 障害の根本原因特定のため有効化
# master ノードで listen-metrics-urls に master IP を追加する手動作業が必要
# (手順: temp/fix-etcd-metrics.sh)
kubeEtcd:
  enabled: true
  endpoints:
    - 192.168.0.107
  service:
    enabled: true
    port: 2381
    targetPort: 2381
  serviceMonitor:
    scheme: http

# Default scrape configs
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true  # etcd アラートルール有効化（microSD I/O ボトルネック検知）
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: false  # Cilium replaces kube-proxy
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
