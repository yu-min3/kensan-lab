# Chart config: infrastructure/gitops/argocd/applications/observability/prometheus/app.yaml
# IMPORTANT: Must use --include-crds flag to include Prometheus Operator CRDs

# Global settings
global:
  rbac:
    create: true

# Prometheus Operator
prometheusOperator:
  enabled: true
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Prometheus instance
prometheus:
  enabled: true
  prometheusSpec:
    # Resource limits for Raspberry Pi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # Storage configuration
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path  # Using local-path-provisioner
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Retention settings
    retention: 7d
    retentionSize: "9GB"

    # Service monitor selection
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

    # Enable monitoring of all namespaces
    serviceMonitorNamespaceSelector: {}
    podMonitorNamespaceSelector: {}

    # OTel Collector を scrape 対象に追加
    additionalScrapeConfigs:
      - job_name: 'otel-collector'
        static_configs:
          - targets:
              - 'otel-collector-opentelemetry-collector.monitoring.svc:8888'
        scrape_interval: 30s
        scrape_timeout: 10s

# Grafana - Dashboard and visualization
# Disabled: Grafana is now deployed independently in infrastructure/observability/grafana/
# This allows Grafana to serve as a unified visualization layer for the entire
# Observability stack (Prometheus, Tempo, Loki) without being tied to Prometheus
grafana:
  enabled: false

# Alertmanager
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 256Mi

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

# Node Exporter - monitors node metrics
nodeExporter:
  enabled: true
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

# Kube State Metrics - monitors Kubernetes object states
kube-state-metrics:
  enabled: true
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Default scrape configs
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false  # Not needed for kubeadm clusters
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: false  # Cilium replaces kube-proxy
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
