# Chart: grafana-community/tempo 2.0.0 (appVersion: 2.10.1)
# Repo migrated from grafana/helm-charts → grafana-community/helm-charts (2026-01-30)

tempo:
  # Retention: 7 days
  retention: 168h

  # Pod IP via Downward API (OTel security best practice: bind to specific interface)
  extraEnv:
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP

  # Receivers: all bind to Pod IP
  # Jaeger is included by chart default (Helm deep merge) and cannot be removed
  # via values alone. Bind all receivers to Pod IP for consistent security posture.
  receivers:
    jaeger:
      protocols:
        grpc:
          endpoint: "${env:MY_POD_IP}:14250"
        thrift_binary:
          endpoint: "${env:MY_POD_IP}:6832"
        thrift_compact:
          endpoint: "${env:MY_POD_IP}:6831"
        thrift_http:
          endpoint: "${env:MY_POD_IP}:14268"
    otlp:
      protocols:
        grpc:
          endpoint: "${env:MY_POD_IP}:4317"
        http:
          endpoint: "${env:MY_POD_IP}:4318"

  # Metrics generator: required for TraceQL Metrics API
  metricsGenerator:
    enabled: true

  # Processors for metrics generation
  overrides:
    defaults:
      metrics_generator:
        processors:
          - local-blocks

  # Resources
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Persistence
persistence:
  enabled: true
  size: 10Gi
  storageClassName: local-path
  enableStatefulSetAutoDeletePVC: false

# Schedule on high-performance node (NVMe I/O for trace storage)
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: hardware-class
              operator: In
              values:
                - high-performance
