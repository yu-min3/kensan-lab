# Chart config: infrastructure/gitops/argocd/applications/observability/tempo/app.yaml

# Number of replicas
replicas: 1

# Tempo image configuration
tempo:
  repository: grafana/tempo
  tag: "2.3.1"
  pullPolicy: IfNotPresent

  # Resource limits
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # Tempo configuration
  structuredConfig:
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    ingester:
      trace_idle_period: 10s
      max_block_bytes: 1_000_000
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: 168h  # 7 days

    metrics_generator:
      processor:
        local_blocks:
          max_live_traces: 10000
          flush_to_metrics_gen: true
      storage:
        path: /var/tempo/metrics
        remote_write: []
      traces_storage:
        path: /var/tempo/traces

    overrides:
      defaults:
        metrics_generator:
          processors:
            - local_blocks

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
        pool:
          max_workers: 100
          queue_depth: 10000

# Persistence configuration
persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  storageClassName: local-path
  # Do not auto-delete PVC when StatefulSet is deleted
  enableStatefulSetAutoDeletePVC: false

# Service configuration
service:
  type: ClusterIP

# Service ports configuration
serviceMonitor:
  enabled: false

# Pod annotations
podAnnotations: {}

# Security context
securityContext: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Schedule on high-performance node (NVMe I/O for trace storage)
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: hardware-class
              operator: In
              values:
                - high-performance
