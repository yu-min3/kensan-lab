## ESO の VaultDynamicSecret generator (app ns 側)
## ExternalSecret から参照されて、Vault Database engine の動的 cred を fetch する
##
## ※ VaultDynamicSecret は namespace-scoped CR のため、serviceAccountRef.namespace は無視される
##   (CRD spec: "Ignored if referent is not cluster-scoped")。
##   よって SA は本 chart が同じ app ns に作成し (eso-sa.yaml)、
##   Vault 側の kubernetes auth role は per-instance で別途作成する (vault-auth-role.yaml)。
apiVersion: generators.external-secrets.io/v1alpha1
kind: VaultDynamicSecret
metadata:
  name: {{ include "vdbe.name" . }}
  namespace: {{ .Values.ns | required "ns required" }}
spec:
  path: database/creds/{{ include "vdbe.name" . }}
  method: GET
  ## VaultDynamicSecret は Vault 専用 generator のため provider 直下に server/auth を書く
  ## (SecretStore のように provider.vault.* で wrap しない)
  provider:
    server: {{ .Values.vaultProvider.server | quote }}
    auth:
      kubernetes:
        mountPath: kubernetes
        role: {{ include "vdbe.saName" . | quote }}
        serviceAccountRef:
          name: {{ include "vdbe.saName" . | quote }}
