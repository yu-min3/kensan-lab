## kensan project app DB (kensan/postgresql) — Phase 3a-3 で kensan-data → kensan に統合
## name = postgres-kensan-app (AppSet inject)
## host = postgresql.kensan.svc.cluster.local (default 通り)
## rootOwner / dbName: Bitnami の app user は "kensan" なので default ("kensan-app") から override
## keyMapping: kensan-app 系 service の env (DB_USER / DB_PASSWORD) に合わせる
ns: kensan
rootOwner: kensan
keyMapping:
  user: DB_USER
  password: DB_PASSWORD
