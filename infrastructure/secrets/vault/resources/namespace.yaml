apiVersion: v1
kind: Namespace
metadata:
  name: vault
  labels:
    app.kubernetes.io/managed-by: argocd
    kensan-lab.platform/environment: infrastructure  # gateway-platform の allowedRoutes selector
    kensan-lab.platform/tier: platform
    kensan-lab.platform/component: secrets-management
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    # istio sidecar 注入 (Phase 1: 全 mesh 内通信を mTLS で保護)
    istio-injection: enabled
