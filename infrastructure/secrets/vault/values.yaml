# Vault HA Helm chart with AWS KMS auto-unseal.
# Bootstrap procedure (AWS IAM + kubeseal): docs/bootstrapping/12-vault-stage1.md

global:
  enabled: true
  # Phase 1: Vault TLS 無効 (Istio mTLS でカバー、cluster 内通信のみ)
  # Phase 2 以降で TLS 有効化を再検討
  tlsDisable: true

# Vault Agent Injector は使わない (ESO で K8s Secret に bridge する設計)
injector:
  enabled: false

server:
  enabled: true

  # multi-arch image (arm64 + amd64). tag は明示 pin: docs/adr/011-vault-version-pinning.md
  image:
    repository: hashicorp/vault
    tag: "2.0.0"

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      # `config` は HCL string で chart default を完全置換する (deep merge 不可)。
      # chart upgrade 時は default 内容を再確認すること。
      config: |
        ui = true

        listener "tcp" {
          tls_disable     = 1
          address         = "[::]:8200"
          cluster_address = "[::]:8201"
        }

        storage "raft" {
          path = "/vault/data"
          # retry_join で自動 peer join。詳細: docs/runbooks/vault-raft-join.md
          retry_join {
            leader_api_addr = "http://vault-0.vault-internal:8200"
          }
          retry_join {
            leader_api_addr = "http://vault-1.vault-internal:8200"
          }
          retry_join {
            leader_api_addr = "http://vault-2.vault-internal:8200"
          }
        }

        # AWS KMS auto-unseal
        # 認証情報は extraSecretEnvironmentVars 経由 (env: AWS_ACCESS_KEY_ID/SECRET_ACCESS_KEY)
        seal "awskms" {
          region     = "ap-northeast-1"
          kms_key_id = "alias/vault-unseal-kensan"
        }

        service_registration "kubernetes" {}

        # Prometheus metrics (ServiceMonitor で scrape される)
        telemetry {
          prometheus_retention_time = "30s"
          disable_hostname          = true
        }

  # Raft data 用 PVC (local-path 暫定。docs/roadmap/storage-longhorn.md で Longhorn 移行検討)
  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: local-path
    accessMode: ReadWriteOnce

  # Audit log 用 PVC (file device、enable は bootstrap TF で実施)
  auditStorage:
    enabled: true
    size: 10Gi
    storageClass: local-path
    accessMode: ReadWriteOnce
    mountPath: /vault/audit

  # 各 Pod を別ノードに配置 (HA quorum 維持の前提)。map syntax で deep merge される
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: vault
              component: server
          topologyKey: kubernetes.io/hostname

  # PodDisruptionBudget: drain 時に quorum を死守 (3 中 2 必須)
  podDisruptionBudget:
    enabled: true
    minAvailable: 2

  # AWS KMS 認証情報を Pod env に注入
  # 参照する Secret は Step b で SealedSecret として作成 (vault-aws-kms-credentials)
  extraSecretEnvironmentVars:
    - envName: AWS_ACCESS_KEY_ID
      secretName: vault-aws-kms-credentials
      secretKey: aws_access_key_id
    - envName: AWS_SECRET_ACCESS_KEY
      secretName: vault-aws-kms-credentials
      secretKey: aws_secret_access_key

  # ServiceAccount: K8s auth method の TokenReviewer に使われる
  serviceAccount:
    create: true
    name: vault

  # Pi5 / Bosgame の容量に対して控えめなリソース要求
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

  service:
    enabled: true
    type: ClusterIP
    port: 8200

# UI 有効 (HTTPRoute は resources/httproute.yaml で外部公開、Step b)
ui:
  enabled: true
  serviceType: ClusterIP

# Prometheus ServiceMonitor (kube-prometheus-stack が pickup)
serverTelemetry:
  serviceMonitor:
    enabled: true
    selectors:
      release: prometheus  # kube-prometheus-stack の release 名に合わせる必要あり
  # alert rules は別途 prometheus 側 (resources/) で定義する想定
  prometheusRules:
    enabled: false
