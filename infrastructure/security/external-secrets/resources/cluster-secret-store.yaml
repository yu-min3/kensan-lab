# ESO の Vault 接続定義
#
# 認証経路: ESO operator pod が SA JWT を Vault に提示
#   → Vault が K8s TokenReview で検証
#   → Vault role "external-secrets" の policy が適用
#   → ESO は Vault token で /secret/data/* を読める
#
# Vault 側の前提 (Step e bootstrap TF で作成):
# - kubernetes auth method enable, mount path "kubernetes"
# - role "external-secrets" を bound_service_account_names=external-secrets,
#   bound_service_account_namespaces=external-secrets, policies=external-secrets-read で作成
# - policy "external-secrets-read" で path "secret/data/*" に read 権限付与
# - kv-v2 secret engine が "secret/" path に enable
#
# ESO → Vault は intra-cluster Service 直接アクセス (FQDN 経由じゃない)
# OIDC と違い K8s auth は JWT iss matching の制約がないので Service 直接で OK
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
