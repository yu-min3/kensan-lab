apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:23.0
        args:
        - start
        envFrom:
        - configMapRef:
            name: keycloak-env-config
        - secretRef:
            name: keycloak-secret
        ## Vault dynamic cred (KC_DB_USERNAME / KC_DB_PASSWORD で上書き、rotation 12h)
        ## prod/dev で同名 Secret (overlay 側 vault-database values で targetSecretName 指定)
        - secretRef:
            name: keycloak-postgres-cred
        ports:
        - name: http
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 10
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
