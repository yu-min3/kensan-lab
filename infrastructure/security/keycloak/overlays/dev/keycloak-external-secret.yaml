apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak
  namespace: platform-auth-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-secret
    creationPolicy: Owner
  ## KC_DB_PASSWORD は Vault dynamic cred (keycloak-postgres-cred) に移行済み (Stage 5c)
  data:
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef: { key: platform-auth/dev/keycloak, property: KEYCLOAK_ADMIN_PASSWORD }
