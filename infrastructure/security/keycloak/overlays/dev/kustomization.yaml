apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform-auth-dev

resources:
- namespace.yaml
- ../../base
- httproute.yaml
- postgresql-external-secret.yaml
- keycloak-external-secret.yaml

patches:
- path: keycloak-patch.yaml
  target:
    kind: Deployment
    name: keycloak
- path: postgresql-patch.yaml
  target:
    kind: StatefulSet
    name: postgresql
- path: affinity-patch.yaml
  target:
    kind: Deployment
    name: keycloak
- path: postgresql-affinity-patch.yaml
  target:
    kind: StatefulSet
    name: postgresql
