apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak
  namespace: platform-auth-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-secret
    creationPolicy: Owner
  data:
    - secretKey: KC_DB_PASSWORD
      remoteRef: { key: platform-auth/prod/keycloak, property: KC_DB_PASSWORD }
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef: { key: platform-auth/prod/keycloak, property: KEYCLOAK_ADMIN_PASSWORD }
