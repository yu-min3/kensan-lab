# oauth2-proxy が読む Secret を Vault から同期する。
#
# Vault path: secret/platform-auth/istio-gateway/platform
# 期待 fields: client-id / client-secret / cookie-secret
#   - client-id      = "istio-gateway-platform" (Keycloak client id, 公開可)
#   - client-secret  = bootstrap/keycloak/setup.sh が Bitwarden に保存した値
#   - cookie-secret  = openssl rand -base64 32 (HMAC 用、ローテ可)
#
# Yu が事前に投入する手順は setup.sh の最後の "次のステップ" 出力 + ADR-010
# に記載。投入前に oauth2-proxy が起動すると ExternalSecret は失敗、Pod は
# CrashLoop。Helm 側の sync wave で Vault apps の後ろに置いてある。
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-secret
  namespace: auth-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-secret
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: platform-auth/istio-gateway/platform
        property: client-id
    - secretKey: client-secret
      remoteRef:
        key: platform-auth/istio-gateway/platform
        property: client-secret
    - secretKey: cookie-secret
      remoteRef:
        key: platform-auth/istio-gateway/platform
        property: cookie-secret
