# Gateway-level OIDC auth front (Istio ext_authz). 詳細: docs/auth/oauth2-proxy.md

replicaCount: 2

image:
  # chart は image.registry (default quay.io) を repository に prepend する。
  # `quay.io/...` と書くと double prefix になるので registry なしで書く。
  repository: oauth2-proxy/oauth2-proxy
  tag: v7.15.2

nodeSelector:
  kubernetes.io/arch: amd64

# Pod Disruption Budget — drain で全 replica が同時に落ちないように
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Resource budget — oauth2-proxy は軽量 (idle ~15MB RSS)
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# cookie store のため session affinity 不要 (Redis は homelab スケールには重い)

# chart の top-level `securityContext:` は container 側にマップされる (chart values 仕様)。
# fsGroup は pod-level 専用なので podSecurityContext に置く必要あり。
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 2000
  runAsGroup: 2000
  fsGroup: 2000
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true

# OIDC config — client_id / client_secret / cookie_secret は existingSecret から
# 読む (Vault → ExternalSecret → auth-system/oauth2-proxy-secret)
config:
  existingSecret: oauth2-proxy-secret  # ExternalSecret 作成 (resources/externalsecret.yaml)

  # Required Secret keys: client-id / client-secret / cookie-secret (chart 既定)
  requiredSecretKeys:
    - client-id
    - client-secret
    - cookie-secret

  # 全 email domain 受け入れ (group 認可は Istio AuthorizationPolicy 側で行う)
  emailDomains: ["*"]

  # configFile を渡すと chart の `emailDomains` 値は無視される (configFile 優先)。
  configFile: |-
    provider                       = "keycloak-oidc"
    oidc_issuer_url                = "https://auth.platform.yu-min3.com/realms/kensan"
    insecure_oidc_allow_unverified_email = false

    email_domains                  = ["*"]

    cookie_domains                 = [".platform.yu-min3.com"]
    cookie_samesite                = "lax"
    cookie_secure                  = true
    cookie_httponly                = true
    cookie_expire                  = "10h"
    cookie_refresh                 = "1h"

    whitelist_domains              = [".platform.yu-min3.com"]

    proxy_prefix                   = "/oauth2"

    # `groups` は Keycloak では scope ではなく claim 名。scope に含めると reject される。
    scope                          = "openid email profile"

    pass_access_token              = true
    pass_authorization_header      = true
    set_authorization_header       = true
    set_xauthrequest               = true

    reverse_proxy                  = true
    real_client_ip_header          = "X-Forwarded-For"

    # Istio ext_authz は HTTP 200 のみ「allow」と認識する。
    # static://200 で 200 を返さないと oauth2-proxy が deny 扱いになる。
    upstreams                      = ["static://200"]

    skip_provider_button           = true

    # CLI Bearer token (vault login -method=oidc 等) は素通り。
    skip_jwt_bearer_tokens         = true
    extra_jwt_issuers              = ["https://auth.platform.yu-min3.com/realms/kensan=istio-gateway-platform"]

    ping_path                      = "/ping"
    metrics_address                = "0.0.0.0:44180"

# Service: ClusterIP のみ (mesh-internal で Istio から呼ばれる)
service:
  type: ClusterIP
  portNumber: 4180

# 公開は Istio Gateway 経由 (resources/httproute.yaml)。chart 内蔵 Ingress 無効化。
ingress:
  enabled: false

# Health checks (chart デフォルトのまま使えるが明示)
livenessProbe:
  enabled: true
readinessProbe:
  enabled: true

# Metrics (Prometheus が拾う前提)
metrics:
  enabled: true
  port: 44180
  servicePort: 44180

# ServiceMonitor — kube-prometheus-stack で auto-discover
serviceMonitor:
  enabled: true
  namespace: auth-system
  interval: 30s
