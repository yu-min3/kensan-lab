## kensan-lab NetworkPolicy 規約: per-namespace default-deny + 明示 allow
## 詳細は docs/network-policy-guide.md, ADR-004 を参照

## Default deny all ingress and egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: vault-config-operator
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
## Allow DNS resolution (kube-system)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: vault-config-operator
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
## Allow egress to Kubernetes API server (Cilium identity-based)
## - VCO 自身の CRD watching
## - K8s auth method の TokenReview API (operator が Vault 認証時)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver-egress
  namespace: vault-config-operator
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver

---
## Allow egress to Vault (intra-cluster Service 直接アクセス)
## VCO は K8s auth で Vault に認証するため Service 直接で OK
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-egress
  namespace: vault-config-operator
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - protocol: TCP
          port: 8200

---
## ADR-009: allow-istio は CCNP allow-istio-for-mesh-ns に集約済み

---
## Allow Prometheus scraping from monitoring namespace
## VCO の metrics は kube-rbac-proxy 経由 (8443) で expose されるのが kubebuilder 標準
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: vault-config-operator
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8443

---
## Allow ingress from kube-apiserver to webhook server (validating/mutating)
## VCO の webhook は Service vault-config-operator-webhook-service:443 → pod:9443
## kube-apiserver が CRD apply 時に webhook を呼ぶため Cilium identity-based selector で許可
##
## 注意: kensan-lab の環境では kube-apiserver からの webhook 呼び出しが
## Cilium identity "remote-node" として識別される (kubeadm + Cilium kube-proxy
## replacement の特性。kube-apiserver host が pod CIDR 経由で source 判定される)。
## そのため kube-apiserver と remote-node 両方を許可する。
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver-webhook-ingress
  namespace: vault-config-operator
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - kube-apiserver
        - remote-node
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
