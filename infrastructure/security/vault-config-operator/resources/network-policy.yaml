## kensan-lab NetworkPolicy 規約: per-namespace default-deny + 明示 allow
## 詳細は docs/network-policy-guide.md, ADR-004 を参照

## Default deny all ingress and egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: vault-config-operator
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
## Allow DNS resolution (kube-system)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: vault-config-operator
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
## Allow egress to Kubernetes API server (Cilium identity-based)
## - VCO 自身の CRD watching
## - K8s auth method の TokenReview API (operator が Vault 認証時)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver-egress
  namespace: vault-config-operator
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver

---
## Allow egress to Vault (intra-cluster Service 直接アクセス)
## VCO は K8s auth で Vault に認証するため Service 直接で OK
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-egress
  namespace: vault-config-operator
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - protocol: TCP
          port: 8200

---
## Allow ingress/egress to istio-system (kensan-lab 共通パターン: allow-istio)
## sidecar → istiod xDS (15012/15014) 接続のため必須。port 全許可は kensan-lab
## の既存ベストプラクティス (cf. infrastructure/security/keycloak/base/network-policy.yaml)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-istio
  namespace: vault-config-operator
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system

---
## Allow Prometheus scraping from monitoring namespace
## VCO の metrics は kube-rbac-proxy 経由 (8443) で expose されるのが kubebuilder 標準
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: vault-config-operator
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8443
