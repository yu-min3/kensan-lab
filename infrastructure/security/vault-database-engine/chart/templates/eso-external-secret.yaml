## ESO ExternalSecret (app ns 側)
## 上の VaultDynamicSecret generator から fetch した動的 cred を K8s Secret に書き出す。
## refreshInterval ごとに新 user/pw が払い出され Secret が更新される (TTL 切れ前に rotation)。
##
## target.template: Vault native の {username, password} を app が期待する env 名 (POSTGRES_USER 等) に
## リネームして書き出す。Pod env は Secret の key 名を参照するので、リネームしておくと
## Phase 5c で旧 Secret から切り替える時に Pod env (`POSTGRES_USER`) はそのままで Secret 名だけ変えれば良い
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "vdbe.name" . }}
  namespace: {{ .Values.ns }}
spec:
  refreshInterval: {{ .Values.esoRefreshInterval | quote }}
  target:
    name: {{ include "vdbe.targetSecretName" . }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      ## Stakater Reloader: rotation 時に match=true な Secret + search=true な
      ## workload のペアで rolling restart trigger。VDBE が払い出す動的 cred は
      ## 必ず rotation で書き換わるので chart 側で一律 annotate しておく
      ## (workload 側で search=true を付けないと restart は走らないので副作用なし)。
      metadata:
        annotations:
          reloader.stakater.com/match: "true"
      data:
        {{ .Values.keyMapping.user }}: "{{ `{{ .username }}` }}"
        {{ .Values.keyMapping.password }}: "{{ `{{ .password }}` }}"
        {{- if .Values.keyMapping.connectionUrl }}
        ## connection URL form (e.g. Dagster の DAGSTER_PG_URL のように URL 1 本で要求する app 用)
        {{ .Values.keyMapping.connectionUrl }}: "postgresql://{{ `{{ .username }}` }}:{{ `{{ .password }}` }}@{{ include "vdbe.host" . }}:{{ .Values.port }}/{{ include "vdbe.dbName" . }}?sslmode=disable"
        {{- end }}
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: VaultDynamicSecret
          name: {{ include "vdbe.name" . }}
