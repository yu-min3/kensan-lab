## ESO の VaultDynamicSecret generator (app ns 側)
## ExternalSecret から参照されて、Vault Database engine の動的 cred を fetch する
apiVersion: generators.external-secrets.io/v1alpha1
kind: VaultDynamicSecret
metadata:
  name: {{ include "vdbe.name" . }}
  namespace: {{ .Values.ns | required "ns required" }}
spec:
  path: database/creds/{{ include "vdbe.name" . }}
  method: GET
  ## VaultDynamicSecret は Vault 専用 generator のため provider 直下に server/auth を書く
  ## (SecretStore のように provider.vault.* で wrap しない)
  provider:
    server: {{ .Values.vaultProvider.server | quote }}
    auth:
      kubernetes:
        mountPath: {{ .Values.vaultProvider.auth.kubernetes.mountPath | quote }}
        role: {{ .Values.vaultProvider.auth.kubernetes.role | quote }}
        serviceAccountRef:
          name: {{ .Values.vaultProvider.auth.kubernetes.serviceAccountRef.name | quote }}
          namespace: {{ .Values.vaultProvider.auth.kubernetes.serviceAccountRef.namespace | quote }}
