## NetworkPolicy: Vault が動的 user の払い出しのため PostgreSQL に接続できるようにする
## Vault server は vault ns で動くが、各 app ns には default-deny-all NP があるため
## ingress port 5432 を vault ns from だけ穴開けする。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-to-{{ include "vdbe.name" . }}
  namespace: {{ .Values.ns }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.releaseName }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - port: 5432
          protocol: TCP
