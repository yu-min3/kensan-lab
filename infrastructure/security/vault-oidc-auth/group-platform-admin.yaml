## External Identity Group "platform-admin"
## Keycloak group "platform-admin" 所属ユーザーが OIDC login すると、
## entity-alias がこの group の alias と name match → group の policy が effective に。
##
## type: external (Vault 内部で管理せず、外部 (=OIDC) 由来の group メンバーシップ)
## policies: 既存 admin policy (TF で作成済) をここで再 attach
##
## NOTE: TF state 喪失のため、admin policy 自体は VCO 管理外。policy 定義の変更が
## 必要になったら別途 Policy CR で takeover する (現状は policy 内容変更予定なし)。
apiVersion: redhatcop.redhat.io/v1alpha1
kind: Group
metadata:
  name: platform-admin
  namespace: vault
spec:
  authentication:
    path: kubernetes
    role: vault-config-operator
  name: platform-admin     # Vault Identity 側の group 名
  type: external           # OIDC backend の groups claim 経由でメンバー判定
  policies:
    - admin                # TF で作成済 (bootstrap/vault/policies.tf)
