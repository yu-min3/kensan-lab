## Vault JWT/OIDC role "default" — 全 Keycloak ユーザーが通る単一 role
##
## 旧 platform-admin / platform-dev role は role 別に bound_claims + token_policies で
## ユーザーの権限を分けていたが、login UX が悪い (Role 入力必須)。本 role は:
## - bound_claims で platform-admin or platform-dev を許可 (どちらにも居ないユーザーは reject)
## - token_policies は付けず、policy は External Identity Group (group-*.yaml) 側で attach
##   → entity が groups claim から派生した group_alias 経由で policy を継承する仕組み
##
## auth/oidc/config の default_role を "default" に切り替えることで、Vault UI の
## Role 欄を空のまま Sign in でこの role が使われる (post-bootstrap-oidc-ux.sh で実行)。
##
## redirect_uris は bootstrap/keycloak/setup.sh が Keycloak の "vault" client に
## 登録してる UI と CLI 両方の callback。
apiVersion: redhatcop.redhat.io/v1alpha1
kind: JWTOIDCAuthEngineRole
metadata:
  name: default
  namespace: vault
spec:
  authentication:
    path: kubernetes
    role: vault-config-operator
  path: oidc                     # auth backend mount path (= TF が作った "oidc")
  name: default                  # role name as visible to vault (auth/oidc/role/default)
  roleType: oidc
  userClaim: sub
  boundAudiences:
    - vault                      # Keycloak の "vault" client_id
  groupsClaim: groups            # id_token の "groups" を entity alias 群に展開
  boundClaims:
    groups:
      - platform-admin
      - platform-dev
  tokenPolicies: []              # policy は External Group 経由 (group-*.yaml) で attach
  tokenTTL: "1h"
  tokenMaxTTL: "8h"
  allowedRedirectURIs:
    - https://vault.platform.yu-min3.com/ui/vault/auth/oidc/oidc/callback
    - http://localhost:8250/oidc/callback     # CLI: vault login -method=oidc
  OIDCScopes:
    - openid
    # email / profile は不要 (識別は sub claim、group は groups claim 直接)
