# ADR-006: app-{name} flat + 3-axis labels
apiVersion: v1
kind: Namespace
metadata:
  name: app-kensan
  labels:
    # 旧 unprefixed labels — 既存 selector 互換のため残置（参照が無くなり次第削除候補）
    environment: prod
    team: yu
    app: kensan
    pod-security.kubernetes.io/enforce: restricted
    # gateway-prod の allowedRoutes namespace selector（これが無いと HTTPRoute が
    # NotAllowedByListeners で拒否される）
    kensan-lab.platform/environment: production
    # ADR-006 正準の prefixed 3-axis + tier。tier=application は Kyverno app-tier
    # policy (disallow-latest-tag / require-requests) の scope selector でもある
    kensan-lab.platform/team: yu
    kensan-lab.platform/app: kensan
    kensan-lab.platform/tier: application
    ## Kyverno pss-restricted の対象宣言 (旧 PSA enforce=restricted の引き継ぎ、v2 統一設計)。
    ## PSA label (enforce: restricted) は PR #3 (Enforce 昇格) と同時に撤去
    kensan-lab.platform/pss-level: restricted
