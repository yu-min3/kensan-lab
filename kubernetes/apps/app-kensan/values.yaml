# app-kensan — app-base chart の values（最初の消費者）
# chart: charts/app-base / Application CR: kubernetes/argocd/applications/apps/app-kensan/app.yaml

nameOverride: kensan
image:
  repository: ghcr.io/yu-min3/kensan
  tag: v0.3.0
env:
  - name: KENSAN_DATA_DIR
    value: /data
  # distroless の既定は UTC。daily のパス解決・@due の「今日」判定・
  # 「0〜6時は前日の daily」規約（tasks.ReflectionDate）はすべて time.Now() 依存のため、
  # JST を明示しないと日本時間 9:00 まで前日扱いになる（distroless static は tzdata 同梱）
  - name: TZ
    value: Asia/Tokyo
ghcrPullSecret:
  enabled: true
pvc:
  enabled: true
  # 本番 volume は resources/pvc-workspace.yaml（raw manifest、Retain SC）。
  # chart には既存 claim 名だけ渡す
  create: false
  name: kensan-workspace
  mountPath: /data
otel:
  enabled: true
  serviceName: kensan
httproute:
  enabled: true
  # ⚠️ host 追加時の不変条件: 追加する host は必ず
  # AuthorizationPolicy（gateway-prod-oauth2-authz）の hosts にも同時に載せること。
  # 載せ忘れた host は ext_authz を素通りして無認証で workspace が露出する。
  hostnames:
    - kensan.app.yu-min3.com # 本番 host（Phase 7 で legacy kensan-route から継承）
    - kensan.yu-mins.com # Cloudflare Tunnel 経由の外部公開（gateway-prod http-tunnel listener）
# gateway 層 Keycloak SSO（ext_authz）。LAN 内でも認証必須にする
auth:
  gatewayOAuth2:
    enabled: true
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi
