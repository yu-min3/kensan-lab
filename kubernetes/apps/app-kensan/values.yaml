# app-kensan — app-base chart の values（最初の消費者）
# chart: charts/app-base / Application CR: kubernetes/argocd/applications/apps/app-kensan/app.yaml

nameOverride: kensan

image:
  repository: ghcr.io/yu-min3/kensan
  tag: v0.1.1

env:
  - name: KENSAN_DATA_DIR
    value: /data

ghcrPullSecret:
  enabled: true

# Phase 5 予行: 検証用 PVC（データはコピー、SSoT はまだ Mac）。
# Phase 6 cutover で本番 RWX volume の claim に切り替える
pvc:
  enabled: true
  create: true
  size: 2Gi
  storageClass: longhorn
  accessModes: ["ReadWriteOnce"]
  mountPath: /data

otel:
  enabled: true
  serviceName: kensan

httproute:
  enabled: true
  # ⚠️ LAN 限定の不変条件（公開前ブロッカー、unification-plan.md 未決事項）:
  # kensan は自前認証を持たず gateway-prod に ext_authz も無い。
  # 公開 DNS / Cloudflare Tunnel 経路 / *.yu-mins.com hostname をここに
  # 追加しないこと。公開するには先に認証（ext_authz 拡張 or native OIDC）を入れる。
  hostnames:
    - kensan-preview.app.yu-min3.com # Phase 7 で kensan.app.yu-min3.com を legacy から継承

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi
