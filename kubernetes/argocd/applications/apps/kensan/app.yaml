apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kensan
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-options: Prune=false  # root-app からの Application CR prune 防止 (子リソースには効かない: PR #366。PVC は volumeClaimTemplates 由来で ArgoCD 管理外)
  # NOTE: resources-finalizer 不在 — Application 削除で kensan データ蒸発を防ぐ
spec:
  project: app-project
  source:
    repoURL: https://github.com/yu-min3/kensan-lab
    targetRevision: main
    path: apps/kensan-legacy/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kensan
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
