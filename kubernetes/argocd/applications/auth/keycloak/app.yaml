apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2" # Deploy after Istio (depends on HTTPRoute)
    argocd.argoproj.io/sync-options: Prune=false  # disaster recovery: platform-auth-prod の Postgres PV (Keycloak realm 設定) 保護
  # NOTE: resources-finalizer 不在 — Application 削除で realm/postgres 蒸発を防ぐ
spec:
  project: platform-project

  source:
    repoURL: 'https://github.com/yu-min3/kensan-lab'
    targetRevision: main
    path: kubernetes/auth/keycloak
    directory:
      recurse: false

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: platform-auth-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
