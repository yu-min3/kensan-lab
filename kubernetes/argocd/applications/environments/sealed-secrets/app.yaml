## sealed-secrets namespace 管理専用 app (kyverno-namespace と同パターン)
## NOTE: app 名は controller 本体の app (sealed-secrets) と衝突するため -namespace suffix
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets-namespace
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project
  source:
    repoURL: https://github.com/yu-min3/kensan-lab
    targetRevision: main
    path: kubernetes/environments/sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
