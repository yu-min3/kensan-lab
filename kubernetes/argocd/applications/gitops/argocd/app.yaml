apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 9.1.0
      helm:
        releaseName: argocd
        valueFiles:
          - $values/kubernetes/argocd/values.yaml
    - repoURL: https://github.com/yu-min3/kensan-lab
      targetRevision: main
      ref: values
    - repoURL: https://github.com/yu-min3/kensan-lab
      targetRevision: main
      path: kubernetes/argocd/resources
    # AppProject manifests (platform-project / app-project / default) を GitOps 管理に。
    # 旧来 platform-project は repo に存在しつつどの Application からも sync されず、
    # cluster は手動 apply された残骸状態だった (kubectl get appproject platform-project
    # で確認できるが、 git の変更は反映されない)。 argocd app に sources を追加して解消。
    - repoURL: https://github.com/yu-min3/kensan-lab
      targetRevision: main
      path: kubernetes/argocd/projects

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Auto-generated secrets and Helm hook resources
  ignoreDifferences:
    - group: ''
      kind: Secret
      name: argocd-secret
      jsonPointers:
        - /data
    - group: ''
      kind: ConfigMap
      name: argocd-cm
      jsonPointers:
        - /data/dex.config
    - group: ''
      kind: ServiceAccount
      name: argocd-redis-secret-init
    - group: rbac.authorization.k8s.io
      kind: Role
      name: argocd-redis-secret-init
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
      name: argocd-redis-secret-init
