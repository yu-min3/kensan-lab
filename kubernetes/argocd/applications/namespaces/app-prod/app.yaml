## app-prod (env-shared landing zone) の ns + SA + pull-secret 管理 app
## ADR-006: 空になり次第削除候補。新規 app は app-{name} ns を自前で持つ
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  project: platform-project
  source:
    repoURL: https://github.com/yu-min3/kensan-lab
    targetRevision: main
    path: kubernetes/namespaces/app-prod
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: app-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    ## ns object は namespace.yaml がこの app の管理下にあるため CreateNamespace 不要
    - CreateNamespace=false
