## kyverno namespace 管理専用 app (environments パターン、monitoring app と同構成)
## ns lifecycle は責務分離のため engine app (kyverno) から切り出す。
## directory.include で namespace.yaml のみを source 対象にする (component dir は除外)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-namespace
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project
  source:
    repoURL: https://github.com/yu-min3/kensan-lab
    targetRevision: main
    path: kubernetes/policy
    directory:
      recurse: false
      include: 'namespace.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
