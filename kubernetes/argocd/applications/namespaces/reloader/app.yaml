## ⚠️ ADR-020: 統合予定、削除しないこと (このコミットではまだ)。
## `secrets/reloader` app が resources/namespace.yaml を追加 source として持つようになったので、
## ライブクラスタで ns の tracking-id が `reloader` app に移ったことを確認してから、この app と
## kubernetes/secrets/reloader/namespace.yaml (重複コピー) を同じ PR で削除する。
## 先にこの app だけ消すと、resources-finalizer + prune:true で reloader ns ごと消える。
## 旧: reloader namespace 管理専用 app (kyverno-namespace と同パターン)
## 既存の bare ns を SSA で adopt して contract 準拠の label を付与する
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reloader-namespace
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project
  source:
    repoURL: https://github.com/yu-min3/kensan-lab
    targetRevision: main
    ## ns manifest はコンポーネント本体ディレクトリに同居させ、include で抜く (統一パターン)
    ## include 必須: 同居する values.yaml (helm values) を directory source が拾わないように
    path: kubernetes/secrets/reloader
    directory:
      recurse: false
      include: 'namespace.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: reloader
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
