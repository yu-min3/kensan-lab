apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-policy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"  # Cluster-wide network policy: deploy before workloads
    argocd.argoproj.io/sync-options: Prune=false  # root-app からの Application CR prune 防止。CCNP 自体の防御はリソース個別 annotation 側 (PR #366 の教訓)
  # NOTE: resources-finalizer 不在 — Application 削除で CCNP 蒸発 → mesh 通信全滅を防ぐ
spec:
  project: platform-project

  source:
    repoURL: https://github.com/yu-min3/kensan-lab
    targetRevision: main
    path: kubernetes/network/network-policy

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
