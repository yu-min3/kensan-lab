apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project

  source:
    repoURL: 'https://github.com/yu-min3/kensan-lab'
    targetRevision: main
    path: kubernetes/secrets/sealed-secrets
    ## exclude 必須: 同居する namespace.yaml は sealed-secrets-namespace app が管理する
    directory:
      recurse: false
      exclude: 'namespace.yaml'

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: sealed-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    ## ns は sealed-secrets-namespace app が管理 (label contract 込み)
    - CreateNamespace=false
