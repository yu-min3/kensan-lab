apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"  # Deploy after sealed-secrets, cert-manager (KMS creds は SealedSecret 経由)
    argocd.argoproj.io/sync-options: Prune=false  # disaster recovery: vault ns + PV データ保護のため Prune 禁止
  # NOTE: resources-finalizer を意図的に外している。Application 削除時に vault ns + PVC
  # が cascade prune されると、PV (reclaimPolicy=Delete) ごと raft データが蒸発する。
  # 削除が本当に必要な場合は `kubectl delete app vault --cascade=orphan`
spec:
  project: platform-project

  sources:
    - repoURL: https://helm.releases.hashicorp.com
      chart: vault
      targetRevision: 0.32.0
      helm:
        releaseName: vault
        valueFiles:
          - $values/kubernetes/secrets/vault/values.yaml
    - repoURL: https://github.com/yu-min3/kensan-lab
      targetRevision: main
      ref: values
    - repoURL: https://github.com/yu-min3/kensan-lab
      targetRevision: main
      path: kubernetes/secrets/vault/resources

  destination:
    server: https://kubernetes.default.svc
    namespace: vault

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
