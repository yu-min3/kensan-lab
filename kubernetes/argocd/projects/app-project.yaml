apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: app-project
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  description: Application Developer project for all app workloads

  sourceRepos:
  - "https://github.com/yu-min3/kensan-lab"
  - "https://github.com/yu-min3/*"

  destinations:
  # ADR-006 の app-{name} flat namespace。個別列挙ではなく glob（app-konro 追加時に
  # ns 単位の列挙が per-app プラットフォーム編集になっていたため、ADR-021 と同じ
  # 「パターンで受ける」方針に統一。app-* 以外へは置けないままなので制約は維持）
  - namespace: "app-*"
    server: "https://kubernetes.default.svc"

  # Apps own their own namespace (per-app namespace design)
  clusterResourceWhitelist:
  - group: ""
    kind: Namespace

  namespaceResourceWhitelist:
  # Workloads
  - group: "apps"
    kind: Deployment
  - group: "apps"
    kind: StatefulSet
  - group: "batch"
    kind: Job
  - group: "policy"
    kind: PodDisruptionBudget
  # Storage（app-base chart の data PVC）
  - group: ""
    kind: PersistentVolumeClaim
  # Networking
  - group: ""
    kind: Service
  - group: "networking.k8s.io"
    kind: NetworkPolicy
  - group: "gateway.networking.k8s.io"
    kind: HTTPRoute
  # Configuration & Identity
  - group: ""
    kind: ConfigMap
  - group: ""
    kind: Secret
  - group: ""
    kind: ServiceAccount
  # Sealed Secrets
  - group: "bitnami.com"
    kind: SealedSecret
  # External Secrets (Vault → K8s Secret bridge)
  - group: "external-secrets.io"
    kind: ExternalSecret
  # Prometheus Operator
  - group: "monitoring.coreos.com"
    kind: ServiceMonitor
  # Istio Security
  - group: "security.istio.io"
    kind: AuthorizationPolicy
