apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-project
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  description: Platform Engineering project for infrastructure components

  # Source repositories that applications can pull from
  sourceRepos:
  - "https://github.com/yu-min3/kensan-lab"
  - "*" # Allow Helm charts and other external sources

  # Destinations where applications can be deployed
  # Using wildcard for all namespaces as this cluster is dedicated to infrastructure
  destinations:
  - namespace: "*"
    server: "https://kubernetes.default.svc"

  # Allow all cluster-scoped resources (required for CNI, CRDs, etc.)
  clusterResourceWhitelist:
  - group: "*"
    kind: "*"

  # Namespace-scoped resources whitelist (allow all for platform components)
  namespaceResourceWhitelist:
  - group: "*"
    kind: "*"

  # Orphaned resources handling
  orphanedResources:
    warn: true
    ignore:
      # kube-system runtime resources (not managed by Cilium app)
      - group: ""
        kind: ConfigMap
      - group: ""
        kind: Endpoints
      - group: ""
        kind: Pod
      - group: ""
        kind: Secret
      - group: apps
        kind: ReplicaSet
      # Istio control plane auto-distributed ConfigMaps (mesh CA pubkey / CRL)
      # istiod auto-distributes these to every istio-injection=enabled namespace
      - kind: ConfigMap
        name: istio-ca-root-cert
      - kind: ConfigMap
        name: istio-ca-crl
      # Service が自動生成する EndpointSlice (group: discovery.k8s.io)
      # 旧来の Endpoints (group: "") とは別 kind なので個別 ignore が必要
      - group: discovery.k8s.io
        kind: EndpointSlice
      # StatefulSet の volumeClaimTemplates が自動生成する PVC
      # ArgoCD は parent StatefulSet を管理するが、 子 PVC は別 resource として
      # tracking-id を持たないため orphan として検出される。 GitOps 化不可
      # (volumeClaimTemplates は cluster 側で自動展開される)。
      - group: ""
        kind: PersistentVolumeClaim
