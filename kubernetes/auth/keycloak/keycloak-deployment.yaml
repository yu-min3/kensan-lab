apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: platform-auth-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
      annotations:
        ## Stakater Reloader: keycloak-postgres-cred (Vault dynamic cred, 12h rotation)
        ## が rotate されたら Pod を rolling restart して新 env を取り込む。
        reloader.stakater.com/search: "true"
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: hardware-class
                    operator: In
                    values:
                      - high-performance
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:23.0
        args:
        - start
        envFrom:
        - configMapRef:
            name: keycloak-env-config
        - secretRef:
            name: keycloak-secret
        - secretRef:
            name: keycloak-postgres-cred
        ports:
        - name: http
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 10
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
