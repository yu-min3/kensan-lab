apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-env-config
  namespace: platform-auth-prod
data:
  KC_DB: postgres
  KC_DB_URL_HOST: postgresql
  KC_DB_URL_DATABASE: keycloak
  ## KC_DB_USERNAME / KC_DB_PASSWORD は keycloak-postgres-cred (Vault dynamic) が供給。
  ## ここに静的値を残すと envFrom の順序次第で動的 cred と食い違うため定義しない。
  KC_HOSTNAME: auth.platform.yu-min3.com
  KC_HOSTNAME_ADMIN: auth.platform.yu-min3.com
  KC_HOSTNAME_STRICT: "true"
  KC_HOSTNAME_STRICT_HTTPS: "true"
  KC_HTTP_ENABLED: "true"
  KC_PROXY: "edge"
  KC_HEALTH_ENABLED: "true"
  KC_METRICS_ENABLED: "true"
  KEYCLOAK_ADMIN: admin
