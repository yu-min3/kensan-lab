# Bare-metal cluster: kube-proxy replacement + Hubble observability.
# 2026-05-07 以降は有線 LAN メイン + WiFi fallback 構成（routing metric ベース）。
# 旧 WiFi 運用時のチューニング知見: docs/runbooks/cilium-wifi-stability.md
# DaemonSet update 制約 (maxUnavailable=1): docs/runbooks/cilium-update-strategy.md

kubeProxyReplacement: true

# Istio CNI と chain させる (exclusive にしない)
cni:
  exclusive: false

k8sClientRateLimit:
  qps: 20
  burst: 40

k8s:
  cluster:
    cidr: 10.244.0.0/16

ipam:
  mode: kubernetes

# Lease 緩和値 (chart default 15s/10s/2s より長い)。
# 元々 WiFi 運用時の安定化目的で導入。有線化後は短縮可能だが、
# fallback で wlan*/wlp* に切替時のゆとり確保のため当面維持。
l2announcements:
  enabled: true
  leaseDuration: 60s
  leaseRenewDeadline: 40s
  leaseRetryPeriod: 8s

externalIPs:
  enabled: true

# 4 ノードクラスタで Agent 半数同時停止を避ける
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

operator:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  extraArgs:
    - --operator-k8s-client-qps=15
    - --operator-k8s-client-burst=30

# Hubble observability
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
