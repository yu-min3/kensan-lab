## CoreDNS Corefile
##
## kubeadm が初期作成する ConfigMap (kube-system/coredns) を ArgoCD で takeover し、
## 変更履歴を Git で管理する。Deployment / SA / ClusterRole 等の他リソースは kubeadm 管理のまま
## (ArgoCD app は prune: false で誤削除を防ぐ)。
##
## kubeadm upgrade 時に Corefile が re-render される可能性あり。selfHeal: true で即時 revert
## されるが、新版で内容に有意義な変更があった場合は手動で merge する。
##
## hosts plugin: cluster 内 Pod に対して特定 public FQDN → cluster LB IP の resolve を提供。
## *.platform.yu-min3.com は public DNS にレコードが無い (LAN は /etc/hosts 頼み) ため、
## cluster 内から叩く FQDN はここに pin しないと NXDOMAIN になる。
## - auth: Keycloak の OIDC discovery URL (Vault / ArgoCD / Grafana / Backstage 等) で必要。
##   同じ FQDN を維持することで JWT iss claim 整合を保ちつつ、cluster-local の経路で解決させる。
## - その他: blackbox-exporter の HTTPS probe 対象
##   (kubernetes/observability/blackbox-exporter/resources/probe-https-platform.yaml と同期)。
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
           lameduck 5s
        }
        ready
        hosts {
            192.168.0.242 auth.platform.yu-min3.com
            192.168.0.242 grafana.platform.yu-min3.com
            192.168.0.242 argocd.platform.yu-min3.com
            192.168.0.242 vault.platform.yu-min3.com
            192.168.0.242 backstage.platform.yu-min3.com
            192.168.0.242 prometheus.platform.yu-min3.com
            192.168.0.242 hubble.platform.yu-min3.com
            192.168.0.242 longhorn.platform.yu-min3.com
            # auth.yu-mins.com: Keycloak issuer 統一先。cluster 内から叩く OIDC
            # client（oauth2-proxy の token 交換 / istiod の jwks / Grafana・Vault の
            # backend）を Cloudflare へ hairpin させず gateway .242 に直接向ける
            # split-horizon。public DNS では Cloudflare edge に解決される（外部経路）。
            192.168.0.242 auth.yu-mins.com
            fallthrough
        }
        kubernetes cluster.local in-addr.arpa ip6.arpa {
           pods insecure
           fallthrough in-addr.arpa ip6.arpa
           ttl 30
        }
        prometheus :9153
        forward . /etc/resolv.conf {
           max_concurrent 1000
        }
        cache 30 {
           disable success cluster.local
           disable denial cluster.local
        }
        loop
        reload
        loadbalance
    }
