# gateway-prod の認可（gateway-platform-allow の gateway-prod 版）。
#
# ADR-021: デフォルト保護（opt-out）。gateway-prod を通る全 request は
# 「Keycloak 認証済み + platform-admin group」を要求する。旧設計の
# 「protected host を列挙し、それ以外は素通し」という catch-all rule は廃止
# （notHosts への載せ忘れ = 無認証素通し、という罠の温床だった）。
#
# 公開 host（認証なしで通したいもの）が現れたら、当該 host の明示 ALLOW rule を
# opt-out として追加し、CUSTOM 側にも対応する除外を入れ、ADR に判断を残すこと。
# 現時点で opt-out は存在しない。
#
# /oauth2/* は OIDC flow 自体の path なので claim 検査なしで通す
# （oauth2-proxy が code 交換・cookie set を行うため）。
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: gateway-prod-allow
  namespace: istio-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway-prod
  action: ALLOW
  rules:
    # OIDC flow path は無条件で通す（ext_authz 側でも notPaths 除外済み）
    - to:
        - operation:
            paths:
              - /oauth2
              - /oauth2/*
    # PWA manifest / favicon は無条件で通す（CUSTOM 側の notPaths とセット。
    # 除外理由はそちらのコメント参照。JWT が無い request は claims rule を
    # 満たせないため、この明示 rule が無いと deny になる）
    - to:
        - operation:
            paths:
              - /manifest.webmanifest
              - /favicon.svg
    # 上記以外の全 request は platform-admin group 必須（host 不問のデフォルト）
    - when:
        - key: request.auth.claims[groups]
          values:
            - platform-admin
