# gateway-prod の全 host に oauth2-proxy ext_authz を強制する CUSTOM policy。
# gateway-platform 版（authorizationpolicy-gateway-platform-oauth2.yaml）の兄弟。
#
# ADR-021: protected host の opt-in 列挙（旧設計）を廃止し、デフォルト保護に反転。
# 旧設計は「hosts への載せ忘れ = 無認証素通し」という危険な向きに倒れていた。
# 現設計では新 host は HTTPRoute を生やした時点で自動的に ext_authz 配下に入る
# （アプリ追加でこのファイルを編集する必要はない）。公開したい host が現れたら
# opt-out として明示 rule を足し、ADR に判断を残すこと。
#
# 注意:
# - /oauth2/* は notPaths で除外し、app-base chart が生成する oauth2 HTTPRoute が
#   oauth2-proxy へ直送する（callback の code 交換を ext_authz に通さない）
# - PWA manifest / favicon は認証なしで配信する（app 名とアイコンのみで秘匿性なし）。
#   ブラウザの manifest fetch は Keycloak への cross-origin redirect を CORS で
#   ブロックするため、ext_authz に通すと manifest が一切取得できない。
#   ALLOW 側（gateway-prod-allow）にも同じ paths の素通し rule が必要（セット運用）。
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: gateway-prod-oauth2-authz
  namespace: istio-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway-prod
  action: CUSTOM
  provider:
    name: oauth2-proxy
  rules:
    - to:
        - operation:
            notPaths:
              - /oauth2
              - /oauth2/*
              - /manifest.webmanifest
              - /favicon.svg
