# gateway-prod の protected host に oauth2-proxy ext_authz を強制する CUSTOM policy。
# gateway-platform 版（authorizationpolicy-gateway-platform-oauth2.yaml）の兄弟。
#
# 背景: gateway-prod は元々「app が自前認証を持つ」前提で素通しだった（legacy kensan
# の JWT）。新 kensan（ファイルベース統合版）は自前認証を持たないため、gateway 層の
# Keycloak SSO に統一する（unification-plan.md の公開前ブロッカーの解）。
#
# 注意:
# - hosts は opt-in 列挙。ここに無い host（legacy kensan 等）は従来どおり素通し
# - /oauth2/* は notPaths で除外し、app-base chart が生成する oauth2 HTTPRoute が
#   oauth2-proxy へ直送する（callback の code 交換を ext_authz に通さない）
# - kensan.app.yu-min3.com は Phase 7 cutover 時にここへ追記する
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: gateway-prod-oauth2-authz
  namespace: istio-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway-prod
  action: CUSTOM
  provider:
    name: oauth2-proxy
  rules:
    - to:
        - operation:
            hosts:
              - kensan-preview.app.yu-min3.com
            notPaths:
              - /oauth2
              - /oauth2/*
