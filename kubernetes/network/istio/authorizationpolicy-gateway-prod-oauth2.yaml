# gateway-prod の protected host に oauth2-proxy ext_authz を強制する CUSTOM policy。
# gateway-platform 版（authorizationpolicy-gateway-platform-oauth2.yaml）の兄弟。
#
# 背景: gateway-prod は元々「app が自前認証を持つ」前提で素通しだった（legacy kensan
# の JWT）。新 kensan（ファイルベース統合版）は自前認証を持たないため、gateway 層の
# Keycloak SSO に統一する（unification-plan.md の公開前ブロッカーの解）。
#
# 注意:
# - hosts は opt-in 列挙。ここに無い host（legacy kensan 等）は従来どおり素通し
# - /oauth2/* は notPaths で除外し、app-base chart が生成する oauth2 HTTPRoute が
#   oauth2-proxy へ直送する（callback の code 交換を ext_authz に通さない）
# - kensan.app.yu-min3.com は Phase 7 cutover で追記済み（legacy から継承した本番 host）
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: gateway-prod-oauth2-authz
  namespace: istio-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway-prod
  action: CUSTOM
  provider:
    name: oauth2-proxy
  rules:
    - to:
        - operation:
            hosts:
              - kensan.app.yu-min3.com # 本番 host（Phase 7 で legacy から継承）
              - kensan.yu-mins.com # Cloudflare Tunnel 経由の外部公開（gateway-prod http-tunnel listener）
            notPaths:
              - /oauth2
              - /oauth2/*
              # PWA manifest / favicon は認証なしで配信する（app 名とアイコンのみで秘匿性なし）。
              # ブラウザの manifest fetch は Keycloak への cross-origin redirect を CORS で
              # ブロックするため、ext_authz に通すと manifest が一切取得できない。
              # ALLOW 側（gateway-prod-allow）にも同じ paths の素通し rule が必要（セット運用）。
              - /manifest.webmanifest
              - /favicon.svg
