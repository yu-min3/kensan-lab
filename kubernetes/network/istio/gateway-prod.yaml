# Istio Gateway for Production Environment
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-prod
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "2" # Deploy after istiod (CRDs must be installed first)
spec:
  gatewayClassName: istio
  # IP pin (Cilium L2 IPAM 並び替え防止、Cloudflare DNS 整合)
  addresses:
    - type: IPAddress
      value: 192.168.0.243
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    hostname: "*.app.yu-min3.com"
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            kensan-lab.platform/environment: production


  # 新 kensan アプリの外部公開 host（Cloudflare Tunnel → gateway-prod, TLS は CF Edge 終端）。
  # ⚠️ cloudflared(token tunnel, dashboard 管理) の kensan.yu-mins.com route の Service は
  #    下の gateway-prod-svc (http://gateway-prod-svc.istio-system.svc.cluster.local:80) を
  #    指すこと。platform UI の *.yu-mins.com 3本は gateway-platform-svc 行きで、同じ Service に
  #    乗せると gateway-platform の `*.yu-mins.com` wildcard に吸われて 404 になる。
  - name: http-tunnel-yumins
    protocol: HTTP
    port: 80
    hostname: "kensan.yu-mins.com"
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            kensan-lab.platform/environment: production

  - name: https
    protocol: HTTPS
    port: 443
    hostname: "*.app.yu-min3.com"
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            kensan-lab.platform/environment: production
    tls:
      mode: Terminate
      certificateRefs:
      - group: ""
        kind: Secret
        name: wildcard-apps-tls
---
# Cloudflare Tunnel 用の安定した in-cluster ターゲット。
# gateway-platform-svc(.241, LoadBalancer) の gateway-prod 版だが、用途は cloudflared
# (クラスタ内 pod) からの到達のみなので ClusterIP で足りる（LAN アクセスは gateway 自身の
# .243 LB を使う）。cloudflared dashboard の kensan.yu-mins.com route の Service 欄に
# `http://gateway-prod-svc.istio-system.svc.cluster.local:80` を指定する。
apiVersion: v1
kind: Service
metadata:
  name: gateway-prod-svc
  namespace: istio-system
  labels:
    gateway: prod
spec:
  type: ClusterIP
  selector:
    gateway.networking.k8s.io/gateway-name: gateway-prod
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
