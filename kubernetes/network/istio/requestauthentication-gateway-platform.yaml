# gateway-platform に到達した HTTP request の Authorization: Bearer JWT を
# Keycloak realm "kensan" の JWKS で検証する。
#
# 動作:
# - oauth2-proxy が UI 経路で id_token を Authorization header に詰めて upstream へ
#   forward する (set_authorization_header = true)。本 RA がそれを検証して
#   request.auth.claims を populate → AuthorizationPolicy ALLOW の `when` 句で
#   groups claim を判定できるようになる。
# - JWT が無い request (Vault CLI の X-Vault-Token、ArgoCD CLI の独自 JWT 等) は
#   request.auth.claims が空のまま素通り。bypass host (vault/argocd 等) は
#   ALLOW policy 側で claim 不要 rule で許可する。
#
# forwardOriginalToken: true → upstream (Grafana 等) に Authorization header を
# そのまま渡す。受け側アプリは header trust モード (Grafana auth.proxy 等) で
# X-Auth-Request-User と組み合わせて identity を確定できる。
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: gateway-platform-keycloak-jwt
  namespace: istio-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway-platform
  jwtRules:
    - issuer: "https://auth.platform.yu-min3.com/realms/kensan"
      jwksUri: "https://auth.platform.yu-min3.com/realms/kensan/protocol/openid-connect/certs"
      forwardOriginalToken: true
