## ADR-009 後続: default-deny-all / allow-dns / allow-prometheus-scrape / allow-istio は
## CCNP (default-deny-for-mesh-ns / allow-dns-for-mesh-ns /
## allow-prometheus-scrape-for-mesh-ns / allow-istio-for-mesh-ns) に集約済み

---
## Allow intra-namespace communication
## Phase 3a-3 で kensan-prod + kensan-data を kensan に統合。
## microservice ↔ PostgreSQL ↔ MinIO ↔ Polaris ↔ Dagster 全部 intra-ns に。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: kensan
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}

---
## Allow egress to OTel Collector (monitoring:4318)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-otel-egress
  namespace: kensan
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4318

---
## Allow external egress for AI APIs (Anthropic, OpenAI)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-ai-egress
  namespace: kensan
spec:
  podSelector:
    matchLabels:
      app: kensan-ai
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443

---
## Allow user-service to reach Vault Transit (Stage 6)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-egress
  namespace: kensan
spec:
  podSelector:
    matchLabels:
      app: user-service
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - protocol: TCP
          port: 8200

---
## Allow external HTTPS egress for Dagster (Slack, Gmail, weather APIs, etc.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dagster-external-egress
  namespace: kensan
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - dagster-daemon
          - dagster-webserver
          - dagster-user-code
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
