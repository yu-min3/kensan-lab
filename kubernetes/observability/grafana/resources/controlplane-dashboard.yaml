apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-controlplane-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    grafana_folder: "Platform"
data:
  controlplane-health.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Control Plane Health: apiserver, etcd, Cilium operator の状態を一覧表示",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "panels": [],
          "title": "API Server",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "title": "Request Rate by Verb",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 1 },
          "id": 1,
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1,
                "spanNulls": false, "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(apiserver_request_total[5m])) by (verb)",
              "legendFormat": "{{ verb }}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "title": "Request Latency p99 (LIST/WATCH)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 1 },
          "id": 2,
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1,
                "spanNulls": false, "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "line+area" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 5 }
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum(rate(apiserver_request_duration_seconds_bucket{verb=~\"LIST|WATCH\"}[5m])) by (le, verb))",
              "legendFormat": "p99 {{ verb }}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "title": "Inflight Requests",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 1 },
          "id": 3,
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1,
                "spanNulls": false, "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(apiserver_current_inflight_requests) by (request_kind)",
              "legendFormat": "{{ request_kind }}",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 101,
          "panels": [],
          "title": "etcd",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "title": "WAL Fsync Duration p99",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 10 },
          "id": 4,
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1,
                "spanNulls": false, "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "line+area" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 0.05 },
                  { "color": "red", "value": 0.1 }
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum(rate(etcd_disk_wal_fsync_duration_seconds_bucket[5m])) by (le, instance))",
              "legendFormat": "p99 {{ instance }}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "title": "Backend Commit Duration p99",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 10 },
          "id": 5,
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1,
                "spanNulls": false, "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "line+area" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 0.15 },
                  { "color": "red", "value": 0.25 }
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum(rate(etcd_disk_backend_commit_duration_seconds_bucket[5m])) by (le, instance))",
              "legendFormat": "p99 {{ instance }}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "title": "Pending Proposals",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 10 },
          "id": 6,
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1,
                "spanNulls": false, "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "etcd_server_proposals_pending",
              "legendFormat": "pending {{ instance }}",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "id": 102,
          "panels": [],
          "title": "Cilium Operator",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "title": "Restart Count (1h increase)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 19 },
          "id": 7,
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "bars", "fillOpacity": 50, "lineWidth": 1,
                "spanNulls": false, "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "line+area" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 3 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"kube-system\", container=\"cilium-operator\"}[1h])",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "title": "Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 19 },
          "id": 8,
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1,
                "spanNulls": false, "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "line+area" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 268435456 }
                ]
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "container_memory_working_set_bytes{namespace=\"kube-system\", container=\"cilium-operator\"}",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["controlplane", "etcd", "apiserver", "cilium"],
      "templating": { "list": [] },
      "time": { "from": "now-3h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Control Plane Health",
      "uid": "controlplane-health",
      "version": 1
    }
