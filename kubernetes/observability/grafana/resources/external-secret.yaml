## Stage 2: Grafana admin credentials を Vault から取得して K8s Secret 化
##
## 流れ:
##   ExternalSecret CR (このファイル)
##     → ESO operator が ClusterSecretStore "vault-backend" 経由で
##       secret/monitoring/grafana/admin を read
##     → target.name = grafana-admin-secret として Secret 生成
##     → values.yaml の admin.existingSecret 参照は変更不要
##
## 前提:
## - ClusterSecretStore "vault-backend" が healthy であること
##   (共有の external-secrets role / external-secrets-read policy 経由。per-app role は不要。
##    kubernetes/secrets/external-secrets/resources/cluster-secret-store.yaml)
## - Vault KV に secret/monitoring/grafana/admin が投入済み
##   (bootstrap/vault/migrate-secret.sh で実行)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: monitoring/grafana/admin
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: monitoring/grafana/admin
        property: admin-password
