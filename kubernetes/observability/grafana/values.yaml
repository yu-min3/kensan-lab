# Chart: grafana-community/grafana 11.3.5 (appVersion: 12.4.2)
# Repo migrated from grafana/helm-charts → grafana-community/helm-charts (2026-01-30)

# Admin credentials (managed by External Secrets Operator → Vault KV)
# secret は resources/external-secret.yaml で生成される
admin:
  existingSecret: grafana-admin-secret
  userKey: admin-user
  passwordKey: admin-password

# Disable init-chown-data (fsGroup handles ownership)
initChownData:
  enabled: false

# Resources
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Persistence
persistence:
  enabled: true
  type: pvc
  storageClassName: local-path
  size: 2Gi

# Sidecar configuration for auto-discovery
sidecar:
  datasources:
    enabled: true
    label: grafana_datasource
    labelValue: "1"
    searchNamespace: monitoring
    defaultDatasourceEnabled: false
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: monitoring
    folderAnnotation: grafana_folder
    folder: /tmp/dashboards

# Grafana configuration
grafana.ini:
  server:
    # 公開 URL (Keycloak redirect_uri / oauth2 callback の組み立てに使う)。
    # auth.generic_oauth の callback path は `/login/generic_oauth` 固定。
    root_url: "https://grafana.platform.yu-min3.com"
  auth.anonymous:
    enabled: false

  # auth.generic_oauth: Grafana 自前で Keycloak と OIDC 連携 (Path B)。
  # 設計判断:
  # - 当初は oauth2-proxy ext_authz 経由 (Path A) で統一していたが、
  #   oauth2-proxy が forward する Authorization: Bearer <Keycloak JWT> を
  #   Grafana 内部が API key として解釈し "API key is invalid" で 403 を返す
  #   問題が発生 (ASGI middleware より先に API key check が走る Grafana の仕様)。
  # - Vault / ArgoCD と同じく "自前 OIDC を持つ app は gateway-proxy を bypass し
  #   app に native auth させる" 方針に統一 (Istio AuthorizationPolicy Category 1)。
  # - role mapping で Keycloak group → Grafana role に自動マップ:
  #   platform-admin → Admin, platform-dev → Editor, それ以外 → Viewer。
  auth.generic_oauth:
    enabled: true
    name: Keycloak
    allow_sign_up: true
    auto_login: true
    client_id: "$__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}"
    client_secret: "$__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}"
    scopes: "openid email profile"
    auth_url: "https://auth.platform.yu-min3.com/realms/kensan/protocol/openid-connect/auth"
    token_url: "https://auth.platform.yu-min3.com/realms/kensan/protocol/openid-connect/token"
    api_url: "https://auth.platform.yu-min3.com/realms/kensan/protocol/openid-connect/userinfo"
    signout_redirect_url: "https://auth.platform.yu-min3.com/realms/kensan/protocol/openid-connect/logout?post_logout_redirect_uri=https%3A%2F%2Fgrafana.platform.yu-min3.com%2Flogin&client_id=grafana"
    use_pkce: true
    use_refresh_token: true
    # role: id_token の groups claim から決定。oidc-group-membership-mapper を
    # grafana client にも付ければ access_token / id_token に groups が乗る。
    role_attribute_path: "contains(groups[*], 'platform-admin') && 'Admin' || contains(groups[*], 'platform-dev') && 'Editor' || 'Viewer'"
    role_attribute_strict: true

# Grafana が `client_id` / `client_secret` を環境変数から拾えるように
# secret を envFrom で全量注入する。secret は ExternalSecret で生成。
# Secret keys: GF_AUTH_GENERIC_OAUTH_CLIENT_ID / GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
envFromSecrets:
  - name: grafana-oidc-secret

# Timezone
defaultDashboardsTimezone: Asia/Tokyo

# PodDisruptionBudget
podDisruptionBudget:
  maxUnavailable: 1
