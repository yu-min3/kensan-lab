apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/managed-by: argocd
    kensan-lab.platform/environment: infrastructure
    kensan-lab.platform/tier: platform
    kensan-lab.platform/component: observability
    ## PSA labels intentionally not enforced:
    ## kube-prometheus-stack の node-exporter は hostNetwork/hostPID/hostPath/hostPort を
    ## 要求するため "baseline" と非互換。
    ## PSS は Kyverno ClusterPolicy `pss-baseline` (kubernetes/policy/kyverno-policies/) が
    ## Audit で監視 (強制は ADR-012 Phase 3 の Enforce 昇格後)。node-exporter は
    ## PolicyException で per-workload exempt 済み。旧 TODO(kyverno) が挙げていた
    ## vault は現状 baseline 準拠のため exempt 不要
