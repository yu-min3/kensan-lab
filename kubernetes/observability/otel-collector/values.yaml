# Chart: opentelemetry-collector 0.97.1

# Image: repository is required by this chart, tag follows chart appVersion
image:
  repository: otel/opentelemetry-collector-contrib

# Deployment mode
mode: deployment
replicaCount: 1

# Collector configuration
config:
  receivers:
    # MY_POD_IP is auto-injected by the chart via Downward API
    otlp:
      protocols:
        grpc:
          endpoint: ${env:MY_POD_IP}:4317
        http:
          endpoint: ${env:MY_POD_IP}:4318

  processors:
    batch:
      timeout: 10s
      send_batch_size: 1000
    memory_limiter:
      check_interval: 1s
      limit_mib: 512
    resource:
      attributes:
        - key: cluster.name
          value: kensan-lab
          action: upsert
        - key: deployment.environment
          from_attribute: k8s.namespace.name
          action: upsert
    attributes:
      actions:
        - key: http.request.header.authorization
          action: delete

  exporters:
    prometheusremotewrite:
      endpoint: http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090/api/v1/write
      tls:
        insecure: true
    otlp/tempo:
      endpoint: tempo.monitoring.svc:4317
      tls:
        insecure: true
    loki:
      endpoint: http://loki.monitoring.svc:3100/loki/api/v1/push
    debug:
      verbosity: detailed

  extensions:
    health_check:
      endpoint: ${env:MY_POD_IP}:13133

  service:
    extensions: [health_check]
    pipelines:
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch, resource]
        exporters: [prometheusremotewrite]
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch, resource, attributes]
        exporters: [otlp/tempo]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch, resource]
        exporters: [loki]
    telemetry:
      metrics:
        address: ${env:MY_POD_IP}:8888

# Ports configuration
ports:
  otlp:
    enabled: false
  otlp-grpc:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
    appProtocol: grpc
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP
  health:
    enabled: true
    containerPort: 13133
    servicePort: 13133
    protocol: TCP
  jaeger-compact:
    enabled: false
  jaeger-grpc:
    enabled: false
  jaeger-thrift:
    enabled: false
  zipkin:
    enabled: false

# Resources
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# ServiceMonitor for Prometheus Operator
serviceMonitor:
  enabled: true
  metricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
  extraLabels:
    release: prometheus

# PodDisruptionBudget
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

# Prefer high-performance node (not required)
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80
        preference:
          matchExpressions:
            - key: hardware-class
              operator: In
              values:
                - high-performance
