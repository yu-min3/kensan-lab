# Grafana Cloud remote_write の Basic auth credential (Instance ID + API token)。
# Vault への投入は手動: vault kv put secret/monitoring/grafana-cloud/remote-write \
#   url=... username=<instance-id> password=<glc_... token>
# prometheusSpec.remoteWrite[].basicAuth がこの Secret を参照する。
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-cloud-remote-write
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-cloud-remote-write
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: monitoring/grafana-cloud/remote-write
        property: username
    - secretKey: password
      remoteRef:
        key: monitoring/grafana-cloud/remote-write
        property: password
