# Chart config: kubernetes/argocd/applications/observability/prometheus/app.yaml
# IMPORTANT: Must use --include-crds flag to include Prometheus Operator CRDs

# Global settings
global:
  rbac:
    create: true

# Prometheus Operator
prometheusOperator:
  enabled: true
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Prometheus instance
prometheus:
  enabled: true
  podDisruptionBudget:
    enabled: true
    minAvailable: null
    maxUnavailable: 1
  prometheusSpec:
    # Schedule on high-performance node (NVMe I/O for TSDB)
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: hardware-class
                  operator: In
                  values:
                    - high-performance

    # Resource limits
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # Storage configuration
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Enable remote write receiver (OTel Collector → Prometheus)
    enableRemoteWriteReceiver: true

    # Grafana Cloud への remote_write (cluster-health 用の厳選 series のみ)
    # - 目的: クラスタ全停止時も外部からメトリクス閲覧 + "no data" アラート
    #   (dead-man's switch)。設計: docs/architecture/cluster-health-monitoring.md
    # - allowlist は Cluster Health ダッシュボードで使う系列に限定 (~1.4k series、
    #   Grafana Cloud free tier 10k の 14%)。メトリクス追加時は keep regex に追記
    # - 認証 secret は ESO (resources/grafana-cloud-remote-write-external-secret.yaml)
    remoteWrite:
      - url: https://prometheus-prod-49-prod-ap-northeast-0.grafana.net/api/prom/push
        name: grafana-cloud
        basicAuth:
          username:
            name: grafana-cloud-remote-write
            key: username
          password:
            name: grafana-cloud-remote-write
            key: password
        writeRelabelConfigs:
          # cluster-health ダッシュボードの系列だけ送る (probe_success は blackbox 能動 probe)
          - sourceLabels: [__name__]
            regex: "up|probe_success|kube_node_status_condition|node_uname_info|node_time_seconds|node_boot_time_seconds|node_cpu_seconds_total|node_memory_MemAvailable_bytes|node_memory_MemTotal_bytes|node_filesystem_avail_bytes|node_filesystem_size_bytes|node_hwmon_temp_celsius|node_network_carrier|node_network_receive_bytes_total|node_network_transmit_bytes_total|kube_pod_status_phase|kube_pod_container_status_restarts_total|kubelet_volume_stats_used_bytes|kubelet_volume_stats_capacity_bytes|kube_pod_info"
            action: keep
          # node_cpu は idle だけで使用率を計算できる (1 - idle)。
          # RE2 は negative lookahead 非対応のため非 idle mode を列挙して drop
          - sourceLabels: [__name__, mode]
            regex: "node_cpu_seconds_total;(user|system|nice|iowait|irq|softirq|steal|guest|guest_nice)"
            action: drop

    # Retention settings
    retention: 7d
    retentionSize: "9GB"

    # Service monitor selection
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    # Probe CRD (blackbox-exporter) も label 制限なしで選択
    probeSelectorNilUsesHelmValues: false

    # Enable monitoring of all namespaces
    serviceMonitorNamespaceSelector: {}
    podMonitorNamespaceSelector: {}
    probeNamespaceSelector: {}

    # OTel Collector を scrape 対象に追加
    additionalScrapeConfigs:
      - job_name: 'otel-collector'
        static_configs:
          - targets:
              - 'otel-collector-opentelemetry-collector.monitoring.svc:8888'
        scrape_interval: 30s
        scrape_timeout: 10s

# Grafana - Dashboard and visualization
# Disabled: Grafana is now deployed independently in kubernetes/observability/grafana/
# This allows Grafana to serve as a unified visualization layer for the entire
# Observability stack (Prometheus, Tempo, Loki) without being tied to Prometheus
grafana:
  enabled: false
  forceDeployDashboards: true

# Alertmanager
alertmanager:
  enabled: true
  podDisruptionBudget:
    enabled: true
    minAvailable: null
    maxUnavailable: 1
  alertmanagerSpec:
    # Slack webhook Secret を pod に /etc/alertmanager/secrets/<name>/ としてマウント
    secrets:
      - alertmanager-slack-secret

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 256Mi

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

  # Alertmanager routing & notification 設定
  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: slack-default
      group_by: ['namespace', 'alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        # Watchdog は通知しない（常時 firing のヘルスチェック用アラート）
        - matchers:
            - alertname = "Watchdog"
          receiver: "null"
        # InfoInhibitor も通知しない
        - matchers:
            - alertname = "InfoInhibitor"
          receiver: "null"
        # kube-proxy TargetDown — Cilium が kube-proxy を置き換えているため常時発火
        - matchers:
            - alertname = "TargetDown"
            - job = "kube-proxy"
          receiver: "null"

    receivers:
      - name: "null"
      - name: slack-default
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-secret/webhook-url
            channel: '#k8s-alerts'
            send_resolved: true
            title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: >-
              *クラスタ:* kensan-lab | *namespace:* {{ .CommonLabels.namespace }}

              {{ range .Alerts }}
              *{{ .Labels.alertname }}* ({{ .Labels.severity }})
              {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}

    inhibit_rules:
      - source_matchers: [severity = critical]
        target_matchers: [severity =~ warning|info]
        equal: [namespace, alertname]
      - source_matchers: [severity = warning]
        target_matchers: [severity = info]
        equal: [namespace, alertname]

# Node Exporter - monitors node metrics
nodeExporter:
  enabled: true
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

# Kube State Metrics - monitors Kubernetes object states
kube-state-metrics:
  enabled: true
  podDisruptionBudget:
    maxUnavailable: 1
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# etcd monitoring — apiserver 障害の根本原因特定のため有効化
# master ノードで listen-metrics-urls に master IP を追加する手動作業が必要
# (手順: temp/fix-etcd-metrics.sh)
kubeEtcd:
  enabled: true
  endpoints:
    - 192.168.0.107
  service:
    enabled: true
    port: 2381
    targetPort: 2381
  serviceMonitor:
    scheme: http

# Default scrape configs
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true  # etcd アラートルール有効化（microSD I/O ボトルネック検知）
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: false  # Cilium replaces kube-proxy
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
