## Kyverno engine (chart 3.8.1 / Kyverno v1.16 系)
## ホームラボ制約 (Pi worker + microSD etcd master) 向けチューニング。
## 設計の経緯・段階的ロールアウト: docs/adr/012-policy-enforcement-kyverno.md
## ポリシー本体は kubernetes/policy/kyverno-policies/ (別 app) で管理

features:
  ## PolicyException を有効化し、受理を kyverno ns に限定する
  ## (例外も Git 管理 — kubernetes/policy/kyverno-policies/exceptions/ のみが SoT)
  policyExceptions:
    enabled: true
    namespace: kyverno

  ## microSD etcd 保護: admission 毎の EphemeralReport 書き込みを止め、
  ## violation 可視化は background scan 由来の PolicyReport に一本化する
  admissionReports:
    enabled: false

  ## scan 間隔は設計値として明示 pin (chart bump による silent change 防止 — ADR-011 の教訓)
  backgroundScan:
    backgroundScanInterval: 1h

  ## validate 結果のみレポート (mutate / generate / imageVerify は未使用 — ADR-012)
  reporting:
    validate: true
    mutate: false
    mutateExisting: false
    imageVerify: false
    generate: false

admissionController:
  ## ホームラボなので HA 不要。単一 replica 停止時の保険は
  ## policy 側の webhookConfiguration.failurePolicy: Ignore で取る
  replicas: 1
  ## webhook latency を抑えるため m4neo を優先 (Medium カテゴリの scheduling rule)
  nodeAffinity: &hp-node-affinity
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80
        preference:
          matchExpressions:
            - key: hardware-class
              operator: In
              values:
                - high-performance
  container:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 384Mi

## background-controller の担当は generate / mutateExisting rule の処理のみで、
## PolicyReport 生成の background scan は reports-controller の仕事。
## validate-only 構成 (ADR-012 §2) では恒久 idle になるため無効化
backgroundController:
  enabled: false

reportsController:
  replicas: 1
  nodeAffinity: *hp-node-affinity
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

## CleanupPolicy / TTL cleanup は未使用のため無効化 (Pi のリソース節約)。
## 必要になったら enabled: true に戻す
cleanupController:
  enabled: false
