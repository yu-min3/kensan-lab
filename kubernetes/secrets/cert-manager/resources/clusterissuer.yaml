# Self-signed ClusterIssuer (cluster-internal CA bootstrap 用)
# 用途: Cilium / Hubble の内部 mTLS など、 cluster 内のみ通用する自己署名 CA を発行する起点。
# 公開ドメイン向けは letsencrypt-prod / -staging を使う。
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-cluster-issuer
spec:
  selfSigned: {}
---
# Let's Encrypt ClusterIssuer for Production
# Uses DNS-01 challenge with AWS Route53
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Let's Encrypt production server
    server: https://acme-v02.api.letsencrypt.org/directory

    # Email for Let's Encrypt account notifications
    email: admin@yu-min3.com

    # Private key for ACME account
    privateKeySecretRef:
      name: letsencrypt-prod

    # DNS-01 challenge solvers。zone ごとに権威 DNS が異なるため dnsZones で振り分ける:
    # - yu-min3.com: 権威は Route53（platform/apps の wildcard）
    # - yu-mins.com: 権威は Cloudflare（Tunnel 公開ドメイン。auth issuer 統一で LAN 直
    #   アクセス用の in-cluster 証明書が必要になった。cert-manager は Vault に依存できない
    #   低レイヤなので cred は SealedSecret = route53 と同じ流儀）
    solvers:
    - selector:
        dnsZones:
          - "yu-min3.com"
      dns01:
        route53:
          region: ap-northeast-1 # Tokyo region (必要に応じて変更)
          # AWS credentials from Secret
          accessKeyIDSecretRef:
            name: route53-credentials
            key: access-key-id
          secretAccessKeySecretRef:
            name: route53-credentials
            key: secret-access-key
    - selector:
        dnsZones:
          - "yu-mins.com"
      dns01:
        cloudflare:
          # Cloudflare API token (Zone:DNS:Edit for yu-mins.com)。
          # SealedSecret: resources/cloudflare-api-token-sealed.yaml
          apiTokenSecretRef:
            name: cloudflare-api-token
            key: api-token
---
# Let's Encrypt ClusterIssuer for Staging (testing)
# Use this for testing before using production issuer
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # Let's Encrypt staging server (for testing, has higher rate limits)
    server: https://acme-staging-v02.api.letsencrypt.org/directory

    email: admin@yu-min3.com

    privateKeySecretRef:
      name: letsencrypt-staging

    solvers:
    - dns01:
        route53:
          region: ap-northeast-1
          accessKeyIDSecretRef:
            name: route53-credentials
            key: access-key-id
          secretAccessKeySecretRef:
            name: route53-credentials
            key: secret-access-key
