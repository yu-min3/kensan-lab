# Wildcard certificate for *.yu-mins.com
#
# yu-mins.com は Cloudflare Tunnel での外部公開ドメイン。外部経路は Cloudflare edge で
# TLS 終端するため従来 in-cluster 証明書は不要だった。しかし Keycloak issuer を
# auth.yu-mins.com へ統一（ADR: issuer 統一）した結果、LAN からの split-horizon 直
# アクセス（browser も oauth2-proxy/istiod/Grafana/Vault の backend も .242 の gateway
# HTTPS listener を叩く）に有効な証明書が要る。
#
# DNS-01 は Cloudflare 権威なので clusterissuer の cloudflare solver（dnsZones: yu-mins.com）
# が解く。Gateway (gateway-platform) の *.yu-mins.com HTTPS listener が参照する。
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-yu-mins-com
  namespace: istio-system
spec:
  # Secret name where the certificate will be stored
  secretName: wildcard-yu-mins-tls

  # Reference to ClusterIssuer（cloudflare solver が yu-mins.com を担当）
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer

  # DNS names covered by this certificate
  dnsNames:
  - "*.yu-mins.com" # Wildcard（auth 以外の yu-mins host も将来 LAN HTTPS 化できる）

  # Private key settings（platform/apps 証明書と対称）
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 4096

  # Certificate renewal settings
  renewBefore: 720h # Renew 30 days before expiration (Let's Encrypt certs are valid for 90 days)
