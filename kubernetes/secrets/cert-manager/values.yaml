# Chart config: kubernetes/argocd/applications/secrets/cert-manager/app.yaml
# Version: v1.19.1
#
# TLS certificate management with Let's Encrypt

# Install CRDs with the chart (required for Certificate, ClusterIssuer, etc.)
crds:
  enabled: true

# DNS-01 propagation self-check を public recursive resolver 経由に固定する。
# default は権威 NS (Route53, 205.251.x.x) への port 53 直接問い合わせだが、
# NetworkPolicy の egress 許可先を 1.1.1.1 / 8.8.8.8 の 2 IP に絞るため
# recursive-only に切り替える (allow-dns01-selfcheck-egress とセット)。
extraArgs:
  - --dns01-recursive-nameservers-only
  - --dns01-recursive-nameservers=1.1.1.1:53,8.8.8.8:53

# PodDisruptionBudget
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

webhook:
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1
