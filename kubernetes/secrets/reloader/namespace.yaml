## reloader ns の lifecycle 管理 (Kyverno Phase 2: bare ns remediation)
## component 本体 (kubernetes/secrets/reloader) は CreateNamespace で ns を作るだけで
## label を持たないため、ns-label-contract rule 1 に違反していた。
## monitoring / kyverno と同じく ns lifecycle を専用 app に切り出して label を宣言する
apiVersion: v1
kind: Namespace
metadata:
  name: reloader
  labels:
    app.kubernetes.io/managed-by: argocd
    kensan-lab.platform/environment: infrastructure
    kensan-lab.platform/tier: platform
    kensan-lab.platform/component: reloader
