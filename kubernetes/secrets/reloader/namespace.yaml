## ⚠️ ADR-020 実行中の一時的な重複ファイル。削除しないこと (次段階 PR で reloader-namespace app
## と合わせて消す)。`reloader` app 側に resources/namespace.yaml (同内容) を追加済みで、そちらへの
## tracking 移管をライブクラスタで確認するまでの間、この reloader-namespace app 用ソースを空にしない
## ためにあえて両方に存在させている。空にすると prune:true + finalizer で ns ごと消える。
apiVersion: v1
kind: Namespace
metadata:
  name: reloader
  labels:
    app.kubernetes.io/managed-by: argocd
    kensan-lab.platform/environment: infrastructure
    kensan-lab.platform/tier: platform
    kensan-lab.platform/component: reloader
