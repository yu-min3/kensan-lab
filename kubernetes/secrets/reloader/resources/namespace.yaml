## reloader ns の label 宣言 (ns-label-contract rule 1)。
## cert-manager/external-secrets と同じ Pattern A: この resources/ が reloader app 自身の
## 追加 source として sync され、CreateNamespace=true と合わせて ns 作成+label 付与が完結する
## (ADR-020: 旧 reloader-namespace 専用 app からの統合。kyverno/monitoring は複数 component が
## ns を共有するため専用 app のままだが、reloader は単一 owner なのでこちらが正しい形)
apiVersion: v1
kind: Namespace
metadata:
  name: reloader
  labels:
    app.kubernetes.io/managed-by: argocd
    kensan-lab.platform/environment: infrastructure
    kensan-lab.platform/tier: platform
    kensan-lab.platform/component: reloader
