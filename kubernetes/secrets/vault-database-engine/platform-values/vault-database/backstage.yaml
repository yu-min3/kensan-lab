## Backstage Postgres
## name は AppSet が path から inject (postgres-backstage)
## rootOwner / dbName / host は default (basename = "backstage" と一致するため override 不要)
##
## grantRootOwnerMembership: Backstage は 12 DB (backstage + backstage_plugin_* x11) に
## 分散接続するため、dbName 単位 GRANT では plugin DB で permission denied になる
## (一度 cutover を試みて revert した経緯 = 旧・据置)。rootOwner (backstage role、全 12 DB の
## owner) への membership で解決する。
ns: backstage
grantRootOwnerMembership: true
