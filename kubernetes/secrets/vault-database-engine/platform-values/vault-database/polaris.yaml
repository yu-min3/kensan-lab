## Polaris (Iceberg catalog metastore) 専用 Postgres (kensan/polaris-postgres)
## name = postgres-polaris (AppSet が filename から inject)
## dagster-postgres と同じ「専用 StatefulSet + VCO dynamic + ESO + reloader」パターン。
##
## host: 専用 StatefulSet なので Bitnami 標準 release 名と異なる → host を直接指定
##   (helper default は <releaseName>.<ns>.svc だが releaseName=postgresql 固定のため明示)
## rootOwner / dbName: StatefulSet の POSTGRES_USER / POSTGRES_DB は "polaris" (basename と一致)
##   なので default 流用で OK。REASSIGN OWNED BY 先 = "polaris" (stable superuser)。
## keyMapping: Polaris は Quarkus 標準 env (QUARKUS_DATASOURCE_USERNAME / _PASSWORD) で datasource cred を
##   読む。生成 Secret の key 名をこれに合わせる (Pod 側 env 名はそのまま参照できる)。
## extraSchemas: relational-jdbc bootstrap が polaris_schema を作る (public ではない)。
##   Polaris は "CREATE SCHEMA IF NOT EXISTS POLARIS_SCHEMA" (unquoted) を発行 → Postgres が
##   小文字畳み込みするため実体は polaris_schema (小文字)。ここでも小文字で指定する。
##   schema は polaris-postgres init script が stable owner "polaris" で事前作成し、
##   ここで動的 user に polaris_schema 内の全権を付与する (rotation 後の新 user も継続アクセス可)。
ns: kensan
host: polaris-postgres.kensan.svc.cluster.local
keyMapping:
  user: QUARKUS_DATASOURCE_USERNAME
  password: QUARKUS_DATASOURCE_PASSWORD
extraSchemas:
  - polaris_schema
