apiVersion: v2
name: vault-transit-engine
description: |
  Vault Config Operator (VCO) ベースの Transit (column 暗号化) consumer 設定。
  1 consumer 分の Policy + KubernetesAuthEngineRole を render する。
  共通の mount は同階層の shared/ で別管理、key 作成は VCO 未対応のため temp/ の script で 1 度きり手動。
type: application
version: 0.1.0
appVersion: "1.0"
