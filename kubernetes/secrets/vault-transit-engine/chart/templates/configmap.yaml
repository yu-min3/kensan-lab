## Consumer 設定 ConfigMap (app ns 側、chart 管理)
##
## consumer Pod は envFrom: configMapRef: name: <name>-config で読む。
## Vault role / key 名の rename 時、chart の output だけ更新すれば
## Reloader annotation 経由で consumer Deployment が自動 rollout される。
##
## Reloader workflow:
##   consumer Deployment 側に reloader.stakater.com/auto: "true" を付ければ、
##   この ConfigMap の更新を検知して rollout される。
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vte.name" . }}-config
  namespace: {{ .Values.ns }}
  annotations:
    reloader.stakater.com/match: "true"
data:
  VAULT_ADDR: {{ .Values.vaultProvider.server | quote }}
  VAULT_AUTH_ROLE: {{ include "vte.name" . | quote }}
  VAULT_TRANSIT_KEY: {{ .Values.keyName | required "keyName required" | quote }}
