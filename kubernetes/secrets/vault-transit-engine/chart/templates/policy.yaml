## Vault policy `{{ include "vte.name" . }}`
##
## consumer ({{ .Values.ns }}/{{ include "vte.name" . }}) が transit key を
## encrypt/decrypt/hmac/rewrap する最小権限。key 単位で path を絞る。
##
## 設計方針:
##  - consumer 専用 policy (他には付与しない)
##  - encrypt / decrypt / hmac / rewrap の 4 endpoint のみ
##  - key の current version 等メタ情報は read 可 (rewrap 判定用)
##  - rotate / config / delete は禁止
##  - token renew/lookup-self は共通許可 (auto-renew loop が必要)
apiVersion: redhatcop.redhat.io/v1alpha1
kind: Policy
metadata:
  name: {{ include "vte.name" . }}
  namespace: {{ .Values.vaultNamespace }}
spec:
  authentication:
    {{- include "vte.vcoAuth" . | nindent 4 }}
  policy: |
    {{- range $k := (include "vte.allKeyNames" . | fromJsonArray) }}
    # {{ $k }}: encrypt / decrypt / hmac / rewrap
    path "{{ $.Values.vaultMountPath }}/encrypt/{{ $k }}" {
      capabilities = ["update"]
    }
    path "{{ $.Values.vaultMountPath }}/decrypt/{{ $k }}" {
      capabilities = ["update"]
    }
    path "{{ $.Values.vaultMountPath }}/hmac/{{ $k }}" {
      capabilities = ["update"]
    }
    path "{{ $.Values.vaultMountPath }}/rewrap/{{ $k }}" {
      capabilities = ["update"]
    }
    # key の current version (rewrap 判定用、データ復号には不要)
    path "{{ $.Values.vaultMountPath }}/keys/{{ $k }}" {
      capabilities = ["read"]
    }
    {{- end }}

    # token lease 維持 (kubernetes auth 経由 token は default lease 持ち、自動 renew 必要)
    path "auth/token/renew-self" {
      capabilities = ["update"]
    }
    path "auth/token/lookup-self" {
      capabilities = ["read"]
    }
