## Consumer ServiceAccount (app ns 側、chart 管理)
##
## このサービスアカウントを使って Pod が Vault k8s auth で login する。
## Vault 側の KubernetesAuthEngineRole (vault-auth-role.yaml) がこの SA を bound して
## 同名の policy (policy.yaml) を付与する。
## imagePullSecrets は chart 側で持つ (PE 規約、ghcr-pull-secret は ESO で別 chart が配布)。
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vte.name" . }}
  namespace: {{ .Values.ns | required "ns required" }}
{{- with .Values.imagePullSecrets }}
imagePullSecrets:
{{- toYaml . | nindent 2 }}
{{- end }}
