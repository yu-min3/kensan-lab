## Vault Kubernetes Auth Role `{{ include "vte.name" . }}` (vault ns、VCO 管理)
##
## consumer Pod ({{ .Values.ns }}/{{ .Values.serviceAccount }}) を Vault に bind し、
## 同名の policy を付与する。Pod は起動時に SA JWT で Vault login → token 取得 →
## transit API 直叩き。
apiVersion: redhatcop.redhat.io/v1alpha1
kind: KubernetesAuthEngineRole
metadata:
  name: {{ include "vte.name" . }}
  namespace: {{ .Values.vaultNamespace }}
spec:
  authentication:
    {{- include "vte.vcoAuth" . | nindent 4 }}
  path: kubernetes
  name: {{ include "vte.name" . }}
  policies:
    - {{ include "vte.name" . }}
  targetServiceAccounts:
    - {{ .Values.serviceAccount | required "serviceAccount required" }}
  targetNamespaces:
    targetNamespaces:
      - {{ .Values.ns | required "ns required" }}
  # token TTL 明示 (default 12h 防止 / max は短く renew 強制)
  tokenTTL: {{ .Values.tokenTTL }}
  tokenMaxTTL: {{ .Values.tokenMaxTTL }}
