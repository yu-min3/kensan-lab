## ============================================================================
## PE 規約 (デフォルト値)。各 values file は必要分だけ override する。
## ============================================================================

## --- Vault 接続先 / mount 設定 (Vault-side, VCO 用) ---
vaultNamespace: vault
vaultMountPath: transit

## --- Vault 接続先 (consumer Pod が直接 login する HTTP endpoint、ConfigMap に展開) ---
vaultProvider:
  server: http://vault.vault.svc.cluster.local:8200

## --- VCO が Vault に login する際の auth 設定 (CR 内 authentication block) ---
##   vault-database-engine と同じ規約。CR は vault ns に置き、ns の "default" SA で
##   TokenRequest → Vault に login。role 側は bound_SA_namespaces=["vault"],
##   bound_SA_names=["default"] で揃える。
vcoAuthRole: vault-config-operator

## --- Vault role / policy / consumer SA 命名規約 ---
##   ApplicationSet が helm.parameters で `name` を inject する想定
##   filename basename → "transit-<basename>" (vault-database-engine の postgres-<base> と対称)
##   この name が Policy / KubernetesAuthEngineRole / consumer ns 側 SA / ConfigMap の baseline
namePrefix: "transit-"

## --- Token TTL (Pod が Vault k8s auth で login したときの token lease 期間) ---
##   default 短すぎ防止 (default ~12h は長すぎる)、max 1h で renew 強制
tokenTTL: 1800        # 30 分
tokenMaxTTL: 3600     # 1 時間

## --- consumer SA に付与する imagePullSecrets (chart が SA を作るので、image pull token もここで設定) ---
##   default: kensan-lab convention の ghcr-pull-secret (Vault static via ESO で配布)
imagePullSecrets:
  - name: ghcr-pull-secret

## ============================================================================
## 各 values file で override 可能なフィールド (詳細は README):
##   ns                    (必須) consumer SA を deploy する K8s namespace
##   keyName               (必須) Transit key 名 (encrypt/decrypt 対象)
##   name                  (任意) 命名 baseline (通常 AppSet が "transit-<basename>" inject)
##   extraKeyNames         (任意) 同一 consumer に複数 key を許可したい場合の追加 list
##   tokenTTL, tokenMaxTTL (任意) Vault k8s auth token lease 期間
##   imagePullSecrets      (任意) consumer SA に付与する image pull secret リスト
##   vaultProvider.server  (任意) consumer Pod が叩く Vault address
## ============================================================================

ns: ""
name: ""
keyName: ""
extraKeyNames: []
