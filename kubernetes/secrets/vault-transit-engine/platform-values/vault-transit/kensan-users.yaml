## Consumer: kensan/user-service が users.name (PII) を encrypt/decrypt するための capability
## - Vault role / policy 名は AppSet inject の "transit-kensan-users" (filename basename + "transit-" prefix)
## - Transit key: users-name (1 度きり手動作成、temp/setup-transit-keys.sh 参照)
ns: kensan
serviceAccount: user-service
keyName: users-name
