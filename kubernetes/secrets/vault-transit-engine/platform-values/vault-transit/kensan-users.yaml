## Consumer: kensan ns の Pod が users.name (PII) を encrypt/decrypt するための capability
## - Vault role / policy / SA / ConfigMap 名はすべて "transit-kensan-users" (AppSet inject の `name` から derive)
## - Transit key: users-name (1 度きり手動作成、temp/setup-transit-keys.sh 参照)
## - consumer Pod (= user-service Deployment) は chart が作る SA で動き、ConfigMap を envFrom で読む
ns: kensan
keyName: users-name
