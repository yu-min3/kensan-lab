# kensan-workspace（生活データ SSoT）専用 StorageClass。
# default の longhorn SC は numberOfReplicas=1 / reclaim Delete で、
# 日記・ノートの SSoT には不足（PV 喪失の教訓: local-path reclaim=Delete 事故）。
#
# - replica 2: m4neo (NVMe) + Pi worker のクロスノード複製。m4neo 凍結歴 2 回への備え
# - Retain: PVC を誤削除しても PV/データは残る
# - RWX 前提（share-manager 経由で app pod と Mac が同時マウント）
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-workspace
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  dataEngine: "v1"
  fsType: "ext4"
  numberOfReplicas: "2"
  staleReplicaTimeout: "30"
  dataLocality: "best-effort"
  unmapMarkSnapChainRemoved: "ignored"
  recurringJobSelector: '[{"name":"default","isGroup":true}]'
