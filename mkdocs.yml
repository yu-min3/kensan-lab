site_name: kensan-lab
site_description: Enterprise-grade Kubernetes on bare-metal — a reference architecture for platform engineering.
site_url: https://yu-min3.github.io/kensan-lab/
repo_url: https://github.com/yu-min3/kensan-lab
repo_name: yu-min3/kensan-lab
edit_uri: edit/main/docs/
copyright: Copyright &copy; yu-min3

docs_dir: docs

exclude_docs: |
  bootstrapping/manifests/
  bootstrapping/scripts/

validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: ignore
    unrecognized_links: ignore

theme:
  name: material
  language: en
  logo: assets/kensan-logo-dark.svg
  favicon: assets/kensan-logo-dark.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.tabs.link

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true
  # AI-facing output: generates /llms.txt (curated index) and /llms-full.txt
  # (full content) from the same human docs at build time. No content duplication.
  # https://llmstxt.org/ · https://github.com/pawamoy/mkdocs-llmstxt
  - llmstxt:
      full_output: llms-full.txt
      markdown_description: >-
        Enterprise-grade Kubernetes on bare-metal — a reference architecture for
        platform engineering. Argo CD GitOps, Istio service mesh, Cilium CNI,
        Vault, Keycloak, Backstage, and full observability (Prometheus, Grafana,
        Loki, Tempo), running on Raspberry Pis and a mini PC.
      sections:
        Getting started:
          - index.md
          - getting-started/*.md
        Architecture:
          - architecture/*.md
        Concepts:
          - concepts/*.md
        Design system:
          - design/*.md
        Bootstrapping:
          - bootstrapping/*.md
        Secret management & auth:
          - secret-management/*.md
          - auth/*.md
        Runbooks & operations:
          - runbooks/*.md
          - operations/*.md
          - guides/*.md
        Architecture decisions:
          - adr/*.md
        Incidents & roadmap:
          - incidents/*.md
          - roadmap/*.md
        Articles:
          - articles.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yu-min3/kensan-lab
    - icon: fontawesome/brands/dev
      link: https://dev.to/
  generator: false

extra_css:
  - stylesheets/whetstone.css

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - Bootstrapping:
          - Overview: bootstrapping/index.md
          - Stage 1 — Vault HA: bootstrapping/12-vault-stage1.md
          - Grafana independent setup: bootstrapping/11-grafana-independent.md
          - Add worker node (M4 Neo): bootstrapping/add-worker-node-m4neo.md
  - Architecture:
      - Infrastructure overview: architecture/infrastructure.md
      - auth/: architecture/auth.md
      - secrets/: architecture/secrets.md
      - network/: architecture/network.md
      - network/ · Cloudflare Tunnel & Access: architecture/cloudflare-tunnel.md
      - observability/: architecture/observability.md
      - Cluster health monitoring: architecture/cluster-health-monitoring.md
  - Concepts:
      - Documentation Layout: concepts/doc-layout.md
      - Namespace Label Design: concepts/namespace-label-design.md
      - Network Policy: concepts/network-policy-guide.md
      - Policy Enforcement: concepts/policy-enforcement.md
      - Kustomize Guidelines (deprecated): concepts/kustomize-guidelines.md
  - Design System:
