      - 011 — Vault Version Pinning: adr/011-vault-version-pinning.md
      - 012 — Policy Enforcement with Kyverno: adr/012-policy-enforcement-kyverno.md
      - 013 — Keycloak DB Credentials → Vault Dynamic: adr/013-keycloak-db-credentials-vault-dynamic.md
