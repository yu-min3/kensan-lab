      - 002 — Authentication & Authorization: adr/002-authentication-authorization-architecture.md
      - 003 — ApplicationSet Migration: adr/003-applicationset-migration-strategy.md
      - 004 — Network Policy Design: adr/004-network-policy-design.md
      - 005 — Istio Native OAuth2: adr/005-istio-native-oauth2.md
